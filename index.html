<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspired Growing CRM — Phase 2</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,-apple-system,sans-serif;background:#F5F6F8;color:#111827;font-size:13px;height:100vh;overflow:hidden;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-thumb{background:#E4E7EC;border-radius:3px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  input,select,textarea,button{font-family:inherit;}
  .kanban-col{min-width:210px;max-width:210px;}
  .kanban-card{cursor:grab;user-select:none;}
  .kanban-card:active{cursor:grabbing;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef} = React;

const C={lavender:"#DFC4DF",lightblue:"#C2E8FB",blue:"#40ACE2",green:"#65C39D",yellow:"#FAEE36",orange:"#F9A139",coral:"#EB5665",gDark:"#2d8f68",gBg:"#edf7f2",gBorder:"#b6dfc9",bBg:"#e8f4fc",bDark:"#1e7db0",bg:"#F5F6F8",surface:"#fff",border:"#E4E7EC",text:"#111827",textS:"#6B7280",textT:"#9CA3AF"};

const STAGES=["Cold","Contacted","Replied","Demo Scheduled","Proposal Sent","Closed Won","Closed Lost"];
const STAGE_META={
  "Cold":{color:"#9CA3AF",bg:"#F3F4F6",icon:"❄️",deal:0},
  "Contacted":{color:"#185FA5",bg:"#E6F1FB",icon:"📧",deal:50000},
  "Replied":{color:"#0F6E56",bg:"#E1F5EE",icon:"💬",deal:50000},
  "Demo Scheduled":{color:"#854F0B",bg:"#FAEEDA",icon:"📅",deal:50000},
  "Proposal Sent":{color:"#5B21B6",bg:"#EDE9FE",icon:"📄",deal:50000},
  "Closed Won":{color:"#065F46",bg:"#D1FAE5",icon:"🏆",deal:50000},
  "Closed Lost":{color:"#A32D2D",bg:"#FEE2E2",icon:"✗",deal:0},
};
const PER_C={STEM:["#185FA5","#E6F1FB"],Nutrition:["#0F6E56","#E1F5EE"],Sustainability:["#3B6D11","#EAF3DE"],CTE:["#854F0B","#FAEEDA"],General:["#5F5E5A","#F1EFE8"]};
const STUCK_DAYS={Cold:14,Contacted:7,Replied:5,"Demo Scheduled":7,"Proposal Sent":14,"Closed Won":null,"Closed Lost":null};
const DEAL_VAL=50000;

const NOW=Date.now();
const daysAgo=d=>new Date(NOW-d*86400000).toISOString();

const SEED_CONTACTS=[
  {id:1,name:"Maria Torres",email:"m.torres@clarkstown.edu",role:"Nutrition Director",school:"North Rockland HS",district:"Clarkstown CSD",state:"NY",persona:"Nutrition",stage:"Cold",stageEnteredAt:daysAgo(18),lastContact:null,notes:"Strong farm-to-school initiative in 2024 strategic plan.",tasks:[]},
  {id:2,name:"James Okafor",email:"j.okafor@bronxvilleschools.org",role:"STEM Coordinator",school:"Bronxville HS",district:"Bronxville UFSD",state:"NY",persona:"STEM",stage:"Contacted",stageEnteredAt:daysAgo(9),lastContact:daysAgo(9),notes:"Has existing hydro lab. No reply yet.",tasks:[]},
  {id:3,name:"Sandra Perez",email:"s.perez@ithacacsd.org",role:"Sustainability Director",school:"Ithaca HS",district:"Ithaca City SD",state:"NY",persona:"Sustainability",stage:"Cold",stageEnteredAt:daysAgo(5),lastContact:null,notes:"Green Ribbon school. 2026 sustainability goals.",tasks:[]},
  {id:4,name:"Kevin Williams",email:"k.williams@williamsville.edu",role:"CTE Director",school:"Williamsville East HS",district:"Williamsville CSD",state:"NY",persona:"CTE",stage:"Replied",stageEnteredAt:daysAgo(3),lastContact:daysAgo(3),notes:"Interested in culinary integration. Asked for pricing.",tasks:[{id:1,text:"Send pricing sheet",due:"2026-05-05",done:false}]},
  {id:5,name:"Angela Chen",email:"a.chen@newarkpublicschools.org",role:"Nutrition Director",school:"Newark Science HS",district:"Newark Public Schools",state:"NJ",persona:"Nutrition",stage:"Cold",stageEnteredAt:daysAgo(6),lastContact:null,notes:"NJ farm-to-school grant recipient 2023.",tasks:[]},
  {id:6,name:"Robert Kim",email:"r.kim@somersetschools.org",role:"Principal",school:"Ridge HS",district:"Somerset Hills SD",state:"NJ",persona:"General",stage:"Contacted",stageEnteredAt:daysAgo(4),lastContact:daysAgo(4),notes:"",tasks:[]},
  {id:7,name:"Priya Nair",email:"p.nair@montclair.edu",role:"Science Dept Head",school:"Montclair HS",district:"Montclair SD",state:"NJ",persona:"STEM",stage:"Demo Scheduled",stageEnteredAt:daysAgo(2),lastContact:daysAgo(2),notes:"Demo May 10. Very engaged.",tasks:[{id:2,text:"Prep demo materials",due:"2026-05-08",done:false},{id:3,text:"Send calendar invite",due:"2026-05-03",done:true}]},
  {id:8,name:"David Chen",email:"d.chen@eastsidestem.nyc",role:"STEM Coordinator",school:"East Side STEM Academy",district:"NYC DOE",state:"NY",persona:"STEM",stage:"Proposal Sent",stageEnteredAt:daysAgo(4),lastContact:daysAgo(4),notes:"Proposal sent. Waiting on board approval.",tasks:[{id:4,text:"Follow up on proposal",due:"2026-05-06",done:false}]},
  {id:9,name:"Lisa Park",email:"l.park@hobokenschools.org",role:"Wellness Coordinator",school:"Hoboken HS",district:"Hoboken Public Schools",state:"NJ",persona:"Nutrition",stage:"Contacted",stageEnteredAt:daysAgo(8),lastContact:daysAgo(8),notes:"",tasks:[]},
  {id:10,name:"Marcus Johnson",email:"m.johnson@clarkstown.edu",role:"Superintendent",school:"Clarkstown District Office",district:"Clarkstown CSD",state:"NY",persona:"General",stage:"Cold",stageEnteredAt:daysAgo(20),lastContact:null,notes:"",tasks:[]},
  {id:11,name:"Rachel Green",email:"r.green@madisonschools.nj",role:"Culinary Arts Teacher",school:"Madison HS",district:"Madison Borough SD",state:"NJ",persona:"CTE",stage:"Replied",stageEnteredAt:daysAgo(1),lastContact:daysAgo(1),notes:"Runs student farm-to-table program already.",tasks:[]},
  {id:12,name:"Tom Walsh",email:"t.walsh@larchmont.edu",role:"Sustainability Admin",school:"Mamaroneck HS",district:"Mamaroneck UFSD",state:"NY",persona:"Sustainability",stage:"Closed Won",stageEnteredAt:daysAgo(10),lastContact:daysAgo(10),notes:"Signed! Install scheduled June 2.",tasks:[]},
];

const SEED_ACTIVITY=[
  {id:1,type:"stage",contactId:12,contactName:"Tom Walsh",text:"moved to Closed Won",detail:"Mamaroneck UFSD signed. Install June 2.",time:daysAgo(10),icon:"🏆"},
  {id:2,type:"email",contactId:8,contactName:"David Chen",text:"Proposal sent",detail:"NYC DOE East Side STEM Academy — $50,000 proposal",time:daysAgo(4),icon:"📄"},
  {id:3,type:"reply",contactId:4,contactName:"Kevin Williams",text:"replied to outreach",detail:"Asked for pricing sheet. Warm lead.",time:daysAgo(3),icon:"💬"},
  {id:4,type:"demo",contactId:7,contactName:"Priya Nair",text:"Demo scheduled",detail:"May 10 — Montclair SD",time:daysAgo(2),icon:"📅"},
  {id:5,type:"reply",contactId:11,contactName:"Rachel Green",text:"replied to outreach",detail:"Interested — runs existing farm-to-table program.",time:daysAgo(1),icon:"💬"},
  {id:6,type:"task",contactId:4,contactName:"Kevin Williams",text:"Task added",detail:"Send pricing sheet by May 5",time:daysAgo(1),icon:"✅"},
  {id:7,type:"email",contactId:6,contactName:"Robert Kim",text:"Email sent",detail:"General outreach — Somerset Hills SD",time:daysAgo(4),icon:"📧"},
  {id:8,type:"email",contactId:2,contactName:"James Okafor",text:"Email sent",detail:"STEM outreach — Bronxville UFSD",time:daysAgo(9),icon:"📧"},
];

const ini=n=>n.split(" ").map(x=>x[0]).join("").toUpperCase().slice(0,2);
const daysInStage=c=>Math.floor((NOW-new Date(c.stageEnteredAt).getTime())/86400000);
const isStuck=c=>{const d=STUCK_DAYS[c.stage];return d&&daysInStage(c)>=d;};
const fmtTime=iso=>{const d=Math.floor((NOW-new Date(iso).getTime())/86400000);return d===0?"Today":d===1?"Yesterday":`${d}d ago`;};
const fmtDate=iso=>new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"});

const B=(v="secondary",s="md")=>{
  const sz=s==="sm"?{padding:"4px 9px",fontSize:11}:s==="xs"?{padding:"2px 7px",fontSize:10}:{padding:"6px 12px",fontSize:12};
  const vs={primary:{background:C.green,color:"white",border:`1px solid ${C.green}`},secondary:{background:"white",color:C.text,border:`1px solid ${C.border}`},blue:{background:C.blue,color:"white",border:`1px solid ${C.blue}`},danger:{background:"#FEE2E2",color:"#A32D2D",border:"1px solid #FECACA"},ghost:{background:"transparent",color:C.textS,border:"1px solid transparent"}};
  return{...sz,...(vs[v]||vs.secondary),borderRadius:6,cursor:"pointer",fontWeight:500};
};
const I=(w="100%")=>({width:w,padding:"6px 10px",border:`1px solid ${C.border}`,borderRadius:6,fontSize:13,outline:"none",color:C.text,background:C.bg,boxSizing:"border-box"});
const SL=()=>({fontSize:10,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.06em",padding:"10px 14px 4px"});

function Tag({label,color,bg,size=10}){return <span style={{fontSize:size,fontWeight:600,padding:"2px 7px",borderRadius:10,background:bg,color,whiteSpace:"nowrap"}}>{label}</span>;}
function Av({name,size=28,color=C.blue}){return <div style={{width:size,height:size,borderRadius:size/4,background:color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:size*0.38,flexShrink:0}}>{ini(name)}</div>;}

function NavItem({icon,label,onClick,active}){
  return <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:6,cursor:"pointer",fontSize:13,color:active?C.gDark:C.textS,background:active?C.gBg:"transparent",fontWeight:active?500:400}}
    onMouseEnter={e=>{if(!active)e.currentTarget.style.background=C.bg;}}
    onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent";}}>
    <span style={{fontSize:14,width:18,textAlign:"center"}}>{icon}</span>{label}
  </div>;
}

function DashboardPage({contacts,activity,onNavigate}){
  const pipeline=contacts.filter(c=>!["Cold","Closed Lost"].includes(c.stage));
  const pipelineVal=pipeline.length*DEAL_VAL;
  const wonVal=contacts.filter(c=>c.stage==="Closed Won").length*DEAL_VAL;
  const stuck=contacts.filter(isStuck);
  const allTasks=contacts.flatMap(c=>(c.tasks||[]).map(t=>({...t,contactName:c.name})));
  const dueTasks=allTasks.filter(t=>!t.done);
  const hot=contacts.filter(c=>["Replied","Demo Scheduled","Proposal Sent"].includes(c.stage));

  return <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
      {[
        {label:"Active Pipeline",value:`$${(pipelineVal/1000).toFixed(0)}k`,sub:`${pipeline.length} deals in progress`,color:C.blue,bg:C.bBg},
        {label:"Closed Won",value:`$${(wonVal/1000).toFixed(0)}k`,sub:`${contacts.filter(c=>c.stage==="Closed Won").length} schools`,color:C.gDark,bg:C.gBg},
        {label:"Stuck Contacts",value:stuck.length,sub:"Need attention",color:stuck.length>0?"#A32D2D":C.textS,bg:stuck.length>0?"#FEE2E2":C.bg},
        {label:"Tasks Due",value:dueTasks.length,sub:"Open items",color:dueTasks.length>0?"#854F0B":C.textS,bg:dueTasks.length>0?"#FAEEDA":C.bg},
      ].map(s=>(
        <div key={s.label} style={{background:s.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px"}}>
          <div style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>{s.label}</div>
          <div style={{fontSize:24,fontWeight:700,color:s.color,lineHeight:1}}>{s.value}</div>
          <div style={{fontSize:11,color:C.textS,marginTop:4}}>{s.sub}</div>
        </div>
      ))}
    </div>

    <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
      <div style={{fontWeight:600,fontSize:13,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        Pipeline by Stage
        <button onClick={()=>onNavigate("pipeline")} style={{...B("ghost","sm"),color:C.blue,fontSize:11}}>View kanban →</button>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"flex-end",height:60}}>
        {STAGES.filter(s=>!["Cold","Closed Lost"].includes(s)).map(stage=>{
          const count=contacts.filter(c=>c.stage===stage).length;
          const max=Math.max(...STAGES.filter(s=>!["Cold","Closed Lost"].includes(s)).map(s=>contacts.filter(c=>c.stage===s).length),1);
          const h=Math.max((count/max)*48,count>0?8:2);
          const m=STAGE_META[stage];
          return <div key={stage} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <div style={{fontSize:10,fontWeight:600,color:m.color}}>{count}</div>
            <div style={{width:"100%",height:h,background:m.bg,border:`1px solid ${m.color}33`,borderRadius:4}}/>
            <div style={{fontSize:9,color:C.textT,textAlign:"center",lineHeight:1.2}}>{stage}</div>
          </div>;
        })}
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>🔥 Who's Hot</div>
        {hot.length===0&&<div style={{fontSize:12,color:C.textT}}>No warm leads yet</div>}
        {hot.map(c=>{
          const[pc]=PER_C[c.persona]||["#6B7280"];
          const m=STAGE_META[c.stage];
          return <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
            <Av name={c.name} size={28} color={pc}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:500,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
              <div style={{fontSize:10,color:C.textS}}>{c.district}</div>
            </div>
            <Tag label={c.stage} color={m.color} bg={m.bg}/>
          </div>;
        })}
      </div>
      <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>✅ Open Tasks <span style={{fontSize:10,color:C.textS,fontWeight:400}}>{dueTasks.length} items</span></div>
        {dueTasks.length===0&&<div style={{fontSize:12,color:C.textT}}>All clear!</div>}
        {dueTasks.map(t=>(
          <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:C.orange,flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.text}</div>
              <div style={{fontSize:10,color:C.textS}}>{t.contactName} · Due {fmtDate(t.due)}</div>
            </div>
          </div>
        ))}
      </div>
    </div>

    {stuck.length>0&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,padding:16}}>
      <div style={{fontWeight:600,fontSize:13,color:"#A32D2D",marginBottom:10}}>⚠️ Stuck Contacts</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {stuck.map(c=>(
          <div key={c.id} style={{display:"flex",alignItems:"center",gap:6,background:"white",border:"1px solid #FECACA",borderRadius:8,padding:"6px 10px"}}>
            <Av name={c.name} size={22} color="#A32D2D"/>
            <div>
              <div style={{fontSize:12,fontWeight:500}}>{c.name}</div>
              <div style={{fontSize:10,color:"#C45252"}}>{c.stage} · {daysInStage(c)}d</div>
            </div>
          </div>
        ))}
      </div>
    </div>}

    <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
      <div style={{fontWeight:600,fontSize:13,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        Recent Activity
        <button onClick={()=>onNavigate("activity")} style={{...B("ghost","sm"),color:C.blue,fontSize:11}}>View all →</button>
      </div>
      {activity.slice(0,5).map(a=>(
        <div key={a.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
          <div style={{width:28,height:28,borderRadius:"50%",background:C.bg,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{a.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12}}><strong>{a.contactName}</strong> {a.text}</div>
            <div style={{fontSize:11,color:C.textS,marginTop:1}}>{a.detail}</div>
          </div>
          <div style={{fontSize:10,color:C.textT,whiteSpace:"nowrap"}}>{fmtTime(a.time)}</div>
        </div>
      ))}
    </div>
  </div>;
}

function KanbanPage({contacts,setContacts,onActivityAdd,onContactClick}){
  const[dragging,setDragging]=useState(null);
  const[dragOver,setDragOver]=useState(null);
  const shownStages=STAGES.filter(s=>s!=="Cold");
  const coldCount=contacts.filter(c=>c.stage==="Cold").length;

  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style={{padding:"8px 20px",background:"#F9FAFB",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.textS,flexShrink:0}}>
      ❄️ <strong style={{color:C.text}}>{coldCount} Cold contacts</strong> not shown · Drag cards to advance · Deal value: <strong style={{color:C.text}}>$50,000</strong>
    </div>
    <div style={{flex:1,overflowX:"auto",overflowY:"hidden",padding:"16px 20px",display:"flex",gap:10}}>
      {shownStages.map(stage=>{
        const cols=contacts.filter(c=>c.stage===stage);
        const m=STAGE_META[stage];
        const isTarget=dragOver===stage;
        return <div key={stage} className="kanban-col"
          onDragOver={e=>{e.preventDefault();setDragOver(stage);}}
          onDrop={e=>{e.preventDefault();if(!dragging||dragging.stage===stage)return;const prev=dragging.stage;setContacts(cs=>cs.map(c=>c.id===dragging.id?{...c,stage,stageEnteredAt:new Date().toISOString()}:c));onActivityAdd({type:"stage",contactId:dragging.id,contactName:dragging.name,text:`moved from ${prev} → ${stage}`,detail:dragging.district,icon:m.icon});setDragging(null);setDragOver(null);}}
          onDragLeave={()=>setDragOver(null)}
          style={{display:"flex",flexDirection:"column",background:isTarget?"#e8f4fc":"#F0F2F5",border:isTarget?`2px dashed ${C.blue}`:"2px solid transparent",borderRadius:10,padding:8,overflowY:"auto"}}>
          <div style={{padding:"4px 4px 10px",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
              <span style={{fontSize:13}}>{m.icon}</span>
              <span style={{fontSize:11,fontWeight:700,color:m.color}}>{stage}</span>
              <span style={{marginLeft:"auto",fontSize:10,fontWeight:600,background:m.bg,color:m.color,padding:"1px 6px",borderRadius:10}}>{cols.length}</span>
            </div>
            {cols.length>0&&stage!=="Closed Lost"&&<div style={{fontSize:10,color:C.textS}}>${(cols.length*DEAL_VAL/1000).toFixed(0)}k</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,flex:1}}>
            {cols.map(c=>{
              const[pc,pb]=PER_C[c.persona]||["#6B7280","#F1EFE8"];
              const stuck=isStuck(c);
              const openTasks=(c.tasks||[]).filter(t=>!t.done).length;
              return <div key={c.id} className="kanban-card" draggable
                onDragStart={e=>{setDragging(c);e.dataTransfer.effectAllowed="move";}}
                onDragEnd={()=>{setDragging(null);setDragOver(null);}}
                onClick={()=>onContactClick(c)}
                style={{background:"white",border:stuck?"1px solid #FECACA":`1px solid ${C.border}`,borderRadius:8,padding:10,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",opacity:dragging?.id===c.id?0.4:1}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                  <Av name={c.name} size={24} color={pc}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                    <div style={{fontSize:9,color:C.textS,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.role}</div>
                  </div>
                </div>
                <div style={{fontSize:10,color:C.textS,marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.district}</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  <Tag label={c.persona} color={pc} bg={pb} size={9}/>
                  {stuck&&<Tag label={`${daysInStage(c)}d stuck`} color="#A32D2D" bg="#FEE2E2" size={9}/>}
                  {openTasks>0&&<Tag label={`${openTasks} task${openTasks>1?"s":""}`} color="#854F0B" bg="#FAEEDA" size={9}/>}
                </div>
              </div>;
            })}
            {cols.length===0&&<div style={{textAlign:"center",padding:"20px 8px",fontSize:11,color:C.textT,border:`1px dashed ${C.border}`,borderRadius:8}}>Drop here</div>}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

function ActivityPage({activity}){
  const typeFilters=["All","email","reply","stage","demo","task"];
  const[filter,setFilter]=useState("All");
  const filtered=filter==="All"?activity:activity.filter(a=>a.type===filter);
  const typeColors={email:[C.blue,"#E6F1FB"],reply:["#0F6E56","#E1F5EE"],stage:["#854F0B","#FAEEDA"],demo:["#5B21B6","#EDE9FE"],task:["#065F46","#D1FAE5"]};

  return <>
    <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`}}>
      <div style={{fontWeight:700,fontSize:16}}>Activity Feed</div>
      <div style={{fontSize:12,color:C.textS,marginTop:1}}>Every touch, stage change, reply, and task</div>
    </div>
    <div style={{display:"flex",gap:6,padding:"8px 20px",background:C.surface,borderBottom:`1px solid ${C.border}`}}>
      {typeFilters.map(f=>(
        <button key={f} onClick={()=>setFilter(f)} style={{...B(filter===f?"primary":"secondary","sm"),borderRadius:20,textTransform:"capitalize"}}>{f}</button>
      ))}
      <span style={{marginLeft:"auto",fontSize:12,color:C.textS,alignSelf:"center"}}>{filtered.length} events</span>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
      <div style={{maxWidth:640,margin:"0 auto",display:"flex",flexDirection:"column",gap:0}}>
        {filtered.map((a,i)=>{
          const[tc,tb]=typeColors[a.type]||[C.textS,C.bg];
          return <div key={a.id} style={{display:"flex",gap:12,paddingBottom:16,position:"relative"}}>
            {i<filtered.length-1&&<div style={{position:"absolute",left:13,top:28,bottom:0,width:1,background:C.border}}/>}
            <div style={{width:28,height:28,borderRadius:"50%",background:tb,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0,zIndex:1}}>{a.icon}</div>
            <div style={{flex:1,background:"white",border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                <span style={{fontWeight:600,fontSize:12}}>{a.contactName}</span>
                <span style={{fontSize:12,color:C.textS}}>{a.text}</span>
                <Tag label={a.type} color={tc} bg={tb} size={9}/>
                <span style={{marginLeft:"auto",fontSize:10,color:C.textT}}>{fmtTime(a.time)}</span>
              </div>
              {a.detail&&<div style={{fontSize:11,color:C.textS,lineHeight:1.5}}>{a.detail}</div>}
            </div>
          </div>;
        })}
      </div>
    </div>
  </>;
}

function ContactModal({contact,onClose,onStageChange,onTaskAdd,onTaskToggle}){
  const[newTask,setNewTask]=useState("");
  const[newDue,setNewDue]=useState("");
  const[pc,pb]=PER_C[contact.persona]||["#6B7280","#F1EFE8"];
  const m=STAGE_META[contact.stage];
  const tasks=contact.tasks||[];

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:12,width:480,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)",padding:24}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:18}}>
        <Av name={contact.name} size={44} color={pc}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:17}}>{contact.name}</div>
          <div style={{fontSize:12,color:C.textS,marginTop:2}}>{contact.role} · {contact.district}</div>
          <div style={{fontSize:11,color:C.textS,marginTop:1}}>{contact.email}</div>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.textT}}>✕</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center"}}>
        <Tag label={contact.persona} color={pc} bg={pb}/>
        <Tag label={contact.stage} color={m.color} bg={m.bg}/>
        {isStuck(contact)&&<Tag label={`${daysInStage(contact)}d stuck`} color="#A32D2D" bg="#FEE2E2"/>}
        <span style={{fontSize:11,color:C.textS,marginLeft:"auto"}}>{daysInStage(contact)}d in stage</span>
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:10,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Move to stage</div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {STAGES.map(s=>{const sm=STAGE_META[s];return <button key={s} onClick={()=>onStageChange(contact.id,s)} style={{...B("secondary","xs"),background:contact.stage===s?sm.bg:"white",color:contact.stage===s?sm.color:C.textS,border:`1px solid ${contact.stage===s?sm.color:C.border}`,fontWeight:contact.stage===s?600:400}}>{sm.icon} {s}</button>;})}
        </div>
      </div>
      {contact.notes&&<div style={{marginBottom:16}}>
        <div style={{fontSize:10,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Notes</div>
        <div style={{fontSize:13,color:C.textS,lineHeight:1.6,background:C.bg,borderRadius:6,padding:"8px 10px"}}>{contact.notes}</div>
      </div>}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:10,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Tasks</div>
        {tasks.length===0&&<div style={{fontSize:12,color:C.textT,marginBottom:8}}>No tasks yet</div>}
        {tasks.map(t=>(
          <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
            <input type="checkbox" checked={t.done} onChange={()=>onTaskToggle(contact.id,t.id)} style={{accentColor:C.green,cursor:"pointer"}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:500,textDecoration:t.done?"line-through":"none",color:t.done?C.textT:C.text}}>{t.text}</div>
              <div style={{fontSize:10,color:C.textS}}>Due {fmtDate(t.due)}</div>
            </div>
          </div>
        ))}
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <input value={newTask} onChange={e=>setNewTask(e.target.value)} placeholder="Add a task..." style={{...I(),fontSize:12,padding:"5px 8px",flex:1}}/>
          <input type="date" value={newDue} onChange={e=>setNewDue(e.target.value)} style={{...I("130px"),fontSize:12,padding:"5px 8px"}}/>
          <button onClick={()=>{if(newTask&&newDue){onTaskAdd(contact.id,{text:newTask,due:newDue});setNewTask("");setNewDue("");}}} style={B("primary","sm")}>Add</button>
        </div>
      </div>
      <button onClick={onClose} style={B("secondary")}>Close</button>
    </div>
  </div>;
}

function App(){
  const[contacts,setContacts]=useState(SEED_CONTACTS);
  const[activity,setActivity]=useState(SEED_ACTIVITY);
  const[page,setPage]=useState("dashboard");
  const[selectedContact,setSelectedContact]=useState(null);
  const actIdRef=useRef(SEED_ACTIVITY.length+1);
  const taskIdRef=useRef(10);

  function addActivity(evt){setActivity(prev=>[{...evt,id:actIdRef.current++,time:new Date().toISOString()},...prev]);}

  function handleStageChange(contactId,stage){
    const c=contacts.find(x=>x.id===contactId);
    if(!c||c.stage===stage)return;
    const prev=c.stage;
    setContacts(cs=>cs.map(x=>x.id===contactId?{...x,stage,stageEnteredAt:new Date().toISOString()}:x));
    addActivity({type:"stage",contactId,contactName:c.name,text:`moved from ${prev} → ${stage}`,detail:c.district,icon:STAGE_META[stage].icon});
    if(selectedContact?.id===contactId)setSelectedContact(p=>({...p,stage,stageEnteredAt:new Date().toISOString()}));
  }

  function handleTaskAdd(contactId,task){
    const newTask={...task,id:taskIdRef.current++,done:false};
    setContacts(cs=>cs.map(c=>c.id===contactId?{...c,tasks:[...(c.tasks||[]),newTask]}:c));
    const c=contacts.find(x=>x.id===contactId);
    addActivity({type:"task",contactId,contactName:c?.name||"",text:"Task added",detail:`${task.text} · Due ${fmtDate(task.due)}`,icon:"✅"});
    if(selectedContact?.id===contactId)setSelectedContact(p=>({...p,tasks:[...(p.tasks||[]),newTask]}));
  }

  function handleTaskToggle(contactId,taskId){
    setContacts(cs=>cs.map(c=>c.id===contactId?{...c,tasks:(c.tasks||[]).map(t=>t.id===taskId?{...t,done:!t.done}:t)}:c));
    if(selectedContact?.id===contactId)setSelectedContact(p=>({...p,tasks:(p.tasks||[]).map(t=>t.id===taskId?{...t,done:!t.done}:t)}));
  }

  const stats={total:contacts.length,pipeline:contacts.filter(c=>!["Cold","Closed Lost"].includes(c.stage)).length,won:contacts.filter(c=>c.stage==="Closed Won").length};

  return <div style={{fontFamily:"system-ui,sans-serif",background:C.bg,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",fontSize:13,color:C.text}}>

    {/* TOPBAR */}
    <div style={{height:52,background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",padding:"0 16px",gap:12,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:8,width:195,flexShrink:0}}>
        <div style={{width:28,height:28,borderRadius:6,background:C.green,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:12}}>IG</div>
        <div><div style={{fontWeight:700,fontSize:13}}>Inspired Growing</div><div style={{fontSize:10,color:C.textS}}>CRM · Phase 2</div></div>
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
        {[[stats.total,"contacts"],[stats.pipeline,"active"],[stats.won,"won"]].map(([v,l])=>(
          <div key={l} style={{fontSize:12,color:C.textS,padding:"3px 10px",background:C.bg,borderRadius:20,border:`1px solid ${C.border}`}}><strong style={{color:C.text}}>{v}</strong> {l}</div>
        ))}
        <div style={{width:28,height:28,borderRadius:"50%",background:C.blue,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:11,fontWeight:600}}>EW</div>
      </div>
    </div>

    <div style={{display:"flex",flex:1,overflow:"hidden"}}>

      {/* SIDEBAR */}
      <div style={{width:195,background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",padding:"10px 8px",gap:2,flexShrink:0}}>
        <div style={SL()}>Pipeline</div>
        <NavItem icon="📊" label="Dashboard" onClick={()=>setPage("dashboard")} active={page==="dashboard"}/>
        <NavItem icon="📋" label="Pipeline" onClick={()=>setPage("pipeline")} active={page==="pipeline"}/>
        <NavItem icon="⚡" label="Activity Feed" onClick={()=>setPage("activity")} active={page==="activity"}/>
        <div style={SL()}>Outreach</div>
        <NavItem icon="👥" label="Contacts" onClick={()=>window.location.href='/contacts.html'} active={false}/>
        <NavItem icon="✉️" label="Compose" onClick={()=>window.location.href='/contacts.html'} active={false}/>
        <NavItem icon="📁" label="Resources" onClick={()=>window.location.href='/contacts.html'} active={false}/>
        <NavItem icon="⚙️" label="Email Templates" onClick={()=>window.location.href='/contacts.html'} active={false}/>
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {page==="dashboard"&&<>
          <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`}}>
            <div style={{fontWeight:700,fontSize:16}}>Dashboard</div>
            <div style={{fontSize:12,color:C.textS,marginTop:1}}>Pipeline overview · Who's hot · Tasks · Activity</div>
          </div>
          <DashboardPage contacts={contacts} activity={activity} onNavigate={setPage}/>
        </>}
        {page==="pipeline"&&<>
          <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`}}>
            <div style={{fontWeight:700,fontSize:16}}>Pipeline</div>
            <div style={{fontSize:12,color:C.textS,marginTop:1}}>Drag cards to advance stages · Click for details & tasks · $50,000 per deal</div>
          </div>
          <KanbanPage contacts={contacts} setContacts={setContacts} onActivityAdd={addActivity} onContactClick={c=>setSelectedContact(contacts.find(x=>x.id===c.id)||c)}/>
        </>}
        {page==="activity"&&<ActivityPage activity={activity} contacts={contacts}/>}
      </div>
    </div>

    {/* COLOR BAR */}
    <div style={{height:4,display:"flex",flexShrink:0}}>
      {[C.lavender,C.lightblue,C.blue,C.green,C.yellow,C.orange,C.coral].map(col=><div key={col} style={{flex:1,background:col}}/>)}
    </div>

    {selectedContact&&<ContactModal contact={selectedContact} onClose={()=>setSelectedContact(null)} onStageChange={handleStageChange} onTaskAdd={handleTaskAdd} onTaskToggle={handleTaskToggle}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

function signInWithGoogle() {
  return new Promise((resolve, reject) => {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: GMAIL_SCOPE,
      callback: (response) => {
        if (response.error) { reject(response.error); return; }
        googleAccessToken = response.access_token;
        resolve(response.access_token);
      },
    });
    client.requestAccessToken();
  });
}

async function getGmailToken() {
  if (googleAccessToken) return googleAccessToken;
  return await signInWithGoogle();
}

async function sbFetch(path, opts={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
      ...(opts.headers||{})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
              <div style={{fontWeight:600,fontSize:14,color:C.text}}>{c.name||c.email||"Unknown"}</div>
              {isNew&&<span style={{fontSize:10,fontWeight:700,color:"#065F46",background:"#D1FAE5",padding:"2px 8px",borderRadius:10}}>NEW</span>}
            </div>
            <div style={{fontSize:12,color:C.textS,marginBottom:4}}>{c.email}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:10,fontWeight:600,color:pc,background:pb,padding:"2px 8px",borderRadius:10}}>{c.persona}</span>
              <span style={{fontSize:10,fontWeight:600,color:"#065F46",background:"#D1FAE5",padding:"2px 8px",borderRadius:10}}>{c.lead_source}</span>
              <Tag label={c.stage} color={STAGE_META[c.stage]?.color||"#6B7280"} bg={STAGE_META[c.stage]?.bg||"#F3F4F6"}/>
              <span style={{fontSize:11,color:C.textT}}>{fmtDT2(c.stageEnteredAt)}</span>
            </div>
            {c.notes&&<div style={{fontSize:12,color:C.textS,marginTop:6,padding:"6px 10px",background:C.bg,borderRadius:6,fontStyle:"italic"}}>"{c.notes}"</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
            <button onClick={()=>onCompose(c)} style={B("primary","sm")}>✉ Compose</button>
          </div>
        </div>;
      })}
    </div>
  </>;
}


function Spinner({size=12}){return <div style={{width:size,height:size,border:`2px solid rgba(255,255,255,0.4)`,borderTopColor:"white",borderRadius:"50%",animation:"spin 0.7s linear infinite",flexShrink:0}}/>;}

function EnrollModal({seq,contacts,enrollments,onClose,onEnroll}){
  const[search,setSearch]=useState("");
  const[sel,setSel]=useState(new Set());
  const alreadyEnrolled=new Set(enrollments.filter(e=>e.sequence_id===seq.id).map(e=>e.contact_id));
  const eligible=contacts.filter(c=>!c.isUnsubscribed&&!c.bounced&&!alreadyEnrolled.has(c.id)&&(!search||`${c.name} ${c.district} ${c.role}`.toLowerCase().includes(search.toLowerCase())));
  function toggle(id){setSel(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;});}
  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:12,width:520,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,0.2)",overflow:"hidden"}}>
      <div style={{padding:"16px 20px",borderBottom:`1px solid #E4E7EC`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontWeight:700,fontSize:15}}>Enroll Contacts</div><div style={{fontSize:12,color:"#6B7280",marginTop:2}}>into "{seq.name}"</div></div>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#9CA3AF"}}>✕</button>
      </div>
      <div style={{padding:"10px 16px",borderBottom:`1px solid #E4E7EC`}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search contacts..." style={{width:"100%",padding:"7px 10px",border:`1px solid #E4E7EC`,borderRadius:6,fontSize:13,outline:"none"}}/>
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        {eligible.map(c=>{const[pc,pb]=PER_C[c.persona]||["#6B7280","#F1EFE8"];const chk=sel.has(c.id);return <div key={c.id} onClick={()=>toggle(c.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",cursor:"pointer",background:chk?"#edf7f2":"white",borderBottom:`1px solid #E4E7EC`}} onMouseEnter={e=>e.currentTarget.style.background=chk?"#e0f3ec":"#f9fffe"} onMouseLeave={e=>e.currentTarget.style.background=chk?"#edf7f2":"white"}><input type="checkbox" checked={chk} onChange={()=>{}} style={{accentColor:"#65C39D",cursor:"pointer",flexShrink:0}}/><div style={{width:28,height:28,borderRadius:7,background:pc,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:11,flexShrink:0}}>{(c.name||"?").split(" ").map(x=>x[0]).join("").toUpperCase().slice(0,2)}</div><div style={{flex:1,minWidth:0}}><div style={{fontWeight:500,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div><div style={{fontSize:11,color:"#6B7280",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.role} · {c.district}</div></div><span style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:10,background:pb,color:pc,whiteSpace:"nowrap"}}>{c.persona}</span></div>;})}
        {eligible.length===0&&<div style={{padding:40,textAlign:"center",color:"#9CA3AF",fontSize:12}}>No eligible contacts found</div>}
      </div>
      <div style={{padding:"12px 16px",borderTop:`1px solid #E4E7EC`,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:12,color:"#6B7280"}}>{sel.size} selected · {eligible.length} eligible</span>
        <button onClick={()=>{onEnroll(seq.id,[...sel]);onClose();}} disabled={sel.size===0} style={{marginLeft:"auto",padding:"6px 16px",fontSize:12,background:"#65C39D",color:"white",border:"1px solid #65C39D",borderRadius:6,cursor:sel.size===0?"not-allowed":"pointer",opacity:sel.size===0?0.4:1,fontWeight:500}}>Enroll {sel.size>0?sel.size:""} Contact{sel.size!==1?"s":""}</button>

}

function SequencesPage({contacts,sequences,setSequences,enrollments,setEnrollments,seqLog,setSeqLog}){
  const[newOpen,setNewOpen]=useState(false);
  const[newName,setNewName]=useState("Cold Outreach — Standard");
  const[newInterval,setNewInterval]=useState(7);
  const[newBrake,setNewBrake]=useState(50);
  const[saving,setSaving]=useState(false);
  const[enrollTarget,setEnrollTarget]=useState(null);

  async function createSeq(){
    const tmpl=SEQUENCE_TEMPLATES[newName];
    if(!tmpl)return;
    setSaving(true);
    try{
      const rows=await sbFetch("sequences",{method:"POST",body:JSON.stringify({
        name:newName, template_id:tmpl.id, status:"paused",
        interval_minutes:newInterval, emergency_brake_threshold:newBrake,
        started_at:new Date().toISOString()
      })});
      setSequences(p=>[...p,rows[0]]);
      setNewOpen(false);
    }catch(e){alert("Error creating sequence: "+e.message);}
    setSaving(false);
  }

  async function toggleStatus(seq){
    const newStatus=seq.status==="active"?"paused":"active";
    await sbFetch(`sequences?id=eq.${seq.id}`,{method:"PATCH",body:JSON.stringify({status:newStatus})});
    setSequences(p=>p.map(s=>s.id===seq.id?{...s,status:newStatus}:s));
  }

  async function brakeSeq(seq){
    await sbFetch(`sequences?id=eq.${seq.id}`,{method:"PATCH",body:JSON.stringify({status:"braked"})});
    setSequences(p=>p.map(s=>s.id===seq.id?{...s,status:"braked"}:s));
  }

  async function resetBrake(seq){
    await sbFetch(`sequences?id=eq.${seq.id}`,{method:"PATCH",body:JSON.stringify({status:"paused"})});
    setSequences(p=>p.map(s=>s.id===seq.id?{...s,status:"paused"}:s));
  }

  async function handleEnroll(seqId, contactIds){
    const now=new Date().toISOString();
    const rows=contactIds.map(cid=>({
      sequence_id:seqId, contact_id:cid,
      current_step:0, status:"active",
      enrolled_at:now, next_send_at:now
    }));
    try{
      const inserted=await sbFetch("enrollments",{method:"POST",body:JSON.stringify(rows)});
      setEnrollments(p=>[...p,...inserted]);
      // Update pipeline stage to Contacted for Cold contacts
      for(const cid of contactIds){
        const c=contacts.find(x=>x.id===cid);
        if(c&&c.stage==="Cold"){
          await sbFetch(`contacts?id=eq.${cid}`,{method:"PATCH",body:JSON.stringify({pipeline_stage:"Contacted"})});
        }
      }
    }catch(e){alert("Error enrolling: "+e.message);}
  }

  return <>
    <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center"}}>
      <div><div style={{fontWeight:700,fontSize:16}}>Sequences</div><div style={{fontSize:12,color:C.textS,marginTop:1}}>Automated drip sequences · staggered sending · review queue</div></div>
      <button onClick={()=>setNewOpen(true)} style={{...B("primary","sm"),marginLeft:"auto"}}>+ New Sequence</button>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:"#F0F9FF",border:"1px solid #BAE6FD",borderRadius:10,padding:"12px 16px",display:"flex",gap:10}}>
        <span style={{fontSize:18,flexShrink:0}}>⏱</span>
        <div>
          <div style={{fontWeight:600,fontSize:13,color:"#0369A1",marginBottom:3}}>Slow Drip Mode — Active</div>
          <div style={{fontSize:12,color:"#0284C7",lineHeight:1.6}}>Emails send 1 at a time with a configurable gap (default: every 7 minutes). This mimics human sending behavior and avoids Gmail's automated spam filters. The Emergency Brake automatically pauses any sequence if bounce rate exceeds threshold or an API error is detected.</div>
        </div>
      </div>

      {sequences.length===0&&<div style={{padding:40,textAlign:"center",color:C.textT}}>
        <div style={{fontSize:32,marginBottom:8}}>🔄</div>
        <div style={{fontWeight:500,color:C.textS}}>No sequences yet</div>
        <div style={{fontSize:12,marginTop:4}}>Create your first sequence to start automating outreach</div>
      </div>}

      {sequences.map(seq=>{
        const tmpl=Object.values(SEQUENCE_TEMPLATES).find(t=>t.id===seq.template_id)||Object.values(SEQUENCE_TEMPLATES)[0];
        const seqEnrollments=enrollments.filter(e=>e.sequence_id===seq.id);
        const activeEnrollments=seqEnrollments.filter(e=>e.status==="active");
        const sentCount=seqLog.filter(l=>l.sequence_id===seq.id).length;
        const recentLogs=seqLog.filter(l=>l.sequence_id===seq.id).slice(0,4);
        const sm={active:{color:C.gDark,bg:C.gBg,label:"● Active"},paused:{color:"#854F0B",bg:"#FAEEDA",label:"⏸ Paused"},braked:{color:"#A32D2D",bg:"#FEE2E2",label:"🛑 Emergency Brake"}}[seq.status]||{color:"#854F0B",bg:"#FAEEDA",label:"⏸ Paused"};

        return <div key={seq.id} style={{background:"white",border:`1px solid ${seq.status==="braked"?"#FECACA":C.border}`,borderRadius:10,overflow:"hidden"}}>
          {seq.status==="braked"&&<div style={{background:"#FEE2E2",borderBottom:"1px solid #FECACA",padding:"8px 16px",display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#A32D2D"}}>
            <span>🛑</span><strong>Emergency Brake Triggered</strong> — Review logs before resuming.
            <button onClick={()=>resetBrake(seq)} style={{marginLeft:"auto",...B("secondary","sm")}}>Reset</button>
          </div>}
          <div style={{padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:12}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <div style={{fontWeight:700,fontSize:14}}>{seq.name}</div>
                  <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:10,background:sm.bg,color:sm.color}}>{sm.label}</span>
                </div>
                <div style={{fontSize:12,color:C.textS}}>{tmpl?.description}</div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setEnrollTarget(seq)} style={B("secondary","sm")}>+ Enroll</button>
                {seq.status!=="braked"&&<button onClick={()=>toggleStatus(seq)} style={B(seq.status==="active"?"warning":"primary","sm")}>{seq.status==="active"?"⏸ Pause":"▶ Resume"}</button>}
                <button onClick={()=>brakeSeq(seq)} style={B("danger","sm")}>🛑 Brake</button>
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
              {[["Enrolled",seqEnrollments.length,"#185FA5","#E6F1FB"],["Active",activeEnrollments.length,C.gDark,C.gBg],["Sent",sentCount,"#5B21B6","#EDE9FE"],["Completed",seqEnrollments.filter(e=>e.status==="completed").length,"#9CA3AF","#F3F4F6"]].map(([l,v,col,bg])=>(
                <div key={l} style={{background:bg,borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                  <div style={{fontSize:18,fontWeight:700,color:col,lineHeight:1}}>{v}</div>
                  <div style={{fontSize:10,color:C.textS,marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>

            <div style={{display:"flex",gap:12,padding:"8px 10px",background:C.bg,borderRadius:8,fontSize:12,color:C.textS,marginBottom:12}}>
              <span>⏱ <strong style={{color:C.text}}>{seq.interval_minutes} min</strong> between sends</span>
              <span>·</span>
              <span>🛑 Brake at <strong style={{color:C.text}}>{seq.emergency_brake_threshold}</strong> sends</span>
              <span>·</span>
              <span>Started <strong style={{color:C.text}}>{fmtTime(seq.started_at||seq.created_at)}</strong></span>
            </div>

            <div style={{fontSize:11,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Sequence steps</div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:recentLogs.length>0?12:0}}>
              {tmpl?.steps.map((step,i)=>(
                <React.Fragment key={i}>
                  <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",fontSize:11}}>
                    <div style={{fontWeight:600}}>Day {step.day}: {step.label}</div>
                    <div style={{color:C.textS,marginTop:1,display:"flex",gap:4,alignItems:"center"}}>
                      {step.approvalRequired&&<span style={{fontSize:9,fontWeight:600,color:"#854F0B",background:"#FAEEDA",padding:"1px 5px",borderRadius:4}}>APPROVAL</span>}
                      <span style={{fontSize:10}}>{step.type.replace(/_/g," ")}</span>
                    </div>
                  </div>
                  {i<tmpl.steps.length-1&&<span style={{color:C.textT}}>→</span>}
                </React.Fragment>
              ))}
            </div>

            {recentLogs.length>0&&<>
              <div style={{fontSize:11,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,marginTop:4}}>Recent sends</div>
              {recentLogs.map((l,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:11,color:C.textS,marginBottom:3}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:C.green,flexShrink:0}}/>
                  <strong style={{color:C.text}}>{l.contact_name}</strong>
                  <span>{l.step_label}</span>
                  <span style={{marginLeft:"auto",color:C.textT}}>{fmtTime(l.sent_at)}</span>
                </div>
              ))}
            </>}
          </div>
        </div>;
      })}
    </div>

    {newOpen&&<div onClick={()=>setNewOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:12,width:500,boxShadow:"0 20px 60px rgba(0,0,0,0.2)",padding:24}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:16,display:"flex",justifyContent:"space-between"}}>
          New Sequence
          <button onClick={()=>setNewOpen(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.textT}}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
          <div>
            <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",display:"block",marginBottom:4}}>Template</label>
            <select value={newName} onChange={e=>setNewName(e.target.value)} style={I()}>
              {Object.keys(SEQUENCE_TEMPLATES).map(k=><option key={k} value={k}>{k}</option>)}
            </select>
            <div style={{fontSize:11,color:C.textS,marginTop:4}}>{SEQUENCE_TEMPLATES[newName]?.description}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>
              <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",display:"block",marginBottom:4}}>Interval (minutes)</label>
              <input type="number" value={newInterval} onChange={e=>setNewInterval(Number(e.target.value))} min={1} max={60} style={I()}/>
              <div style={{fontSize:10,color:C.textT,marginTop:3}}>Recommended: 5–10 min</div>
            </div>
            <div>
              <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",display:"block",marginBottom:4}}>Emergency Brake</label>
              <input type="number" value={newBrake} onChange={e=>setNewBrake(Number(e.target.value))} min={1} max={200} style={I()}/>
              <div style={{fontSize:10,color:C.textT,marginTop:3}}>Max sends before auto-pause</div>
            </div>
          </div>
        </div>
        <div style={{padding:"10px 14px",background:"#FFF7ED",borderRadius:8,border:"1px solid #FED7AA",fontSize:12,color:"#92400E",marginBottom:16}}>
          ⚠ All emails include a <strong>CAN-SPAM compliant footer</strong> with your address and a personalized unsubscribe link.
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
          <button onClick={()=>setNewOpen(false)} style={B("secondary")}>Cancel</button>
          <button onClick={createSeq} disabled={saving} style={{...B("primary"),opacity:saving?0.6:1}}>
            {saving?<span style={{display:"flex",alignItems:"center",gap:6}}><Spinner/>Creating…</span>:"Create Sequence"}
          </button>
        </div>
      </div>
    </div>}

    {enrollTarget&&<EnrollModal
      seq={enrollTarget}
      contacts={contacts}
      enrollments={enrollments}
      onClose={()=>setEnrollTarget(null)}
      onEnroll={handleEnroll}
    />}
  </>;
}

// ── Review Queue Page ─────────────────────────────────────────────────────────

function ReviewQueuePage({contacts,enrollments,seqLog,setSeqLog,sequences}){
  const[selected,setSelected]=useState(null);
  const[approving,setApproving]=useState(false);

  // Build a queue from active enrollments that need approval for their current step
  const queue = enrollments
    .filter(e=>e.status==="active")
    .map(e=>{
      const c=contacts.find(x=>x.id===e.contact_id);
      const seq=sequences.find(x=>x.id===e.sequence_id);
      if(!c||!seq)return null;
      const tmpl=Object.values(SEQUENCE_TEMPLATES).find(t=>t.id===seq.template_id);
      const step=tmpl?.steps[e.current_step];
      if(!step||!step.approvalRequired)return null;
      const alreadySent=seqLog.find(l=>l.sequence_id===seq.id&&l.contact_id===c.id&&l.step_label===step.label);
      if(alreadySent)return null;
      return {
        enrollmentId:e.id, sequenceId:seq.id, sequenceName:seq.name,
        contactId:c.id, contactName:c.name, contactDistrict:c.district,
        contactPersona:c.persona, stepLabel:step.label, stepIndex:e.current_step,
        subject:`A program worth knowing about for ${c.school||c.district}`,
        scheduledFor:e.next_send_at||new Date().toISOString(),
        status:"pending",
        body:`Hi ${getFirstName(c.name)},\n\n[AI-generated hook for ${c.district} will appear here]\n\nInspired Growing installs compact aeroponic classroom farms in K-12 schools — students grow and harvest fresh greens every 7 days, producing around 100 salads a week right in the building.\n\nWould it be worth a quick 10-minute call?\n\nEric Wagner\nInspired Growing\ninspiredgrowing.com\n\n${canSpamFooter(c.id)}`,
      };
    }).filter(Boolean);

  const [editBodies, setEditBodies] = useState({});

  async function approve(item){
    setApproving(true);
    try{
      // Log the send
      const logRow={
        sequence_id:item.sequenceId, contact_id:item.contactId,
        contact_name:item.contactName, step_label:item.stepLabel,
        subject:item.subject, status:"sent", sent_at:new Date().toISOString()
      };
      const inserted=await sbFetch("sequence_log",{method:"POST",body:JSON.stringify(logRow)});
      setSeqLog(p=>[inserted[0],...p]);
      // Advance enrollment step
      await sbFetch(`enrollments?id=eq.${item.enrollmentId}`,{method:"PATCH",body:JSON.stringify({current_step:item.stepIndex+1})});
      // Update contact pipeline stage
      await sbFetch(`contacts?id=eq.${item.contactId}`,{method:"PATCH",body:JSON.stringify({pipeline_stage:"Contacted",last_touch:new Date().toISOString().split("T")[0]})});
    }catch(e){alert("Error approving: "+e.message);}
    setApproving(false);
    setSelected(null);
  }

  async function reject(item){
    // Mark enrollment as paused for this contact
    await sbFetch(`enrollments?id=eq.${item.enrollmentId}`,{method:"PATCH",body:JSON.stringify({status:"paused"})});
    setSelected(null);
  }

  return <>
    <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center"}}>
      <div><div style={{fontWeight:700,fontSize:16}}>Review Queue</div><div style={{fontSize:12,color:C.textS,marginTop:1}}>Approve or reject emails before they send</div></div>
      {queue.length>0&&<span style={{marginLeft:"auto",fontSize:12,fontWeight:600,color:"#854F0B",background:"#FAEEDA",padding:"3px 10px",borderRadius:20,border:"1px solid #FDE68A"}}>{queue.length} awaiting approval</span>}
    </div>
    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <div style={{width:300,borderRight:`1px solid ${C.border}`,overflowY:"auto",flexShrink:0}}>
        {queue.length===0&&<div style={{padding:40,textAlign:"center",color:C.textT,fontSize:12}}>
          <div style={{fontSize:28,marginBottom:8}}>📬</div>
          No emails pending review
        </div>}
        {queue.map(q=>(
          <div key={q.enrollmentId} onClick={()=>setSelected(q)}
            style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,cursor:"pointer",background:selected?.enrollmentId===q.enrollmentId?C.gBg:"white",borderLeft:selected?.enrollmentId===q.enrollmentId?`3px solid ${C.green}`:"3px solid transparent"}}
            onMouseEnter={e=>{if(selected?.enrollmentId!==q.enrollmentId)e.currentTarget.style.background=C.bg;}}
            onMouseLeave={e=>{if(selected?.enrollmentId!==q.enrollmentId)e.currentTarget.style.background="white";}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>

  const unsubs=contacts.filter(c=>c.isUnsubscribed);

  async function toggleUnsub(c, val){
    await sbFetch(`contacts?id=eq.${c.id}`,{method:"PATCH",body:JSON.stringify({pipeline_stage:val?"Cold":"Bounced"})}).catch(console.error);
    setContacts(p=>p.map(x=>x.id===c.id?{...x,isUnsubscribed:val}:x));

  return <>
    <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`}}>

              <div style={{fontSize:22,fontWeight:700,color:col}}>{v}</div>

          <div key={c.id} style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>

            <Tag label="Unsubscribed" color="#A32D2D" bg="#FEE2E2"/>

      {bounced.length>0&&<div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontWeight:600,fontSize:13}}>Bounced</div>

function StrategicPage({contacts,setContacts,onCompose,onEdit}){
  const[search,setSearch]=useState("");
  const[addingGoal,setAddingGoal]=useState(null);
  const strategic=contacts.filter(c=>c.is_strategic).filter(c=>
    !search||`${c.name} ${c.school} ${c.district} ${c.role}`.toLowerCase().includes(search.toLowerCase())
  );
  const fmtD=iso=>iso?new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—";

  async function toggleStrategic(c,val){
    await sbFetch(`contacts?id=eq.${c.id}`,{method:"PATCH",body:JSON.stringify({is_strategic:val})});
    setContacts(p=>p.map(x=>x.id===c.id?{...x,is_strategic:val}:x));
  }
  async function saveGoal(c,goal){
    await sbFetch(`contacts?id=eq.${c.id}`,{method:"PATCH",body:JSON.stringify({relationship_goal:goal})});

        <div style={{fontSize:36,marginBottom:8}}>⭐</div>
        <div style={{fontWeight:500,color:C.textS,marginBottom:6}}>No strategic contacts yet</div>
        <div style={{fontSize:12,color:C.textT,maxWidth:340,margin:"0 auto",lineHeight:1.6}}>Open any contact, click ✏️ Edit, and check "Strategic Relationship" to add them here. These contacts won't receive bulk campaign emails.</div>

        const sm=STAGE_META[c.stage]||{color:C.textS,bg:C.bg};
        return <div key={c.id} style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16,display:"flex",gap:14,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>

          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
              <div style={{fontWeight:700,fontSize:14,color:C.text}}>{c.name}</div>
              <Tag label={c.persona} color={pc} bg={pb}/>
              <Tag label={c.stage} color={sm.color} bg={sm.bg}/>

function DashboardPage({contacts,activity,onNavigate}){
  const pipeline=contacts.filter(c=>!["Cold","Closed Lost","Bounced","Declined","Emailed"].includes(c.stage));
  const daysInStage=c=>Math.floor((NOW-new Date(c.stageEnteredAt||NOW).getTime())/86400000);
  const isStuck=c=>{const d=STUCK_DAYS[c.stage];return d&&daysInStage(c)>=d;};
  const stuck=contacts.filter(isStuck);
  const hot=contacts.filter(c=>["Replied","Warm","Demo Scheduled","Proposal Sent","Existing Client"].includes(c.stage));
  const fmtT=iso=>{const d=Math.floor((NOW-new Date(iso).getTime())/86400000);return d===0?"Today":d===1?"Yesterday":`${d}d ago`;};
  return <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
      {[{label:"Total Contacts",value:contacts.length,sub:"in Supabase",color:C.text,bg:C.bg},{label:"Active Pipeline",value:`$${(pipeline.length*50000/1000).toFixed(0)}k`,sub:`${pipeline.length} deals`,color:C.blue,bg:C.bBg},{label:"Replied",value:contacts.filter(c=>c.stage==="Replied").length,sub:"warm leads",color:C.gDark,bg:C.gBg},{label:"Stuck",value:stuck.length,sub:"need attention",color:stuck.length>0?"#A32D2D":C.textS,bg:stuck.length>0?"#FEE2E2":C.bg}].map(s=>(
        <div key={s.label} style={{background:s.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px"}}>
          <div style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>{s.label}</div>
          <div style={{fontSize:24,fontWeight:700,color:s.color,lineHeight:1}}>{s.value}</div>
          <div style={{fontSize:11,color:C.textS,marginTop:4}}>{s.sub}</div>
        </div>
      ))}
    </div>
    <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
      <div style={{fontWeight:600,fontSize:13,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>Pipeline by Stage<button onClick={()=>onNavigate("pipeline")} style={{...B("ghost","sm"),color:C.blue,fontSize:11}}>View kanban →</button></div>
      <div style={{display:"flex",gap:6,alignItems:"flex-end",height:80}}>
        {["Emailed","Direct Contact","Replied","Warm","Demo Scheduled","Proposal Sent"].map(stage=>{const count=contacts.filter(c=>c.stage===stage).length;const max=Math.max(...["Emailed","Direct Contact","Replied","Warm","Demo Scheduled","Proposal Sent"].map(s=>contacts.filter(c=>c.stage===s).length),1);const h=Math.max((count/max)*60,count>0?6:2);const m=STAGE_META[stage]||{color:C.textS,bg:C.bg};return <div key={stage} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div style={{fontSize:10,fontWeight:600,color:m.color}}>{count}</div><div style={{width:"100%",height:h,background:m.bg,border:`1px solid ${m.color}33`,borderRadius:4}}/><div style={{fontSize:9,color:C.textT,textAlign:"center",lineHeight:1.2}}>{stage}</div></div>;})}
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>🔥 Who's Hot</div>
        {hot.slice(0,8).map(c=>{const[pc]=PER_C[c.persona]||["#6B7280"];const m=STAGE_META[c.stage]||{color:C.textS,bg:C.bg};return <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:`1px solid ${C.border}`}}><Av name={c.name} size={28} color={pc}/><div style={{flex:1,minWidth:0}}><div style={{fontWeight:500,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div><div style={{fontSize:10,color:C.textS,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.district}</div></div><Tag label={c.stage} color={m.color} bg={m.bg}/></div>;})}
        {hot.length===0&&<div style={{fontSize:12,color:C.textT}}>No warm leads yet</div>}
      </div>
      <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>📊 Stage Breakdown</div>
        {["Cold","Emailed","Direct Contact","Replied","Warm","Demo Scheduled","Proposal Sent","Bounced","Declined"].map(stage=>{const count=contacts.filter(c=>c.stage===stage).length;if(!count)return null;const m=STAGE_META[stage]||{color:C.textS,bg:C.bg};const pct=contacts.length>0?Math.round(count/contacts.length*100):0;return <div key={stage} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}><span style={{color:m.color,fontWeight:500}}>{stage}</span><span style={{color:C.textS}}>{count} · {pct}%</span></div><div style={{height:5,background:C.bg,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:m.color,borderRadius:3}}/></div></div>;})}
      </div>
    </div>
    {stuck.length>0&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,padding:16}}><div style={{fontWeight:600,fontSize:13,color:"#A32D2D",marginBottom:10}}>⚠️ Stuck Contacts</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{stuck.slice(0,12).map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:6,background:"white",border:"1px solid #FECACA",borderRadius:8,padding:"6px 10px"}}><Av name={c.name} size={22} color="#A32D2D"/><div><div style={{fontSize:12,fontWeight:500}}>{c.name}</div><div style={{fontSize:10,color:"#C45252"}}>{c.stage} · {daysInStage(c)}d</div></div></div>)}</div></div>}
    <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
      <div style={{fontWeight:600,fontSize:13,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>Recent Activity<button onClick={()=>onNavigate("activity")} style={{...B("ghost","sm"),color:C.blue,fontSize:11}}>View all →</button></div>
      {activity.slice(0,6).map(a=><div key={a.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}><div style={{width:28,height:28,borderRadius:"50%",background:C.bg,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{a.icon}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:12}}><strong>{a.contactName}</strong> {a.text}</div><div style={{fontSize:11,color:C.textS,marginTop:1}}>{a.detail}</div></div><div style={{fontSize:10,color:C.textT,whiteSpace:"nowrap"}}>{fmtT(a.time)}</div></div>)}
      {activity.length===0&&<div style={{fontSize:12,color:C.textT}}>No activity yet.</div>}
    </div>
  </div>;
}

function KanbanPage({contacts,setContacts,onActivityAdd,onContactClick}){
  const[dragging,setDragging]=useState(null);
  const[dragOver,setDragOver]=useState(null);
  const[kanbanSearch,setKanbanSearch]=useState("");
  const shownStages=["Emailed","Direct Contact","Replied","Warm","Demo Scheduled","Proposal Sent","Closed Won","Existing Client","Closed Lost"];
  const daysInStage=c=>Math.floor((NOW-new Date(c.stageEnteredAt||NOW).getTime())/86400000);
  const isStuck=c=>{const d=STUCK_DAYS[c.stage];return d&&daysInStage(c)>=d;};
  const coldCount=contacts.filter(c=>c.stage==="Cold").length;
  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style={{padding:"8px 20px",background:"#F9FAFB",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,flexShrink:0}}>

      <input value={kanbanSearch} onChange={e=>setKanbanSearch(e.target.value)} placeholder="🔍 Search pipeline..." style={{...I("220px"),fontSize:12,padding:"5px 10px",background:"white"}}/>
      {kanbanSearch&&<button onClick={()=>setKanbanSearch("")} style={{...B("ghost","sm"),fontSize:11}}>✕ Clear</button>}
    </div>
    <div style={{flex:1,overflowX:"auto",overflowY:"hidden",padding:"16px 20px",display:"flex",gap:10}}>
      {shownStages.map(stage=>{
        const cols=contacts.filter(c=>c.stage===stage&&(!kanbanSearch||`${c.name} ${c.district} ${c.school} ${c.role}`.toLowerCase().includes(kanbanSearch.toLowerCase())));
        const m=STAGE_META[stage]||{color:C.textS,bg:C.bg,icon:"•"};
        const isTarget=dragOver===stage;

  function fillPlaceholders(text, c, forHtml=false){

    const docLinks={
      "BROCHURE":"https://drive.google.com/file/d/1iTS_fMfxFGiojdCQKuS4Jr5FWlBwF7NK/view",
      "ONE-PAGER":"https://drive.google.com/file/d/1iTS_fMfxFGiojdCQKuS4Jr5FWlBwF7NK/view",
      "OVERVIEW":"https://drive.google.com/file/d/1ORU8mIgirKNORTRCcxO2n8a6LN4j6GM5/view",
      "DECK":"https://drive.google.com/file/d/1ORU8mIgirKNORTRCcxO2n8a6LN4j6GM5/view",
      "CURRICULUM":"https://drive.google.com/file/d/1Qt6sSw9PYGbXZmiaM5iJ0QgORGU2KRXN/view",
      "SPECS":"https://drive.google.com/file/d/1Ieb4I7Cc_N90pp5DRqNOLhxH8VxA7GZn/view",
      "GRANT":"https://drive.google.com/file/d/1VLxxJbhJ__s82LXOCINT0iE2PLwAa_G3/view",
    };
    let result = text
      .replace(/\[FIRST NAME\]/gi, first)
      .replace(/\[PRINCIPAL NAME\]/gi, c.name||"")
      .replace(/\[NAME\]/gi, c.name||"")
      .replace(/\[SCHOOL NAME\]/gi, c.school||c.district||"")
      .replace(/\[SCHOOL\]/gi, c.school||c.district||"")
      .replace(/\[DISTRICT\]/gi, c.district||"")
      .replace(/\[ROLE\]/gi, c.role||"")
      .replace(/\[STATE\]/gi, c.state||"")
      .replace(/\[ORG\]/gi, c.school||c.district||"");
    // Replace doc placeholders with HTML buttons or plain URLs
    const docReplacements={
      "BROCHURE":["https://drive.google.com/file/d/1iTS_fMfxFGiojdCQKuS4Jr5FWlBwF7NK/view","Brochure"],
      "ONE-PAGER":["https://drive.google.com/file/d/1iTS_fMfxFGiojdCQKuS4Jr5FWlBwF7NK/view","One-Pager"],
      "OVERVIEW":["https://drive.google.com/file/d/1ORU8mIgirKNORTRCcxO2n8a6LN4j6GM5/view","Program Overview"],
      "DECK":["https://drive.google.com/file/d/1ORU8mIgirKNORTRCcxO2n8a6LN4j6GM5/view","Overview Deck"],
      "CURRICULUM":["https://drive.google.com/file/d/1Qt6sSw9PYGbXZmiaM5iJ0QgORGU2KRXN/view","Curriculum Overview"],
      "SPECS":["https://drive.google.com/file/d/1Ieb4I7Cc_N90pp5DRqNOLhxH8VxA7GZn/view","Specs & Yields"],
      "GRANT":["https://drive.google.com/file/d/1VLxxJbhJ__s82LXOCINT0iE2PLwAa_G3/view","Grant Alignment Guide"],
    };
    for(const [key,[url,label]] of Object.entries(docReplacements)){
      const placeholder="["+key+"]";
      const btnHtml=`<a href="${url}" style="display:inline-block;padding:10px 20px;background:#65C39D;color:white;text-decoration:none;border-radius:6px;font-family:Arial,sans-serif;font-size:13px;font-weight:600">📄 View ${label} →</a>`;
      const plainLink=`\n\nView ${label}: ${url}`;

        result=result.replace(placeholder, forHtml?btnHtml:plainLink);
      }

    return result;
  }

  async function queueEmailsForContacts(selectedContacts,mode,startTime=null){
    setBatchRunning(true);setBatchDone(null);
    setBatchProgress({done:0,total:selectedContacts.length,current:selectedContacts[0]?.name||"",failed:0});
    let done=0,failed=0,failedNames=[];
    const now=startTime?new Date(startTime):new Date();
    for(let i=0;i<selectedContacts.length;i++){
      const c=selectedContacts[i];
      setBatchProgress({done:i,total:selectedContacts.length,current:c.name,failed});
      try{
        const{body,subj}=await generateEmailForContact(c);
        const firstName=getFirstName(c.name);
        const htmlBody=body
          .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          .replace(/\n\n/g,"</p><p style='margin:0 0 12px'>")
          .replace(/\n/g,"<br>");
        const fullHtml=`<div style="font-family:Arial,sans-serif;font-size:14px;line-height:1.6;color:#000">${htmlBody}${campaign!=="customer"?canSpamFooterHtml(c):""}</div>`;
        // Schedule 20 seconds apart
        const scheduledAt=new Date(now.getTime()+(i*20*1000)).toISOString();
        await sbFetch("send_queue",{method:"POST",body:JSON.stringify({
          contact_id:c.id,
          contact_name:c.name,
          to_email:c.email,
          subject:subj,
          html_body:fullHtml,
          campaign,
          scheduled_at:scheduledAt,
          status:"pending"
        })});
        done++;
      }catch(e){failed++;failedNames.push(c.name);}
      if(i<selectedContacts.length-1)await new Promise(r=>setTimeout(r,500));
    }
    setBatchRunning(false);
    setBatchProgress(null);
    setBatchDone({done,failed,failedNames,mode:"queued"});
    setSel(new Set());
  }

  async function generateEmailForContact(c){
    // Use static template for customer update campaign
    if(campaign==="custom"){
      const first=getFirstName(c.name);
      const filledBody=fillPlaceholders(customBody,c,true);
      const filledSubj=fillPlaceholders(customSubject,c,false);
      const body=[`Dear ${first},`,filledBody,`\n${DEF_SIG}`].join("\n\n");
      return{body,subj:filledSubj||"A message from Inspired Growing"};
    }
    if(campaign==="customer"){
      const first=getFirstName(c.name);
      const org=c.school||c.district||"your organization";
      const body=[`Dear ${first},`,custL1.replace(/\[First Name\]/g,first).replace(/\[Organization\]/g,org),custL2.replace(/\[First Name\]/g,first).replace(/\[Organization\]/g,org),custL3.replace(/\[First Name\]/g,first).replace(/\[Organization\]/g,org),`\n${DEF_SIG}`].join("\n\n");
      return{body,subj:"Summer Updates from Inspired Growing"};
    }
    const pitch=pitchByPersona[c.persona]||pitchByPersona.General;
    const contactContext=[c.notes?"Notes: "+c.notes:"",c.project_type?"Project focus: "+c.project_type:""].filter(Boolean).join(". ");
    const isFollowUp=campaign==="followup";

    // For follow-up, use guidance text directly — no AI needed
    if(isFollowUp){
      const first=getFirstName(c.name);
      const body=[`Dear ${first},`,followupGuidance,pitch,DEF_CLOSE_FOLLOWUP,`\n${DEF_SIG}`].filter(Boolean).join("\n\n");
      const subj=CAMPAIGNS.followup.subjectFn(c);
      return{body,subj};
    }

    const schoolNameB=c.school||c.district||"your school";
    const p1="Write exactly 2 sentences.\n"+
      "Sentence 1: \"I'm reaching out from Inspired Growing (inspiredgrowing.com) to share something that could be a meaningful addition to your nutrition, STEM, and food production programs.\" Write this sentence exactly.\n"+
      "Sentence 2: Reference something specific and genuine about "+schoolNameB+" — their mission, values, programs, or community commitment — and connect it to why this is a good time to reach out, e.g. \"[School]'s commitment to [specific thing] shows a clear overlap with our mission, so with the academic year coming to a close, I thought it would be a great time to connect.\" "+(contactContext?"Use this context: "+contactContext+". ":"")+"Do NOT reference the contact's job title or tell them about their own role. Focus on the school. Keep it warm and genuine.";
    const sys="You write short, personalized "+(isFollowUp?"follow-up":"cold outreach")+" emails for Eric Wagner at Inspired Growing, an EdTech company that installs aeroponic classroom farm systems in K-12 schools.\n\n"+
      "Write an email to "+c.name+", "+c.role+" at "+(c.school||c.district)+" ("+c.state+").\n\n"+
      "PARAGRAPH 1 — "+(isFollowUp?"Follow-up message (use this text as your base, adapt slightly for "+c.name+" at "+(c.school||c.district)+", keep concise):":"Personalized opener (2-3 sentences):")+"\n"+p1+"\n\n"+
      "PARAGRAPH 2 — What Inspired Growing does (already provided — do NOT write this):\n[SKIP]\n\n"+
      "PARAGRAPH 3 — Close (1-2 sentences):\nSimple low-pressure ask. Offer a quick call or to send more info.\n\n"+
      "Rules:\n- Do NOT start with \"I\"\n- Tone: warm, direct, human\n- No subject line, greeting, or signature\n- RESPOND WITH ONLY PARAGRAPH 1 AND PARAGRAPH 3 SEPARATED BY A BLANK LINE";
    const r=await fetch("https://ig-click-tracker.maxwellrymsza.workers.dev/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:300,system:sys,messages:[{role:"user",content:"Write the email."}]})});
    const d=await r.json();
    const fullText=(d.content?.[0]?.text||"").trim();
    const paras=fullText.split(/\n\n+/).map(p=>p.trim()).filter(Boolean);
    const l1=paras[0]||"";
    const l2=pitch; // Always use template text directly
    const l3=paras[1]||paras[2]||DEF_CLOSE;
    const sig=DEF_SIG;
    const firstName=c.name?;
    const body=[`Dear ${firstName},`,l1,l2,l3,`\n${sig}`].filter(Boolean).join("\n\n");
    const subj=CAMPAIGNS[campaign]?.subjectFn(c)||`A program worth knowing about for ${c.school||c.district}`;
    return{body,subj};
  }

  async function pushDraftForContact(c,body,subj){

  async function batchGenerateAndPush(mode="send"){
    const selectedContacts=[...sel].map(id=>contacts.find(c=>c.id===id)).filter(Boolean).filter(c=>!c.is_strategic);
    if(selectedContacts.length===0)return;
    if(mode==="queue"){
      await queueEmailsForContacts(selectedContacts,"queue",null);
      return;
    }
    if(mode==="schedule"){
      await queueEmailsForContacts(selectedContacts,"schedule",scheduleTime||null);
      setScheduleOpen(false);
      setScheduleTime("");
      return;
    }
    setBatchRunning(true);setBatchDone(null);
    setBatchProgress({done:0,total:selectedContacts.length,current:selectedContacts[0]?.name||"",failed:0});
    // Sending via Cloudflare Worker — no browser OAuth needed
    let done=0,failed=0;const failedNames=[];
    for(let i=0;i<selectedContacts.length;i++){
      const c=selectedContacts[i];
      setBatchProgress({done:i,total:selectedContacts.length,current:c.name,failed});
      try{
        const{body,subj}=await generateEmailForContact(c);
        if(mode==="draft"){
          // Save as Gmail draft via OAuth
          const tok=await getGmailToken();
          const htmlBody2=body.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n\n/g,"</p><p style='margin:0 0 12px'>").replace(/\n/g,"<br>");
          const fullHtml2=`<div style="font-family:Arial,sans-serif;font-size:14px;line-height:1.6;color:#000">${htmlBody2}${campaign!=="customer"?canSpamFooterHtml(c):""}</div>`;
          const emailLines2=[`From: Eric Wagner <eric.wagner@inspiredgrowing.com>`,`To: ${c.email}`,`Subject: ${subj}`,`MIME-Version: 1.0`,`Content-Type: text/html; charset=utf-8`,``,fullHtml2].join("\r\n");
          const enc2=btoa(unescape(encodeURIComponent(emailLines2))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
          const dr=await fetch("https://gmail.googleapis.com/gmail/v1/users/me/drafts",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${tok}`},body:JSON.stringify({message:{raw:enc2}})});
          if(!dr.ok)throw new Error("Draft save failed");
        } else {
          await pushDraftForContact(c,body,subj);
        }
        await sbFetch(`contacts?id=eq.${cc.id}`,{method:"PATCH",body:JSON.stringify({last_touch:today,...(["Cold","Emailed"].includes(cc.stage)?{pipeline_stage:"Emailed"}:{})})});
        setContacts(p=>p.map(c=>c.id===cc.id?{...c,lastContact:today,...(["Cold","Emailed"].includes(cc.stage)?{stage:"Emailed"}:{})}:c));
        setContacts(p=>p.map(x=>x.id===c.id?{...x,lastContact:today,...(x.stage==="Cold"?{stage:"Contacted"}:{})}:x));
        done++;
      }catch(e){failed++;failedNames.push(c.name);}
      // Small delay to avoid rate limits
      if(i<selectedContacts.length-1)await new Promise(r=>setTimeout(r,1500));
    }
    setBatchRunning(false);
    setBatchProgress(null);
    setBatchDone({done,failed,failedNames,mode,startTime:startTime?.toISOString()});
    setSel(new Set());
  }

  async function handleTaskAdd(contactId,task){
    const t={...task,id:taskIdRef.current++,done:false};
    const c=contacts.find(x=>x.id===contactId);
    const existingSteps=c?.next_steps||"";
    const dueStr=task.due?` (due ${new Date(task.due).toLocaleDateString("en-US",{month:"short",day:"numeric"})})`:""
    const newStep=`${task.text}${dueStr}`;
    const updated=existingSteps?`${existingSteps}\n${newStep}`:newStep;
    // Save to Supabase next_steps
    await sbFetch(`contacts?id=eq.${contactId}`,{method:"PATCH",body:JSON.stringify({next_steps:updated})}).catch(console.error);
    setContacts(cs=>cs.map(c=>c.id===contactId?{...c,tasks:[...(c.tasks||[]),t],next_steps:updated}:c));
    addActivity({type:"task",contactId,contactName:c?.name||"",text:"Next step added",detail:task.text,icon:"⚡"});
    if(selectedContact?.id===contactId)setSelectedContact(p=>({...p,tasks:[...(p.tasks||[]),t],next_steps:updated}));
  }

          {[["role","Role","Nutrition Director"],["school","Organization","Lincoln HS"],["district","District","Clarkstown CSD"]].map(([k,l,ph])=><div key={k} style={{display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>{l}</label><input value={addF[k]} onChange={e=>setAddF(f=>({...f,[k]:e.target.value}))} placeholder={ph} style={I()}/></div>)}
          <div style={{display:"flex",flexDirection:"column",gap:4,gridColumn:"1/-1"}}><label style={LBL()}>Phone Number</label><input value={addF.phone||""} onChange={e=>setAddF(f=>({...f,phone:e.target.value}))} placeholder="(555) 555-5555" style={I()}/></div>
          <div style={{display:"flex",flexDirection:"column",gap:4,gridColumn:"1/-1"}}><label style={LBL()}>Project Type / Notes</label><input value={addF.project_type||""} onChange={e=>setAddF(f=>({...f,project_type:e.target.value}))} placeholder="e.g. STEM lab expansion, nutrition program..." style={I()}/></div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>State</label><select value={addF.state} onChange={e=>setAddF(f=>({...f,state:e.target.value}))} style={S()}>{["NY","NJ","CT","PA","MA","Other"].map(s=><option key={s} value={s}>{s}</option>)}</select></div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>Persona</label><select value={addF.persona} onChange={e=>setAddF(f=>({...f,persona:e.target.value}))} style={S()}>{Object.keys(TMPL).map(k=><option key={k} value={k}>{TMPL[k].label}</option>)}</select></div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>Pipeline Stage</label><select value={addF.stage||"Cold"} onChange={e=>setAddF(f=>({...f,stage:e.target.value}))} style={S()}>{STAGES.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>Organization Type</label><select value={addF.org_type||"K-12 School"} onChange={e=>setAddF(f=>({...f,org_type:e.target.value}))} style={S()}><option value="K-12 School">K-12 School</option><option value="Charter School">Charter School</option><option value="Private School">Private School</option><option value="Community Org">Community Org</option>
                <option value="Senior Center">Senior Center</option><option value="JCC / YMCA">JCC / YMCA</option><option value="Higher Ed">Higher Ed</option><option value="Corporate">Corporate</option><option value="Government">Government</option><option value="Healthcare">Healthcare</option><option value="Nonprofit">Nonprofit</option><option value="Vendor / Partner">Vendor / Partner</option><option value="Media">Media</option><option value="Other">Other</option></select></div>
        </div>
        <div onClick={()=>setAddF(f=>({...f,is_strategic:!f.is_strategic}))} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:addF.is_strategic?"#F5F3FF":"#FAFAFA",border:`1px solid ${addF.is_strategic?"#DDD6FE":C.border}`,borderRadius:8,cursor:"pointer",marginBottom:16}}>
          <input type="checkbox" checked={addF.is_strategic||false} onChange={e=>setAddF(f=>({...f,is_strategic:e.target.checked}))} style={{accentColor:"#7C3AED",cursor:"pointer",width:16,height:16}}/>
          <div><div style={{fontSize:12,fontWeight:600,color:"#5B21B6"}}>⭐ Strategic Relationship</div><div style={{fontSize:11,color:"#7C3AED"}}>Excluded from bulk campaigns · tracked in Strategic page</div></div>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}><button onClick={()=>setAddOpen(false)} style={B("secondary")}>Cancel</button><button onClick={saveContact} style={B("primary")}>Add Contact</button></div>
      </div>
    </div>}
    {selectedContact&&<div onClick={()=>setSelectedContact(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:12,width:480,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)",padding:24}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:18}}><Av name={selectedContact.name} size={44} color={PER_C[selectedContact.persona]?.[0]||C.blue}/><div style={{flex:1}}><div style={{fontWeight:700,fontSize:17}}>{selectedContact.name}</div><div style={{fontSize:12,color:C.textS,marginTop:2}}>{selectedContact.role} · {selectedContact.district}</div><div style={{fontSize:11,color:C.textS,marginTop:1}}>{selectedContact.email}</div></div><button onClick={()=>setSelectedContact(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.textT}}>✕</button></div>
        <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
          {(()=>{const[pc,pb]=PER_C[selectedContact.persona]||["#6B7280","#F1EFE8"];return<Tag label={selectedContact.persona} color={pc} bg={pb}/>;})()}
          <Tag label={selectedContact.stage} color={STAGE_META[selectedContact.stage]?.color||"#6B7280"} bg={STAGE_META[selectedContact.stage]?.bg||"#F3F4F6"}/>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Move to stage</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{STAGES.map(s=>{const sm=STAGE_META[s]||{color:C.textS,bg:C.bg,icon:"•"};return <button key={s} onClick={()=>handleStageChange(selectedContact.id,s)} style={{...B("secondary","xs"),background:selectedContact.stage===s?sm.bg:"white",color:selectedContact.stage===s?sm.color:C.textS,border:`1px solid ${selectedContact.stage===s?sm.color:C.border}`,fontWeight:selectedContact.stage===s?600:400}}>{sm.icon} {s}</button>;})}</div>
        </div>
        {selectedContact.notes&&<div style={{marginBottom:16}}><div style={{fontSize:10,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Notes</div><div style={{fontSize:13,color:C.textS,lineHeight:1.6,background:C.bg,borderRadius:6,padding:"8px 10px"}}>{selectedContact.notes}</div></div>}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:600,color:"#854F0B",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>⚡ Next Steps</div>
          <textarea defaultValue={selectedContact.next_steps||""} onBlur={async e=>{const v=e.target.value;await sbFetch(`contacts?id=eq.${selectedContact.id}`,{method:"PATCH",body:JSON.stringify({next_steps:v})});setContacts(p=>p.map(c=>c.id===selectedContact.id?{...c,next_steps:v}:c));setSelectedContact(p=>({...p,next_steps:v}));}} style={{...I(),fontSize:12,lineHeight:1.6,marginBottom:8,minHeight:50,resize:"vertical",background:"#FFFBEB",border:"1px solid #FED7AA"}} placeholder="What's the next step with this contact?"/>
          {(selectedContact.tasks||[]).length===0&&<div style={{fontSize:11,color:C.textT,marginBottom:6}}>Or add a tracked step with a due date below:</div>}
          {(selectedContact.tasks||[]).map(t=><div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"7px 8px",marginBottom:4,background:t.done?"#F9FAFB":"#FFFBEB",border:`1px solid ${t.done?C.border:"#FED7AA"}`,borderRadius:6}}><input type="checkbox" checked={t.done} onChange={()=>handleTaskToggle(selectedContact.id,t.id)} style={{accentColor:C.green,cursor:"pointer",marginTop:2}}/><div style={{flex:1}}><div style={{fontSize:12,fontWeight:500,textDecoration:t.done?"line-through":"none",color:t.done?C.textT:C.text}}>{t.text}</div>{t.due&&<div style={{fontSize:10,color:"#854F0B",marginTop:2}}>Due {new Date(t.due).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>}</div></div>)}
          <div style={{display:"flex",gap:6,marginTop:8}}>
            <input value={taskText} onChange={e=>setTaskText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&taskText){handleTaskAdd(selectedContact.id,{text:taskText,due:taskDate||""});setTaskText("");setTaskDate("");}}} placeholder="Add a next step... (press Enter)" style={{...I(),fontSize:12,padding:"5px 8px",flex:1,background:"#FFFBEB",border:"1px solid #FED7AA"}}/>
            <input type="date" value={taskDate} onChange={e=>setTaskDate(e.target.value)} style={{...I("130px"),fontSize:12,padding:"5px 8px"}}/>
            <button onClick={()=>{if(taskText){handleTaskAdd(selectedContact.id,{text:taskText,due:taskDate||""});setTaskText("");setTaskDate("");}}} style={B("primary","sm")}>Add</button>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}><button onClick={()=>{setSelectedContact(null);selectCC(selectedContact);setPage("compose");}} style={B("primary")}>✉ Compose Email</button><button onClick={()=>setSelectedContact(null)} style={B("secondary")}>Close</button></div>
      </div>
    </div>}
    <style>{`@keyframes spin{to{transform:rotate(360deg);}}`}</style>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>

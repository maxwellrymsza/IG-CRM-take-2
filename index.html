const GMAIL_SCOPE = "https://www.googleapis.com/auth/gmail.compose";
let googleAccessToken = null;

function signInWithGoogle() {
  return new Promise((resolve, reject) => {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: GMAIL_SCOPE,
      callback: (response) => {
        if (response.error) { reject(response.error); return; }
        googleAccessToken = response.access_token;
        resolve(response.access_token);
      },
    });
    client.requestAccessToken();
  });
}

async function getGmailToken() {
  if (googleAccessToken) return googleAccessToken;
  return await signInWithGoogle();
}

async function sbFetch(path, opts={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
      ...(opts.headers||{})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

function SuggestedAttachments({cc,onViewAll}){
  const[copiedId,setCopiedId]=useState(null);
  const[copiedSentenceId,setCopiedSentenceId]=useState(null);
  const docs=KB_DOCS.filter(d=>d.personas.includes(cc.persona)).slice(0,4);
  function copyLink(doc){
    const link=trackedLink(cc.id,doc.id);
    if(link){navigator.clipboard&&navigator.clipboard.writeText(link);setCopiedId(doc.id);setTimeout(()=>setCopiedId(null),2000);}
  }
  function copySentence(doc){
    const link=trackedLink(cc.id,doc.id);
    const sentence=DOC_SENTENCES[doc.id]||`Here's our ${doc.title} for your reference:`;
    const full=`${sentence}\n${link}`;
    navigator.clipboard&&navigator.clipboard.writeText(full);
    setCopiedSentenceId(doc.id);
    setTimeout(()=>setCopiedSentenceId(null),2000);
  }
  return <div style={{border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
    <div style={{padding:"8px 12px",background:C.bg,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:6}}>
      <span style={{fontWeight:600,fontSize:11,color:C.textS,textTransform:"uppercase",letterSpacing:"0.05em"}}>📎 Suggested attachments — {TMPL[cc.persona]?.label}</span>
      <button onClick={onViewAll} style={{marginLeft:"auto",...B("ghost","sm"),color:C.gDark,fontSize:11}}>View all ↗</button>
    </div>
    <div style={{padding:"10px 12px",display:"flex",flexDirection:"column",gap:8,background:"white"}}>
      {docs.map(doc=>{
        const sentence=DOC_SENTENCES[doc.id]||`Here's our ${doc.title} for your reference:`;
        return <div key={doc.id} style={{border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
          <div style={{padding:"8px 10px",background:C.bg,display:"flex",alignItems:"center",gap:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:C.text}}>{doc.title}</div>
              <div style={{fontSize:10,color:C.textT,marginTop:1}}>{doc.description.slice(0,70)}...</div>
            </div>
            <a href={doc.viewUrl} target="_blank" style={{fontSize:10,color:C.blue,textDecoration:"none",fontWeight:500,flexShrink:0,padding:"3px 7px",border:`1px solid ${C.border}`,borderRadius:4,background:"white"}}>Preview ↗</a>
          </div>
          <div style={{padding:"8px 10px",background:"#FAFAFA",borderTop:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,color:C.textS,fontStyle:"italic",lineHeight:1.5,marginBottom:8}}>"{sentence}"</div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>copySentence(doc)} style={{...B("primary","sm"),flex:1,fontSize:11}}>{copiedSentenceId===doc.id?"✓ Copied to clipboard!":"📋 Copy sentence + tracked link"}</button>
              <button onClick={()=>copyLink(doc)} style={{...B("secondary","sm"),fontSize:11,whiteSpace:"nowrap"}}>{copiedId===doc.id?"✓ Copied!":"🔗 Link only"}</button>
            </div>
          </div>
        </div>;
      })}
      <div style={{fontSize:10,color:C.textT,padding:"2px 4px",display:"flex",alignItems:"center",gap:4}}>
        <span>🔗</span>
        <span>Links tracked via Cloudflare · <strong>Cmd+K</strong> in Gmail to hyperlink text · contact ID <strong>{cc.id}</strong> embedded</span>
      </div>
    </div>
  </div>;
}

function SequencesPage({contacts,sequences,setSequences,enrollments,setEnrollments,seqLog,setSeqLog}){
  const[newOpen,setNewOpen]=useState(false);
  const[newName,setNewName]=useState("Cold Outreach — Standard");
  const[newInterval,setNewInterval]=useState(7);
  const[newBrake,setNewBrake]=useState(50);
  const[saving,setSaving]=useState(false);
  const[enrollTarget,setEnrollTarget]=useState(null);

  async function createSeq(){
    const tmpl=SEQUENCE_TEMPLATES[newName];
    if(!tmpl)return;
    setSaving(true);
    try{
      const rows=await sbFetch("sequences",{method:"POST",body:JSON.stringify({
        name:newName, template_id:tmpl.id, status:"paused",
        interval_minutes:newInterval, emergency_brake_threshold:newBrake,
        started_at:new Date().toISOString()
      })});
      setSequences(p=>[...p,rows[0]]);
      setNewOpen(false);
    }catch(e){alert("Error creating sequence: "+e.message);}
    setSaving(false);
  }

  async function toggleStatus(seq){
    const newStatus=seq.status==="active"?"paused":"active";
    await sbFetch(`sequences?id=eq.${seq.id}`,{method:"PATCH",body:JSON.stringify({status:newStatus})});
    setSequences(p=>p.map(s=>s.id===seq.id?{...s,status:newStatus}:s));
  }

  async function brakeSeq(seq){
    await sbFetch(`sequences?id=eq.${seq.id}`,{method:"PATCH",body:JSON.stringify({status:"braked"})});
    setSequences(p=>p.map(s=>s.id===seq.id?{...s,status:"braked"}:s));
  }

  async function resetBrake(seq){
    await sbFetch(`sequences?id=eq.${seq.id}`,{method:"PATCH",body:JSON.stringify({status:"paused"})});
    setSequences(p=>p.map(s=>s.id===seq.id?{...s,status:"paused"}:s));
  }

  async function handleEnroll(seqId, contactIds){
    const now=new Date().toISOString();
    const rows=contactIds.map(cid=>({
      sequence_id:seqId, contact_id:cid,
      current_step:0, status:"active",
      enrolled_at:now, next_send_at:now
    }));
    try{
      const inserted=await sbFetch("enrollments",{method:"POST",body:JSON.stringify(rows)});
      setEnrollments(p=>[...p,...inserted]);
      // Update pipeline stage to Contacted for Cold contacts
      for(const cid of contactIds){
        const c=contacts.find(x=>x.id===cid);
        if(c&&c.stage==="Cold"){
          await sbFetch(`contacts?id=eq.${cid}`,{method:"PATCH",body:JSON.stringify({pipeline_stage:"Contacted"})});
        }
      }
    }catch(e){alert("Error enrolling: "+e.message);}
  }

  return <>
    <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center"}}>

      <button onClick={()=>setNewOpen(true)} style={{...B("primary","sm"),marginLeft:"auto"}}>+ New Sequence</button>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:"#F0F9FF",border:"1px solid #BAE6FD",borderRadius:10,padding:"12px 16px",display:"flex",gap:10}}>
        <span style={{fontSize:18,flexShrink:0}}>⏱</span>
        <div>
          <div style={{fontWeight:600,fontSize:13,color:"#0369A1",marginBottom:3}}>Slow Drip Mode — Active</div>
          <div style={{fontSize:12,color:"#0284C7",lineHeight:1.6}}>Emails send 1 at a time with a configurable gap (default: every 7 minutes). This mimics human sending behavior and avoids Gmail's automated spam filters. The Emergency Brake automatically pauses any sequence if bounce rate exceeds threshold or an API error is detected.</div>
        </div>
      </div>

      {sequences.length===0&&<div style={{padding:40,textAlign:"center",color:C.textT}}>
        <div style={{fontSize:32,marginBottom:8}}>🔄</div>
        <div style={{fontWeight:500,color:C.textS}}>No sequences yet</div>
        <div style={{fontSize:12,marginTop:4}}>Create your first sequence to start automating outreach</div>
      </div>}

      {sequences.map(seq=>{
        const tmpl=Object.values(SEQUENCE_TEMPLATES).find(t=>t.id===seq.template_id)||Object.values(SEQUENCE_TEMPLATES)[0];
        const seqEnrollments=enrollments.filter(e=>e.sequence_id===seq.id);
        const activeEnrollments=seqEnrollments.filter(e=>e.status==="active");
        const sentCount=seqLog.filter(l=>l.sequence_id===seq.id).length;
        const recentLogs=seqLog.filter(l=>l.sequence_id===seq.id).slice(0,4);
        const sm={active:{color:C.gDark,bg:C.gBg,label:"● Active"},paused:{color:"#854F0B",bg:"#FAEEDA",label:"⏸ Paused"},braked:{color:"#A32D2D",bg:"#FEE2E2",label:"🛑 Emergency Brake"}}[seq.status]||{color:"#854F0B",bg:"#FAEEDA",label:"⏸ Paused"};

        return <div key={seq.id} style={{background:"white",border:`1px solid ${seq.status==="braked"?"#FECACA":C.border}`,borderRadius:10,overflow:"hidden"}}>
          {seq.status==="braked"&&<div style={{background:"#FEE2E2",borderBottom:"1px solid #FECACA",padding:"8px 16px",display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#A32D2D"}}>

}

// ── Review Queue Page ─────────────────────────────────────────────────────────

function ReviewQueuePage({contacts,enrollments,seqLog,setSeqLog,sequences}){
  const[selected,setSelected]=useState(null);
  const[approving,setApproving]=useState(false);

  // Build a queue from active enrollments that need approval for their current step
  const queue = enrollments
    .filter(e=>e.status==="active")
    .map(e=>{
      const c=contacts.find(x=>x.id===e.contact_id);
      const seq=sequences.find(x=>x.id===e.sequence_id);
      if(!c||!seq)return null;
      const tmpl=Object.values(SEQUENCE_TEMPLATES).find(t=>t.id===seq.template_id);
      const step=tmpl?.steps[e.current_step];
      if(!step||!step.approvalRequired)return null;
      const alreadySent=seqLog.find(l=>l.sequence_id===seq.id&&l.contact_id===c.id&&l.step_label===step.label);
      if(alreadySent)return null;
      return {
        enrollmentId:e.id, sequenceId:seq.id, sequenceName:seq.name,
        contactId:c.id, contactName:c.name, contactDistrict:c.district,
        contactPersona:c.persona, stepLabel:step.label, stepIndex:e.current_step,
        subject:`${c.district} - Aeroponic Classroom Farm`,
        scheduledFor:e.next_send_at||new Date().toISOString(),
        status:"pending",
        body:`Hi ${c.name?.split(" ")[0]||"there"},\n\n[AI-generated hook for ${c.district} will appear here]\n\nInspired Growing installs compact aeroponic classroom farms in K-12 schools — students grow and harvest fresh greens every 7 days, producing around 100 salads a week right in the building.\n\nWould it be worth a quick 10-minute call?\n\nEric Wagner\nInspired Growing\ninspiredgrowing.com\n\n${canSpamFooter(c.id)}`,
      };
    }).filter(Boolean);

  const [editBodies, setEditBodies] = useState({});

  async function approve(item){
    setApproving(true);
    try{
      // Log the send
      const logRow={
        sequence_id:item.sequenceId, contact_id:item.contactId,
        contact_name:item.contactName, step_label:item.stepLabel,
        subject:item.subject, status:"sent", sent_at:new Date().toISOString()
      };
      const inserted=await sbFetch("sequence_log",{method:"POST",body:JSON.stringify(logRow)});
      setSeqLog(p=>[inserted[0],...p]);
      // Advance enrollment step
      await sbFetch(`enrollments?id=eq.${item.enrollmentId}`,{method:"PATCH",body:JSON.stringify({current_step:item.stepIndex+1})});
      // Update contact pipeline stage
      await sbFetch(`contacts?id=eq.${item.contactId}`,{method:"PATCH",body:JSON.stringify({pipeline_stage:"Contacted",last_touch:new Date().toISOString().split("T")[0]})});
    }catch(e){alert("Error approving: "+e.message);}
    setApproving(false);
    setSelected(null);
  }

  async function reject(item){
    // Mark enrollment as paused for this contact
    await sbFetch(`enrollments?id=eq.${item.enrollmentId}`,{method:"PATCH",body:JSON.stringify({status:"paused"})});
    setSelected(null);
  }

  return <>
    <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center"}}>
      <div><div style={{fontWeight:700,fontSize:16}}>Review Queue</div><div style={{fontSize:12,color:C.textS,marginTop:1}}>Approve or reject emails before they send</div></div>
      {queue.length>0&&<span style={{marginLeft:"auto",fontSize:12,fontWeight:600,color:"#854F0B",background:"#FAEEDA",padding:"3px 10px",borderRadius:20,border:"1px solid #FDE68A"}}>{queue.length} awaiting approval</span>}
    </div>
    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <div style={{width:300,borderRight:`1px solid ${C.border}`,overflowY:"auto",flexShrink:0}}>
        {queue.length===0&&<div style={{padding:40,textAlign:"center",color:C.textT,fontSize:12}}>
          <div style={{fontSize:28,marginBottom:8}}>📬</div>
          No emails pending review
        </div>}
        {queue.map(q=>(
          <div key={q.enrollmentId} onClick={()=>setSelected(q)}
            style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,cursor:"pointer",background:selected?.enrollmentId===q.enrollmentId?C.gBg:"white",borderLeft:selected?.enrollmentId===q.enrollmentId?`3px solid ${C.green}`:"3px solid transparent"}}
            onMouseEnter={e=>{if(selected?.enrollmentId!==q.enrollmentId)e.currentTarget.style.background=C.bg;}}
            onMouseLeave={e=>{if(selected?.enrollmentId!==q.enrollmentId)e.currentTarget.style.background="white";}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
              <Av name={q.contactName} size={22} color={PER_C[q.contactPersona]?.[0]||C.blue}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:500,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.contactName}</div>
                <div style={{fontSize:10,color:C.textS}}>{q.contactDistrict}</div>
              </div>
              <span style={{width:7,height:7,borderRadius:"50%",background:C.orange,flexShrink:0}}/>
            </div>
            <div style={{fontSize:11,color:C.textS,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.stepLabel} · {q.sequenceName}</div>
            <div style={{fontSize:10,color:C.textT,marginTop:2}}>Scheduled: {fmtDT(q.scheduledFor)}</div>
          </div>
        ))}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:12}}>
        {!selected?(
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:C.textT,gap:10,textAlign:"center"}}>
            <div style={{fontSize:36,opacity:0.3}}>📬</div>
            <div style={{fontWeight:500,color:C.textS}}>Select an email to review</div>
            <div style={{fontSize:12,maxWidth:260,lineHeight:1.6}}>Review and approve each email before it sends. You can edit the body before approving.</div>
          </div>
        ):<>
          <div style={{padding:"11px 14px",background:C.gBg,border:`1px solid ${C.gBorder}`,borderRadius:8,display:"flex",alignItems:"center",gap:10}}>
            <Av name={selected.contactName} size={34} color={PER_C[selected.contactPersona]?.[0]||C.blue}/>
            <div>
              <div style={{fontWeight:600,fontSize:13}}>{selected.contactName}</div>
              <div style={{fontSize:11,color:C.textS,marginTop:1}}>{selected.contactDistrict} · {selected.sequenceName} · {selected.stepLabel}</div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",letterSpacing:"0.04em"}}>Subject</label>
            <div style={{padding:"7px 10px",border:`1px solid ${C.border}`,borderRadius:6,fontSize:13,background:C.bg}}>{selected.subject}</div>
          </div>
          <div style={{fontSize:12,color:C.textS}}>📅 Scheduled: <strong style={{color:C.text}}>{fmtDT(selected.scheduledFor)}</strong></div>
          <div style={{display:"flex",flexDirection:"column",gap:4,flex:1}}>
            <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",letterSpacing:"0.04em"}}>Email Body</label>
            <textarea
              value={editBodies[selected.enrollmentId]??selected.body}
              onChange={e=>setEditBodies(p=>({...p,[selected.enrollmentId]:e.target.value}))}
              rows={12}
              style={{...I(),resize:"vertical",lineHeight:1.7,background:"white",fontFamily:"Georgia,serif",fontSize:12}}/>
          </div>
          <div style={{padding:"8px 12px",background:"#F0FDF4",borderRadius:8,border:`1px solid ${C.gBorder}`,fontSize:11,color:C.gDark}}>
            ✓ <strong>CAN-SPAM footer auto-appended</strong> — includes physical address and personalized unsubscribe link.
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>approve(selected)} disabled={approving} style={{...B("primary"),flex:1,opacity:approving?0.6:1}}>
              {approving?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Spinner/>Approving…</span>:"✓ Approve & Queue"}
            </button>
            <button onClick={()=>reject(selected)} style={{...B("danger"),flex:1}}>✗ Reject</button>
          </div>
        </>}
      </div>
    </div>
  </>;
}

// ── Unsubscribe Page ──────────────────────────────────────────────────────────

function UnsubscribePage({contacts,setContacts}){
  const unsubs=contacts.filter(c=>c.isUnsubscribed);
  const bounced=contacts.filter(c=>c.bounced);

  async function toggleUnsub(c, val){
    await sbFetch(`contacts?id=eq.${c.id}`,{method:"PATCH",body:JSON.stringify({pipeline_stage:val?"Cold":"Bounced"})}).catch(console.error);
    setContacts(p=>p.map(x=>x.id===c.id?{...x,isUnsubscribed:val}:x));
  }

  return <>
    <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`}}>
      <div style={{fontWeight:700,fontSize:16}}>Unsubscribe & Suppression</div>
      <div style={{fontSize:12,color:C.textS,marginTop:1}}>CAN-SPAM compliance · unsubscribed contacts skipped in all sequences</div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:16}}>
      <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>Suppression summary</div>
        <div style={{display:"flex",gap:12}}>
          {[["Unsubscribed",unsubs.length,"#A32D2D","#FEE2E2"],["Bounced",bounced.length,"#854F0B","#FAEEDA"],["Eligible",contacts.length-unsubs.length-bounced.length,C.gDark,C.gBg]].map(([l,v,col,bg])=>(
            <div key={l} style={{flex:1,background:bg,borderRadius:8,padding:"10px 14px",textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:700,color:col}}>{v}</div>
              <div style={{fontSize:11,color:C.textS,marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {unsubs.length>0&&<div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontWeight:600,fontSize:13}}>Unsubscribed</div>
          <span style={{fontSize:10,fontWeight:600,color:"#A32D2D",background:"#FEE2E2",padding:"1px 7px",borderRadius:10}}>{unsubs.length}</span>
        </div>
        {unsubs.map(c=>{const[pc]=PER_C[c.persona]||["#6B7280"];return(
          <div key={c.id} style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
            <Av name={c.name} size={28} color={pc}/>
            <div style={{flex:1}}><div style={{fontWeight:500,fontSize:12}}>{c.name}</div><div style={{fontSize:11,color:C.textS}}>{c.role} · {c.district}</div></div>
            <Tag label="Unsubscribed" color="#A32D2D" bg="#FEE2E2"/>
            <button onClick={()=>toggleUnsub(c,false)} style={B("secondary","sm")}>Re-subscribe</button>
          </div>
        );})}
      </div>}

      {bounced.length>0&&<div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontWeight:600,fontSize:13}}>Bounced</div>
          <span style={{fontSize:10,fontWeight:600,color:"#854F0B",background:"#FAEEDA",padding:"1px 7px",borderRadius:10}}>{bounced.length}</span>
        </div>
        {bounced.map(c=>{const[pc]=PER_C[c.persona]||["#6B7280"];return(
          <div key={c.id} style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
            <Av name={c.name} size={28} color={pc}/>
            <div style={{flex:1}}><div style={{fontWeight:500,fontSize:12}}>{c.name}</div><div style={{fontSize:11,color:C.textS}}>{c.role} · {c.district}</div></div>
            <Tag label="Bounced" color="#854F0B" bg="#FAEEDA"/>
          </div>
        );})}
      </div>}
    </div>
  </>;
}

function DashboardPage({contacts,activity,onNavigate}){
  const pipeline=contacts.filter(c=>!["Cold","Closed Lost","Bounced","Declined"].includes(c.stage));
  const daysInStage=c=>Math.floor((NOW-new Date(c.stageEnteredAt||NOW).getTime())/86400000);
  const isStuck=c=>{const d=STUCK_DAYS[c.stage];return d&&daysInStage(c)>=d;};
  const stuck=contacts.filter(isStuck);
  const hot=contacts.filter(c=>["Replied","Demo Scheduled","Proposal Sent"].includes(c.stage));
  const fmtT=iso=>{const d=Math.floor((NOW-new Date(iso).getTime())/86400000);return d===0?"Today":d===1?"Yesterday":`${d}d ago`;};
  return <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
      {[{label:"Total Contacts",value:contacts.length,sub:"in Supabase",color:C.text,bg:C.bg},{label:"Active Pipeline",value:`$${(pipeline.length*50000/1000).toFixed(0)}k`,sub:`${pipeline.length} deals`,color:C.blue,bg:C.bBg},{label:"Replied",value:contacts.filter(c=>c.stage==="Replied").length,sub:"warm leads",color:C.gDark,bg:C.gBg},{label:"Stuck",value:stuck.length,sub:"need attention",color:stuck.length>0?"#A32D2D":C.textS,bg:stuck.length>0?"#FEE2E2":C.bg}].map(s=>(
        <div key={s.label} style={{background:s.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px"}}>
          <div style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>{s.label}</div>
          <div style={{fontSize:24,fontWeight:700,color:s.color,lineHeight:1}}>{s.value}</div>
          <div style={{fontSize:11,color:C.textS,marginTop:4}}>{s.sub}</div>
        </div>
      ))}
    </div>
    <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
      <div style={{fontWeight:600,fontSize:13,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>Pipeline by Stage<button onClick={()=>onNavigate("pipeline")} style={{...B("ghost","sm"),color:C.blue,fontSize:11}}>View kanban →</button></div>
      <div style={{display:"flex",gap:6,alignItems:"flex-end",height:80}}>
        {["Contacted","Replied","Demo Scheduled","Proposal Sent","Closed Won","Bounced"].map(stage=>{const count=contacts.filter(c=>c.stage===stage).length;const max=Math.max(...["Contacted","Replied","Demo Scheduled","Proposal Sent","Closed Won","Bounced"].map(s=>contacts.filter(c=>c.stage===s).length),1);const h=Math.max((count/max)*60,count>0?6:2);const m=STAGE_META[stage]||{color:C.textS,bg:C.bg};return <div key={stage} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div style={{fontSize:10,fontWeight:600,color:m.color}}>{count}</div><div style={{width:"100%",height:h,background:m.bg,border:`1px solid ${m.color}33`,borderRadius:4}}/><div style={{fontSize:9,color:C.textT,textAlign:"center",lineHeight:1.2}}>{stage}</div></div>;})}
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>🔥 Who's Hot</div>
        {hot.slice(0,8).map(c=>{const[pc]=PER_C[c.persona]||["#6B7280"];const m=STAGE_META[c.stage]||{color:C.textS,bg:C.bg};return <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:`1px solid ${C.border}`}}><Av name={c.name} size={28} color={pc}/><div style={{flex:1,minWidth:0}}><div style={{fontWeight:500,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div><div style={{fontSize:10,color:C.textS,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.district}</div></div><Tag label={c.stage} color={m.color} bg={m.bg}/></div>;})}

      </div>

        await pushDraftForContact(c,body,subj,token);
        const today=new Date().toISOString().split("T")[0];
        await sbFetch(`contacts?id=eq.${c.id}`,{method:"PATCH",body:JSON.stringify({last_touch:today,...(c.stage==="Cold"?{pipeline_stage:"Contacted"}:{})})});
        setContacts(p=>p.map(x=>x.id===c.id?{...x,lastContact:today,...(x.stage==="Cold"?{stage:"Contacted"}:{})}:x));
        done++;
      }catch(e){failed++;failedNames.push(c.name);}
      // Small delay to avoid rate limits
      if(i<selectedContacts.length-1)await new Promise(r=>setTimeout(r,1500));
    }
    setBatchRunning(false);
    setBatchProgress(null);
    setBatchDone({done,failed,failedNames});
    setSel(new Set());
  }

    const ids=[...sel];
    if(!window.confirm(`Delete ${ids.length} contacts? This cannot be undone.`))return;
    try{
      await sbFetch(`contacts?id=in.(${ids.join(",")})`,{method:"DELETE",headers:{"Prefer":"return=minimal"}});
      setContacts(p=>p.filter(c=>!ids.includes(c.id)));
      setSel(new Set());
      addActivity({type:"deleted",contactName:`${ids.length} contacts`,text:"were bulk deleted",detail:"",icon:"🗑"});

                    <div style={{padding:10,background:"white"}}><textarea value={l2} onChange={e=>setL2(e.target.value)} rows={6} style={{...I(),resize:"vertical",lineHeight:1.7,background:"white",overflowY:"auto"}}/></div>
                  </div>
                  <div style={{border:`1px solid #FED7AA`,borderRadius:8}}>
                    <div style={{padding:"9px 12px",background:"#FFF7ED",borderBottom:`1px solid #FED7AA`,display:"flex",alignItems:"center",gap:8}}><div style={{width:22,height:22,borderRadius:"50%",background:C.orange,color:"white",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>3</div><div style={{fontWeight:600,fontSize:12,color:"#92400E"}}>Universal close</div></div>
                    <div style={{padding:10,background:"white"}}><textarea value={l3} onChange={e=>setL3(e.target.value)} rows={4} style={{...I(),resize:"vertical",lineHeight:1.7,background:"white",overflowY:"auto"}}/></div>
                  </div>
                  {(l1||l2||l3)&&<div style={{border:`1px solid ${C.border}`,borderRadius:8}}><div style={{padding:"8px 12px",background:C.bg,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:11,color:C.textS,textTransform:"uppercase",letterSpacing:"0.05em"}}>Full email preview</span><button onClick={()=>navigator.clipboard&&navigator.clipboard.writeText(preview)} style={B("ghost","sm")}>Copy</button></div><div style={{padding:"14px 16px",fontSize:13,lineHeight:1.9,color:C.text,whiteSpace:"pre-wrap",background:"white",fontFamily:"Georgia,serif",maxHeight:320,overflowY:"auto"}}>{preview}</div></div>}
                  {gmSt==="loading"&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:C.bBg,borderRadius:8,fontSize:12,color:C.bDark}}><div style={{width:12,height:12,border:"2px solid #B5D4F4",borderTopColor:C.bDark,borderRadius:"50%",animation:"spin 0.7s linear infinite",flexShrink:0}}/>{gmMsg}</div>}
                  {gmSt==="success"&&<div style={{padding:"8px 12px",background:C.gBg,borderRadius:8,fontSize:12,color:C.gDark}}>{gmMsg}</div>}
                  {gmSt==="error"&&<div style={{padding:"8px 12px",background:"#FAEEDA",borderRadius:8,fontSize:12,color:"#854F0B"}}>{gmMsg}</div>}
                  <div style={{display:"flex",gap:8,paddingBottom:8}}><button onClick={pushGmail} disabled={!subj||!l1} style={{...B("blue"),opacity:(!subj||!l1)?0.4:1}}>{gmSt==="loading"?"Connecting…":"📧 Push to Gmail Draft"}</button><button onClick={genHook} style={B("secondary")}>↻ Regenerate</button></div>
                </>}
              </div>
            </div>
          </>}
          {page==="resources"&&<ResourcesPage/>}
          {page==="settings"&&<>
            <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:16}}>Email Templates</div></div><div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>{saved&&<span style={{fontSize:12,color:C.gDark,fontWeight:500}}>✓ Saved</span>}<button onClick={()=>{setSaved(true);setTimeout(()=>setSaved(false),2000);}} style={B("primary")}>Save Changes</button></div></div>
            <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:C.surface,padding:"0 20px",gap:2,overflowX:"auto"}}>{[...Object.keys(TMPL).map(k=>({id:k,label:TMPL[k].label})),{id:"close",label:"Close & Signature"}].map(t=>(<div key={t.id} onClick={()=>setStab(t.id)} style={{padding:"10px 14px",fontSize:13,cursor:"pointer",borderBottom:stab===t.id?`2px solid ${C.green}`:"2px solid transparent",color:stab===t.id?C.gDark:C.textS,fontWeight:stab===t.id?500:400,marginBottom:-1,whiteSpace:"nowrap"}}>{t.label}</div>))}</div>
            <div style={{flex:1,overflowY:"auto",padding:24}}>
              {stab!=="close"&&templates[stab]&&<div style={{maxWidth:680}}><div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}><label style={{...LBL(),fontSize:11}}>Persona pitch — {templates[stab].label}</label><textarea value={templates[stab].roleBlurb} onChange={e=>setTemplates(p=>({...p,[stab]:{...p[stab],roleBlurb:e.target.value}}))} rows={5} style={{...I(),resize:"vertical",lineHeight:1.7,background:"white"}}/></div></div>}
              {stab==="close"&&<div style={{maxWidth:680}}><div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}><label style={{...LBL(),fontSize:11}}>Universal close</label><textarea value={closeText} onChange={e=>setCloseText(e.target.value)} rows={3} style={{...I(),resize:"vertical",lineHeight:1.7,background:"white"}}/></div><div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}><label style={{...LBL(),fontSize:11}}>Signature</label><textarea value={sig} onChange={e=>setSig(e.target.value)} rows={3} style={{...I(),resize:"vertical",lineHeight:1.7,background:"white"}}/></div></div>}
            </div>
          </>}
          {page==="sequences"&&<SequencesPage contacts={contacts} sequences={sequences} setSequences={setSequences} enrollments={enrollments} setEnrollments={setEnrollments} seqLog={seqLog} setSeqLog={setSeqLog}/>}
          {page==="review"&&<ReviewQueuePage contacts={contacts} enrollments={enrollments} seqLog={seqLog} setSeqLog={setSeqLog} sequences={sequences}/>}
          {page==="unsub"&&<UnsubscribePage contacts={contacts} setContacts={setContacts}/>}
        </>}
      </div>
    </div>
    <div style={{height:4,display:"flex",flexShrink:0}}>{[C.lavender,C.lightblue,C.blue,C.green,C.yellow,C.orange,C.coral].map(col=><div key={col} style={{flex:1,background:col}}/>)}</div>
    {detail&&<div onClick={()=>{setDetail(null);setEditMode(false);}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:12,width:500,maxHeight:"88vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)",padding:24}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:16}}>
          <Av name={detail.name} size={44} color={C.blue}/>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:17}}>{detail.name}</div><div style={{fontSize:12,color:C.textS,marginTop:2}}>{detail.role} · {detail.district}</div></div>
          <button onClick={()=>{if(!editMode){setEditMode(true);setEditF({name:detail.name,email:detail.email,role:detail.role,school:detail.school,district:detail.district,state:detail.state,persona:detail.persona,lead_source:detail.lead_source,project_type:detail.project_type,alt_contact:detail.alt_contact,notes:detail.notes});}else{setEditMode(false);}}} style={{...B(editMode?"secondary":"secondary","sm"),marginRight:6}}>{editMode?"Cancel Edit":"✏️ Edit"}</button>
          <button onClick={()=>{setDetail(null);setEditMode(false);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.textT}}>✕</button>
        </div>
        {!editMode?<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
            {[["Email",detail.email],["Organization",detail.school],["District",detail.district],["State",detail.state],["Lead Source",detail.lead_source],["Project Type",detail.project_type]].map(([l,v])=>(<div key={l}><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:C.textT,marginBottom:3}}>{l}</div><div style={{fontSize:13,wordBreak:"break-all"}}>{v||"—"}</div></div>))}
            <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:C.textT,marginBottom:3}}>Persona</div>{(()=>{const[pc,pb]=PER_C[detail.persona]||["#6B7280","#F1EFE8"];return<Tag label={TMPL[detail.persona]?.label||detail.persona} color={pc} bg={pb}/>;})()}</div>
            <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:C.textT,marginBottom:3}}>Stage</div><Tag label={detail.stage} color={STAGE_META[detail.stage]?.color||"#6B7280"} bg={STAGE_META[detail.stage]?.bg||"#F3F4F6"}/></div>
          </div>
          {detail.alt_contact&&<div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:C.textT,marginBottom:3}}>Alt Contact</div><div style={{fontSize:13,color:C.textS}}>{detail.alt_contact}</div></div>}
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:C.textT,marginBottom:6}}>Notes</div>
          <textarea defaultValue={detail.notes||""} onBlur={async e=>{const newNotes=e.target.value;await sbFetch(`contacts?id=eq.${detail.id}`,{method:"PATCH",body:JSON.stringify({notes:newNotes})});setContacts(p=>p.map(c=>c.id===detail.id?{...c,notes:newNotes}:c));setDetail(d=>({...d,notes:newNotes}));}} style={{...I(),fontSize:13,lineHeight:1.6,marginBottom:20,minHeight:60,resize:"vertical",background:"white"}} placeholder="Click to add notes..."/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setDetail(null);setEditMode(false);selectCC(detail);setPage("compose");}} style={B("primary")}>✉ Compose Email</button>
            <button onClick={()=>{setDetail(null);setEditMode(false);}} style={B("secondary")}>Close</button>
            <button onClick={()=>{if(window.confirm(`Delete ${detail.name}? This cannot be undone.`)){deleteContact(detail);setEditMode(false);}}} style={{...B("secondary"),marginLeft:"auto",color:"#A32D2D",borderColor:"#FECACA"}}>🗑 Delete</button>
          </div>
        </>:<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            {[["name","Name"],["email","Email"],["role","Role"],["school","Organization"],["district","District"],["state","State"],["lead_source","Lead Source"],["project_type","Project Type"],["alt_contact","Alt Contact"]].map(([k,l])=>(
              <div key={k} style={{display:"flex",flexDirection:"column",gap:4}}>
                <label style={LBL()}>{l}</label>
                <input value={editF[k]||""} onChange={e=>setEditF(f=>({...f,[k]:e.target.value}))} style={I()}/>
              </div>
            ))}
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <label style={LBL()}>Persona</label>
              <select value={editF.persona||"General"} onChange={e=>setEditF(f=>({...f,persona:e.target.value}))} style={S()}>
                {Object.keys(TMPL).map(k=><option key={k} value={k}>{TMPL[k].label}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:16}}>
            <label style={LBL()}>Notes</label>
            <textarea value={editF.notes||""} onChange={e=>setEditF(f=>({...f,notes:e.target.value}))} rows={3} style={{...I(),resize:"vertical",lineHeight:1.7,background:"white"}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={async()=>{
              try{
                await sbFetch(`contacts?id=eq.${detail.id}`,{method:"PATCH",body:JSON.stringify({name:editF.name,email:editF.email,role:editF.role,organization:editF.school,district:editF.district,region:editF.state,persona:editF.persona,lead_source:editF.lead_source,project_type:editF.project_type,alt_contact:editF.alt_contact,notes:editF.notes})});
                const updated={...detail,name:editF.name,email:editF.email,role:editF.role,school:editF.school,district:editF.district,state:editF.state,persona:editF.persona,lead_source:editF.lead_source,project_type:editF.project_type,alt_contact:editF.alt_contact,notes:editF.notes};
                setContacts(p=>p.map(c=>c.id===detail.id?updated:c));
                setDetail(updated);setEditMode(false);
              }catch(e){alert("Error saving: "+e.message);}
            }} style={B("primary")}>💾 Save Changes</button>
            <button onClick={()=>setEditMode(false)} style={B("secondary")}>Cancel</button>
          </div>
        </>}
      </div>
    </div>}
    {addOpen&&<div onClick={()=>setAddOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:12,width:460,boxShadow:"0 20px 60px rgba(0,0,0,0.2)",padding:24}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}><div style={{fontWeight:700,fontSize:16}}>Add Contact</div><button onClick={()=>setAddOpen(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.textT}}>✕</button></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          {[["fname","First Name","Jane"],["lname","Last Name","Smith"]].map(([k,l,ph])=><div key={k} style={{display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>{l}</label><input value={addF[k]} onChange={e=>setAddF(f=>({...f,[k]:e.target.value}))} placeholder={ph} style={I()}/></div>)}
          <div style={{gridColumn:"1/-1",display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>Email</label><input value={addF.email} onChange={e=>setAddF(f=>({...f,email:e.target.value}))} placeholder="j.smith@district.edu" style={I()}/></div>
          {[["role","Role","Nutrition Director"],["school","Organization","Lincoln HS"],["district","District","Clarkstown CSD"]].map(([k,l,ph])=><div key={k} style={{display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>{l}</label><input value={addF[k]} onChange={e=>setAddF(f=>({...f,[k]:e.target.value}))} placeholder={ph} style={I()}/></div>)}
          <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>State</label><select value={addF.state} onChange={e=>setAddF(f=>({...f,state:e.target.value}))} style={S()}>{["NY","NJ","CT","PA","MA","Other"].map(s=><option key={s} value={s}>{s}</option>)}</select></div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>Persona</label><select value={addF.persona} onChange={e=>setAddF(f=>({...f,persona:e.target.value}))} style={S()}>{Object.keys(TMPL).map(k=><option key={k} value={k}>{TMPL[k].label}</option>)}</select></div>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}><button onClick={()=>setAddOpen(false)} style={B("secondary")}>Cancel</button><button onClick={saveContact} style={B("primary")}>Add Contact</button></div>
      </div>
    </div>}
    {selectedContact&&<div onClick={()=>setSelectedContact(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:12,width:480,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)",padding:24}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:18}}><Av name={selectedContact.name} size={44} color={PER_C[selectedContact.persona]?.[0]||C.blue}/><div style={{flex:1}}><div style={{fontWeight:700,fontSize:17}}>{selectedContact.name}</div><div style={{fontSize:12,color:C.textS,marginTop:2}}>{selectedContact.role} · {selectedContact.district}</div><div style={{fontSize:11,color:C.textS,marginTop:1}}>{selectedContact.email}</div></div><button onClick={()=>setSelectedContact(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.textT}}>✕</button></div>
        <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
          {(()=>{const[pc,pb]=PER_C[selectedContact.persona]||["#6B7280","#F1EFE8"];return<Tag label={selectedContact.persona} color={pc} bg={pb}/>;})()}
          <Tag label={selectedContact.stage} color={STAGE_META[selectedContact.stage]?.color||"#6B7280"} bg={STAGE_META[selectedContact.stage]?.bg||"#F3F4F6"}/>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Move to stage</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{STAGES.map(s=>{const sm=STAGE_META[s]||{color:C.textS,bg:C.bg,icon:"•"};return <button key={s} onClick={()=>handleStageChange(selectedContact.id,s)} style={{...B("secondary","xs"),background:selectedContact.stage===s?sm.bg:"white",color:selectedContact.stage===s?sm.color:C.textS,border:`1px solid ${selectedContact.stage===s?sm.color:C.border}`,fontWeight:selectedContact.stage===s?600:400}}>{sm.icon} {s}</button>;})}</div>
        </div>
        {selectedContact.notes&&<div style={{marginBottom:16}}><div style={{fontSize:10,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Notes</div><div style={{fontSize:13,color:C.textS,lineHeight:1.6,background:C.bg,borderRadius:6,padding:"8px 10px"}}>{selectedContact.notes}</div></div>}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Tasks</div>
          {(selectedContact.tasks||[]).length===0&&<div style={{fontSize:12,color:C.textT,marginBottom:8}}>No tasks yet</div>}
          {(selectedContact.tasks||[]).map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.border}`}}><input type="checkbox" checked={t.done} onChange={()=>handleTaskToggle(selectedContact.id,t.id)} style={{accentColor:C.green,cursor:"pointer"}}/><div style={{flex:1}}><div style={{fontSize:12,fontWeight:500,textDecoration:t.done?"line-through":"none",color:t.done?C.textT:C.text}}>{t.text}</div><div style={{fontSize:10,color:C.textS}}>Due {new Date(t.due).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div></div></div>)}
          <div style={{display:"flex",gap:6,marginTop:8}}><input value={taskText} onChange={e=>setTaskText(e.target.value)} placeholder="Add a task..." style={{...I(),fontSize:12,padding:"5px 8px",flex:1}}/><input type="date" value={taskDate} onChange={e=>setTaskDate(e.target.value)} style={{...I("130px"),fontSize:12,padding:"5px 8px"}}/><button onClick={()=>{if(taskText&&taskDate){handleTaskAdd(selectedContact.id,{text:taskText,due:taskDate});setTaskText("");setTaskDate("");}}} style={B("primary","sm")}>Add</button></div>
        </div>
        <div style={{display:"flex",gap:8}}><button onClick={()=>{setSelectedContact(null);selectCC(selectedContact);setPage("compose");}} style={B("primary")}>✉ Compose Email</button><button onClick={()=>setSelectedContact(null)} style={B("secondary")}>Close</button></div>
      </div>
    </div>}
    <style>{`@keyframes spin{to{transform:rotate(360deg);}}`}</style>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspired Growing CRM — Sequences</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#F5F6F8;color:#111827;font-size:13px;height:100vh;overflow:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#E4E7EC;border-radius:3px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
input,select,textarea,button{font-family:inherit;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect} = React;

// ── Supabase Config ───────────────────────────────────────────────────────────
const SUPABASE_URL = "https://obluwsjebgsvyimgbvec.supabase.co";
const SUPABASE_KEY = "sb_publishable_bDX96nrGsEngzarsT55NuA_NHWVeNp7";

async function sbFetch(path, opts={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
      ...(opts.headers||{})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

function mapContact(c) {
  return {
    id: c.id,
    name: c.name || "",
    email: c.email || "",
    role: c.role || "",
    district: c.district || "",
    organization: c.organization || "",
    persona: c.persona || "General",
    stage: c.pipeline_stage || "Cold",
    isUnsubscribed: false,
    bounced: c.hunter_status === "bounced" || c.pipeline_stage === "Bounced",
  };
}

const C={lavender:"#DFC4DF",lightblue:"#C2E8FB",blue:"#40ACE2",green:"#65C39D",yellow:"#FAEE36",orange:"#F9A139",coral:"#EB5665",gDark:"#2d8f68",gBg:"#edf7f2",gBorder:"#b6dfc9",bBg:"#e8f4fc",bDark:"#1e7db0",bg:"#F5F6F8",surface:"#fff",border:"#E4E7EC",text:"#111827",textS:"#6B7280",textT:"#9CA3AF"};
const PER_C={STEM:["#185FA5","#E6F1FB"],Nutrition:["#0F6E56","#E1F5EE"],Sustainability:["#3B6D11","#EAF3DE"],CTE:["#854F0B","#FAEEDA"],General:["#5F5E5A","#F1EFE8"]};

function canSpamFooter(contactId) {
  const unsubUrl = contactId
    ? `https://ig-crm-take-2.vercel.app/unsubscribe?id=${contactId}`
    : `https://ig-crm-take-2.vercel.app/unsubscribe`;
  return `--\nInspired Growing | 123 Innovation Way, Newark, NJ 07102\nYou are receiving this email because of your role in K-12 education.\nTo unsubscribe: ${unsubUrl}\n© 2026 Inspired Growing. All rights reserved.`;
}

const SEQUENCE_TEMPLATES={
  "Cold Outreach — Standard":{id:"cold_standard",description:"4-touch cold outreach sequence. Day 0 intro, follow-ups at 5, 12, 20.",steps:[
    {day:0,label:"Initial Outreach",type:"hook+pitch",approvalRequired:true},
    {day:5,label:"Follow-Up 1",type:"follow_up",approvalRequired:true},
    {day:12,label:"Follow-Up 2",type:"value_add",approvalRequired:true},
    {day:20,label:"Break-Up Email",type:"breakup",approvalRequired:false},
  ]},
  "Warm Lead — Clicked Link":{id:"warm_clicked",description:"For contacts who clicked a brochure or resource link. Faster cadence.",steps:[
    {day:0,label:"Engagement Follow-Up",type:"clicked_hook",approvalRequired:true},
    {day:3,label:"Demo Offer",type:"demo_offer",approvalRequired:true},
    {day:8,label:"Social Proof",type:"social_proof",approvalRequired:false},
  ]},
  "Replied — No Demo Yet":{id:"replied_nodemo",description:"Contact replied but hasn't booked a demo. Nurture to demo scheduled.",steps:[
    {day:0,label:"Demo Push",type:"demo_push",approvalRequired:true},
    {day:5,label:"Easy Yes",type:"easy_yes",approvalRequired:false},
    {day:10,label:"Last Nudge",type:"last_nudge",approvalRequired:false},
  ]},
};

const NOW=Date.now();
const fmtTime=iso=>{const d=Math.floor((NOW-new Date(iso).getTime())/86400000);return d===0?"Today":d===1?"Yesterday":`${d}d ago`;};
const fmtDT=iso=>new Date(iso).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
const ini=n=>(n||"?").split(" ").map(x=>x[0]).join("").toUpperCase().slice(0,2);

const B=(v="secondary",s="md")=>{
  const sz=s==="sm"?{padding:"4px 9px",fontSize:11}:s==="xs"?{padding:"2px 7px",fontSize:10}:{padding:"6px 12px",fontSize:12};
  const vs={primary:{background:C.green,color:"white",border:`1px solid ${C.green}`},secondary:{background:"white",color:C.text,border:`1px solid ${C.border}`},danger:{background:"#FEE2E2",color:"#A32D2D",border:"1px solid #FECACA"},warning:{background:"#FEF3C7",color:"#92400E",border:"1px solid #FDE68A"},ghost:{background:"transparent",color:C.textS,border:"1px solid transparent"}};
  return{...sz,...(vs[v]||vs.secondary),borderRadius:6,cursor:"pointer",fontWeight:500};
};
const I=(w="100%")=>({width:w,padding:"7px 10px",border:`1px solid ${C.border}`,borderRadius:6,fontSize:13,outline:"none",color:C.text,background:C.bg,boxSizing:"border-box"});
const SL=()=>({fontSize:10,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.06em",padding:"10px 14px 4px"});
function Tag({label,color,bg,size=10}){return <span style={{fontSize:size,fontWeight:600,padding:"2px 7px",borderRadius:10,background:bg,color,whiteSpace:"nowrap"}}>{label}</span>;}
function Av({name,size=28,color=C.blue}){return <div style={{width:size,height:size,borderRadius:size/4,background:color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:size*0.38,flexShrink:0}}>{ini(name)}</div>;}
function Spinner({size=12}){return <div style={{width:size,height:size,border:`2px solid ${C.gBorder}`,borderTopColor:C.gDark,borderRadius:"50%",animation:"spin 0.7s linear infinite",flexShrink:0}}/>;}

function NavItem({icon,label,onClick,active}){
  return <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:6,cursor:"pointer",fontSize:13,color:active?C.gDark:C.text,background:active?C.gBg:"transparent",fontWeight:active?500:400}}
    onMouseEnter={e=>{if(!active)e.currentTarget.style.background=C.bg;}}
    onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent";}}>
    <span style={{fontSize:14,width:18,textAlign:"center"}}>{icon}</span>{label}
  </div>;
}

// ── Enroll Modal ──────────────────────────────────────────────────────────────
function EnrollModal({seq, contacts, enrollments, onClose, onEnroll}){
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(new Set());
  const [enrolling, setEnrolling] = useState(false);

  const alreadyEnrolled = new Set(
    enrollments.filter(e=>e.sequence_id===seq.id).map(e=>e.contact_id)
  );

  const eligible = contacts.filter(c =>
    !c.isUnsubscribed &&
    !c.bounced &&
    !alreadyEnrolled.has(c.id) &&
    (!search || `${c.name} ${c.district} ${c.role}`.toLowerCase().includes(search.toLowerCase()))
  );

  async function handleEnroll() {
    if(selected.size === 0) return;
    setEnrolling(true);
    await onEnroll(seq.id, [...selected]);
    setEnrolling(false);
    onClose();
  }

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:12,width:520,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,0.2)",overflow:"hidden"}}>
      <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontWeight:700,fontSize:15}}>Enroll Contacts</div>
          <div style={{fontSize:12,color:C.textS,marginTop:2}}>into "{seq.name}"</div>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.textT}}>✕</button>
      </div>
      <div style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search name, district, role..." style={I()}/>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
        {eligible.length===0&&<div style={{padding:24,textAlign:"center",color:C.textT,fontSize:12}}>No eligible contacts — all may already be enrolled or suppressed</div>}
        {eligible.map(c=>{
          const [pc,pb]=PER_C[c.persona]||["#6B7280","#F1EFE8"];
          const checked=selected.has(c.id);
          return <div key={c.id} onClick={()=>setSelected(p=>{const s=new Set(p);s.has(c.id)?s.delete(c.id):s.add(c.id);return s;})}
            style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",cursor:"pointer",background:checked?"#edf7f2":"white",borderBottom:`1px solid ${C.border}`}}
            onMouseEnter={e=>e.currentTarget.style.background=checked?"#e0f3ec":"#f9fffe"}
            onMouseLeave={e=>e.currentTarget.style.background=checked?"#edf7f2":"white"}>
            <input type="checkbox" checked={checked} onChange={()=>{}} style={{accentColor:C.green,cursor:"pointer",flexShrink:0}}/>
            <Av name={c.name} size={28} color={pc}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:500,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
              <div style={{fontSize:11,color:C.textS,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.role} · {c.district}</div>
            </div>
            <Tag label={c.persona} color={pc} bg={pb}/>
          </div>;
        })}
      </div>
      <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:12,color:C.textS}}>{selected.size} selected · {eligible.length} eligible · {alreadyEnrolled.size} already enrolled</span>
        <button onClick={handleEnroll} disabled={selected.size===0||enrolling} style={{...B("primary"),marginLeft:"auto",opacity:selected.size===0?0.4:1}}>
          {enrolling?<span style={{display:"flex",alignItems:"center",gap:6}}><Spinner/>Enrolling…</span>:`Enroll ${selected.size>0?selected.size:""} Contact${selected.size!==1?"s":""}`}
        </button>
      </div>
    </div>
  </div>;
}

// ── Sequences Page ────────────────────────────────────────────────────────────
function SequencesPage({contacts,sequences,setSequences,enrollments,setEnrollments,seqLog,setSeqLog}){
  const[newOpen,setNewOpen]=useState(false);
  const[newName,setNewName]=useState("Cold Outreach — Standard");
  const[newInterval,setNewInterval]=useState(7);
  const[newBrake,setNewBrake]=useState(50);
  const[saving,setSaving]=useState(false);
  const[enrollTarget,setEnrollTarget]=useState(null);

  async function createSeq(){
    const tmpl=SEQUENCE_TEMPLATES[newName];
    if(!tmpl)return;
    setSaving(true);
    try{
      const rows=await sbFetch("sequences",{method:"POST",body:JSON.stringify({
        name:newName, template_id:tmpl.id, status:"paused",
        interval_minutes:newInterval, emergency_brake_threshold:newBrake,
        started_at:new Date().toISOString()
      })});
      setSequences(p=>[...p,rows[0]]);
      setNewOpen(false);
    }catch(e){alert("Error creating sequence: "+e.message);}
    setSaving(false);
  }

  async function toggleStatus(seq){
    const newStatus=seq.status==="active"?"paused":"active";
    await sbFetch(`sequences?id=eq.${seq.id}`,{method:"PATCH",body:JSON.stringify({status:newStatus})});
    setSequences(p=>p.map(s=>s.id===seq.id?{...s,status:newStatus}:s));
  }

  async function brakeSeq(seq){
    await sbFetch(`sequences?id=eq.${seq.id}`,{method:"PATCH",body:JSON.stringify({status:"braked"})});
    setSequences(p=>p.map(s=>s.id===seq.id?{...s,status:"braked"}:s));
  }

  async function resetBrake(seq){
    await sbFetch(`sequences?id=eq.${seq.id}`,{method:"PATCH",body:JSON.stringify({status:"paused"})});
    setSequences(p=>p.map(s=>s.id===seq.id?{...s,status:"paused"}:s));
  }

  async function handleEnroll(seqId, contactIds){
    const now=new Date().toISOString();
    const rows=contactIds.map(cid=>({
      sequence_id:seqId, contact_id:cid,
      current_step:0, status:"active",
      enrolled_at:now, next_send_at:now
    }));
    try{
      const inserted=await sbFetch("enrollments",{method:"POST",body:JSON.stringify(rows)});
      setEnrollments(p=>[...p,...inserted]);
      // Update pipeline stage to Contacted for Cold contacts
      for(const cid of contactIds){
        const c=contacts.find(x=>x.id===cid);
        if(c&&c.stage==="Cold"){
          await sbFetch(`contacts?id=eq.${cid}`,{method:"PATCH",body:JSON.stringify({pipeline_stage:"Contacted"})});
        }
      }
    }catch(e){alert("Error enrolling: "+e.message);}
  }

  return <>
    <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center"}}>
      <div><div style={{fontWeight:700,fontSize:16}}>Sequences</div><div style={{fontSize:12,color:C.textS,marginTop:1}}>Automated drip sequences · staggered sending · review queue</div></div>
      <button onClick={()=>setNewOpen(true)} style={{...B("primary","sm"),marginLeft:"auto"}}>+ New Sequence</button>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:"#F0F9FF",border:"1px solid #BAE6FD",borderRadius:10,padding:"12px 16px",display:"flex",gap:10}}>
        <span style={{fontSize:18,flexShrink:0}}>⏱</span>
        <div>
          <div style={{fontWeight:600,fontSize:13,color:"#0369A1",marginBottom:3}}>Slow Drip Mode — Active</div>
          <div style={{fontSize:12,color:"#0284C7",lineHeight:1.6}}>Emails send 1 at a time with a configurable gap (default: every 7 minutes). This mimics human sending behavior and avoids Gmail's automated spam filters. The Emergency Brake automatically pauses any sequence if bounce rate exceeds threshold or an API error is detected.</div>
        </div>
      </div>

      {sequences.length===0&&<div style={{padding:40,textAlign:"center",color:C.textT}}>
        <div style={{fontSize:32,marginBottom:8}}>🔄</div>
        <div style={{fontWeight:500,color:C.textS}}>No sequences yet</div>
        <div style={{fontSize:12,marginTop:4}}>Create your first sequence to start automating outreach</div>
      </div>}

      {sequences.map(seq=>{
        const tmpl=Object.values(SEQUENCE_TEMPLATES).find(t=>t.id===seq.template_id)||Object.values(SEQUENCE_TEMPLATES)[0];
        const seqEnrollments=enrollments.filter(e=>e.sequence_id===seq.id);
        const activeEnrollments=seqEnrollments.filter(e=>e.status==="active");
        const sentCount=seqLog.filter(l=>l.sequence_id===seq.id).length;
        const recentLogs=seqLog.filter(l=>l.sequence_id===seq.id).slice(0,4);
        const sm={active:{color:C.gDark,bg:C.gBg,label:"● Active"},paused:{color:"#854F0B",bg:"#FAEEDA",label:"⏸ Paused"},braked:{color:"#A32D2D",bg:"#FEE2E2",label:"🛑 Emergency Brake"}}[seq.status]||{color:"#854F0B",bg:"#FAEEDA",label:"⏸ Paused"};

        return <div key={seq.id} style={{background:"white",border:`1px solid ${seq.status==="braked"?"#FECACA":C.border}`,borderRadius:10,overflow:"hidden"}}>
          {seq.status==="braked"&&<div style={{background:"#FEE2E2",borderBottom:"1px solid #FECACA",padding:"8px 16px",display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#A32D2D"}}>
            <span>🛑</span><strong>Emergency Brake Triggered</strong> — Review logs before resuming.
            <button onClick={()=>resetBrake(seq)} style={{marginLeft:"auto",...B("secondary","sm")}}>Reset</button>
          </div>}
          <div style={{padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:12}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <div style={{fontWeight:700,fontSize:14}}>{seq.name}</div>
                  <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:10,background:sm.bg,color:sm.color}}>{sm.label}</span>
                </div>
                <div style={{fontSize:12,color:C.textS}}>{tmpl?.description}</div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setEnrollTarget(seq)} style={B("secondary","sm")}>+ Enroll</button>
                {seq.status!=="braked"&&<button onClick={()=>toggleStatus(seq)} style={B(seq.status==="active"?"warning":"primary","sm")}>{seq.status==="active"?"⏸ Pause":"▶ Resume"}</button>}
                <button onClick={()=>brakeSeq(seq)} style={B("danger","sm")}>🛑 Brake</button>
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
              {[["Enrolled",seqEnrollments.length,"#185FA5","#E6F1FB"],["Active",activeEnrollments.length,C.gDark,C.gBg],["Sent",sentCount,"#5B21B6","#EDE9FE"],["Completed",seqEnrollments.filter(e=>e.status==="completed").length,"#9CA3AF","#F3F4F6"]].map(([l,v,col,bg])=>(
                <div key={l} style={{background:bg,borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                  <div style={{fontSize:18,fontWeight:700,color:col,lineHeight:1}}>{v}</div>
                  <div style={{fontSize:10,color:C.textS,marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>

            <div style={{display:"flex",gap:12,padding:"8px 10px",background:C.bg,borderRadius:8,fontSize:12,color:C.textS,marginBottom:12}}>
              <span>⏱ <strong style={{color:C.text}}>{seq.interval_minutes} min</strong> between sends</span>
              <span>·</span>
              <span>🛑 Brake at <strong style={{color:C.text}}>{seq.emergency_brake_threshold}</strong> sends</span>
              <span>·</span>
              <span>Started <strong style={{color:C.text}}>{fmtTime(seq.started_at||seq.created_at)}</strong></span>
            </div>

            <div style={{fontSize:11,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Sequence steps</div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:recentLogs.length>0?12:0}}>
              {tmpl?.steps.map((step,i)=>(
                <React.Fragment key={i}>
                  <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",fontSize:11}}>
                    <div style={{fontWeight:600}}>Day {step.day}: {step.label}</div>
                    <div style={{color:C.textS,marginTop:1,display:"flex",gap:4,alignItems:"center"}}>
                      {step.approvalRequired&&<span style={{fontSize:9,fontWeight:600,color:"#854F0B",background:"#FAEEDA",padding:"1px 5px",borderRadius:4}}>APPROVAL</span>}
                      <span style={{fontSize:10}}>{step.type.replace(/_/g," ")}</span>
                    </div>
                  </div>
                  {i<tmpl.steps.length-1&&<span style={{color:C.textT}}>→</span>}
                </React.Fragment>
              ))}
            </div>

            {recentLogs.length>0&&<>
              <div style={{fontSize:11,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,marginTop:4}}>Recent sends</div>
              {recentLogs.map((l,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:11,color:C.textS,marginBottom:3}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:C.green,flexShrink:0}}/>
                  <strong style={{color:C.text}}>{l.contact_name}</strong>
                  <span>{l.step_label}</span>
                  <span style={{marginLeft:"auto",color:C.textT}}>{fmtTime(l.sent_at)}</span>
                </div>
              ))}
            </>}
          </div>
        </div>;
      })}
    </div>

    {newOpen&&<div onClick={()=>setNewOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:12,width:500,boxShadow:"0 20px 60px rgba(0,0,0,0.2)",padding:24}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:16,display:"flex",justifyContent:"space-between"}}>
          New Sequence
          <button onClick={()=>setNewOpen(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.textT}}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
          <div>
            <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",display:"block",marginBottom:4}}>Template</label>
            <select value={newName} onChange={e=>setNewName(e.target.value)} style={I()}>
              {Object.keys(SEQUENCE_TEMPLATES).map(k=><option key={k} value={k}>{k}</option>)}
            </select>
            <div style={{fontSize:11,color:C.textS,marginTop:4}}>{SEQUENCE_TEMPLATES[newName]?.description}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>
              <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",display:"block",marginBottom:4}}>Interval (minutes)</label>
              <input type="number" value={newInterval} onChange={e=>setNewInterval(Number(e.target.value))} min={1} max={60} style={I()}/>
              <div style={{fontSize:10,color:C.textT,marginTop:3}}>Recommended: 5–10 min</div>
            </div>
            <div>
              <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",display:"block",marginBottom:4}}>Emergency Brake</label>
              <input type="number" value={newBrake} onChange={e=>setNewBrake(Number(e.target.value))} min={1} max={200} style={I()}/>
              <div style={{fontSize:10,color:C.textT,marginTop:3}}>Max sends before auto-pause</div>
            </div>
          </div>
        </div>
        <div style={{padding:"10px 14px",background:"#FFF7ED",borderRadius:8,border:"1px solid #FED7AA",fontSize:12,color:"#92400E",marginBottom:16}}>
          ⚠ All emails include a <strong>CAN-SPAM compliant footer</strong> with your address and a personalized unsubscribe link.
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
          <button onClick={()=>setNewOpen(false)} style={B("secondary")}>Cancel</button>
          <button onClick={createSeq} disabled={saving} style={{...B("primary"),opacity:saving?0.6:1}}>
            {saving?<span style={{display:"flex",alignItems:"center",gap:6}}><Spinner/>Creating…</span>:"Create Sequence"}
          </button>
        </div>
      </div>
    </div>}

    {enrollTarget&&<EnrollModal
      seq={enrollTarget}
      contacts={contacts}
      enrollments={enrollments}
      onClose={()=>setEnrollTarget(null)}
      onEnroll={handleEnroll}
    />}
  </>;
}

// ── Review Queue Page ─────────────────────────────────────────────────────────
function ReviewQueuePage({contacts,enrollments,seqLog,setSeqLog,sequences}){
  const[selected,setSelected]=useState(null);
  const[approving,setApproving]=useState(false);

  // Build a queue from active enrollments that need approval for their current step
  const queue = enrollments
    .filter(e=>e.status==="active")
    .map(e=>{
      const c=contacts.find(x=>x.id===e.contact_id);
      const seq=sequences.find(x=>x.id===e.sequence_id);
      if(!c||!seq)return null;
      const tmpl=Object.values(SEQUENCE_TEMPLATES).find(t=>t.id===seq.template_id);
      const step=tmpl?.steps[e.current_step];
      if(!step||!step.approvalRequired)return null;
      const alreadySent=seqLog.find(l=>l.sequence_id===seq.id&&l.contact_id===c.id&&l.step_label===step.label);
      if(alreadySent)return null;
      return {
        enrollmentId:e.id, sequenceId:seq.id, sequenceName:seq.name,
        contactId:c.id, contactName:c.name, contactDistrict:c.district,
        contactPersona:c.persona, stepLabel:step.label, stepIndex:e.current_step,
        subject:`Quick note — aeroponic classroom farm for ${c.district}`,
        scheduledFor:e.next_send_at||new Date().toISOString(),
        status:"pending",
        body:`Hi ${c.name?.split(" ")[0]||"there"},\n\n[AI-generated hook for ${c.district} will appear here]\n\nInspired Growing installs compact aeroponic classroom farms in K-12 schools — students grow and harvest fresh greens every 7 days, producing around 100 salads a week right in the building.\n\nWould it be worth a quick 10-minute call?\n\nEric Wagner\nInspired Growing\ninspiredgrowing.com\n\n${canSpamFooter(c.id)}`,
      };
    }).filter(Boolean);

  const [editBodies, setEditBodies] = useState({});

  async function approve(item){
    setApproving(true);
    try{
      // Log the send
      const logRow={
        sequence_id:item.sequenceId, contact_id:item.contactId,
        contact_name:item.contactName, step_label:item.stepLabel,
        subject:item.subject, status:"sent", sent_at:new Date().toISOString()
      };
      const inserted=await sbFetch("sequence_log",{method:"POST",body:JSON.stringify(logRow)});
      setSeqLog(p=>[inserted[0],...p]);
      // Advance enrollment step
      await sbFetch(`enrollments?id=eq.${item.enrollmentId}`,{method:"PATCH",body:JSON.stringify({current_step:item.stepIndex+1})});
      // Update contact pipeline stage
      await sbFetch(`contacts?id=eq.${item.contactId}`,{method:"PATCH",body:JSON.stringify({pipeline_stage:"Contacted",last_touch:new Date().toISOString().split("T")[0]})});
    }catch(e){alert("Error approving: "+e.message);}
    setApproving(false);
    setSelected(null);
  }

  async function reject(item){
    // Mark enrollment as paused for this contact
    await sbFetch(`enrollments?id=eq.${item.enrollmentId}`,{method:"PATCH",body:JSON.stringify({status:"paused"})});
    setSelected(null);
  }

  return <>
    <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center"}}>
      <div><div style={{fontWeight:700,fontSize:16}}>Review Queue</div><div style={{fontSize:12,color:C.textS,marginTop:1}}>Approve or reject emails before they send</div></div>
      {queue.length>0&&<span style={{marginLeft:"auto",fontSize:12,fontWeight:600,color:"#854F0B",background:"#FAEEDA",padding:"3px 10px",borderRadius:20,border:"1px solid #FDE68A"}}>{queue.length} awaiting approval</span>}
    </div>
    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <div style={{width:300,borderRight:`1px solid ${C.border}`,overflowY:"auto",flexShrink:0}}>
        {queue.length===0&&<div style={{padding:40,textAlign:"center",color:C.textT,fontSize:12}}>
          <div style={{fontSize:28,marginBottom:8}}>📬</div>
          No emails pending review
        </div>}
        {queue.map(q=>(
          <div key={q.enrollmentId} onClick={()=>setSelected(q)}
            style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,cursor:"pointer",background:selected?.enrollmentId===q.enrollmentId?C.gBg:"white",borderLeft:selected?.enrollmentId===q.enrollmentId?`3px solid ${C.green}`:"3px solid transparent"}}
            onMouseEnter={e=>{if(selected?.enrollmentId!==q.enrollmentId)e.currentTarget.style.background=C.bg;}}
            onMouseLeave={e=>{if(selected?.enrollmentId!==q.enrollmentId)e.currentTarget.style.background="white";}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
              <Av name={q.contactName} size={22} color={PER_C[q.contactPersona]?.[0]||C.blue}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:500,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.contactName}</div>
                <div style={{fontSize:10,color:C.textS}}>{q.contactDistrict}</div>
              </div>
              <span style={{width:7,height:7,borderRadius:"50%",background:C.orange,flexShrink:0}}/>
            </div>
            <div style={{fontSize:11,color:C.textS,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.stepLabel} · {q.sequenceName}</div>
            <div style={{fontSize:10,color:C.textT,marginTop:2}}>Scheduled: {fmtDT(q.scheduledFor)}</div>
          </div>
        ))}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:12}}>
        {!selected?(
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:C.textT,gap:10,textAlign:"center"}}>
            <div style={{fontSize:36,opacity:0.3}}>📬</div>
            <div style={{fontWeight:500,color:C.textS}}>Select an email to review</div>
            <div style={{fontSize:12,maxWidth:260,lineHeight:1.6}}>Review and approve each email before it sends. You can edit the body before approving.</div>
          </div>
        ):<>
          <div style={{padding:"11px 14px",background:C.gBg,border:`1px solid ${C.gBorder}`,borderRadius:8,display:"flex",alignItems:"center",gap:10}}>
            <Av name={selected.contactName} size={34} color={PER_C[selected.contactPersona]?.[0]||C.blue}/>
            <div>
              <div style={{fontWeight:600,fontSize:13}}>{selected.contactName}</div>
              <div style={{fontSize:11,color:C.textS,marginTop:1}}>{selected.contactDistrict} · {selected.sequenceName} · {selected.stepLabel}</div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",letterSpacing:"0.04em"}}>Subject</label>
            <div style={{padding:"7px 10px",border:`1px solid ${C.border}`,borderRadius:6,fontSize:13,background:C.bg}}>{selected.subject}</div>
          </div>
          <div style={{fontSize:12,color:C.textS}}>📅 Scheduled: <strong style={{color:C.text}}>{fmtDT(selected.scheduledFor)}</strong></div>
          <div style={{display:"flex",flexDirection:"column",gap:4,flex:1}}>
            <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",letterSpacing:"0.04em"}}>Email Body</label>
            <textarea
              value={editBodies[selected.enrollmentId]??selected.body}
              onChange={e=>setEditBodies(p=>({...p,[selected.enrollmentId]:e.target.value}))}
              rows={12}
              style={{...I(),resize:"vertical",lineHeight:1.7,background:"white",fontFamily:"Georgia,serif",fontSize:12}}/>
          </div>
          <div style={{padding:"8px 12px",background:"#F0FDF4",borderRadius:8,border:`1px solid ${C.gBorder}`,fontSize:11,color:C.gDark}}>
            ✓ <strong>CAN-SPAM footer auto-appended</strong> — includes physical address and personalized unsubscribe link.
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>approve(selected)} disabled={approving} style={{...B("primary"),flex:1,opacity:approving?0.6:1}}>
              {approving?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Spinner/>Approving…</span>:"✓ Approve & Queue"}
            </button>
            <button onClick={()=>reject(selected)} style={{...B("danger"),flex:1}}>✗ Reject</button>
          </div>
        </>}
      </div>
    </div>
  </>;
}

// ── Unsubscribe Page ──────────────────────────────────────────────────────────
function UnsubscribePage({contacts,setContacts}){
  const unsubs=contacts.filter(c=>c.isUnsubscribed);
  const bounced=contacts.filter(c=>c.bounced);

  async function toggleUnsub(c, val){
    await sbFetch(`contacts?id=eq.${c.id}`,{method:"PATCH",body:JSON.stringify({pipeline_stage:val?"Cold":"Bounced"})}).catch(console.error);
    setContacts(p=>p.map(x=>x.id===c.id?{...x,isUnsubscribed:val}:x));
  }

  return <>
    <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`}}>
      <div style={{fontWeight:700,fontSize:16}}>Unsubscribe & Suppression</div>
      <div style={{fontSize:12,color:C.textS,marginTop:1}}>CAN-SPAM compliance · unsubscribed contacts skipped in all sequences</div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:16}}>
      <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>Suppression summary</div>
        <div style={{display:"flex",gap:12}}>
          {[["Unsubscribed",unsubs.length,"#A32D2D","#FEE2E2"],["Bounced",bounced.length,"#854F0B","#FAEEDA"],["Eligible",contacts.length-unsubs.length-bounced.length,C.gDark,C.gBg]].map(([l,v,col,bg])=>(
            <div key={l} style={{flex:1,background:bg,borderRadius:8,padding:"10px 14px",textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:700,color:col}}>{v}</div>
              <div style={{fontSize:11,color:C.textS,marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {unsubs.length>0&&<div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontWeight:600,fontSize:13}}>Unsubscribed</div>
          <span style={{fontSize:10,fontWeight:600,color:"#A32D2D",background:"#FEE2E2",padding:"1px 7px",borderRadius:10}}>{unsubs.length}</span>
        </div>
        {unsubs.map(c=>{const[pc]=PER_C[c.persona]||["#6B7280"];return(
          <div key={c.id} style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
            <Av name={c.name} size={28} color={pc}/>
            <div style={{flex:1}}><div style={{fontWeight:500,fontSize:12}}>{c.name}</div><div style={{fontSize:11,color:C.textS}}>{c.role} · {c.district}</div></div>
            <Tag label="Unsubscribed" color="#A32D2D" bg="#FEE2E2"/>
            <button onClick={()=>toggleUnsub(c,false)} style={B("secondary","sm")}>Re-subscribe</button>
          </div>
        );})}
      </div>}

      {bounced.length>0&&<div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontWeight:600,fontSize:13}}>Bounced</div>
          <span style={{fontSize:10,fontWeight:600,color:"#854F0B",background:"#FAEEDA",padding:"1px 7px",borderRadius:10}}>{bounced.length}</span>
        </div>
        {bounced.map(c=>{const[pc]=PER_C[c.persona]||["#6B7280"];return(
          <div key={c.id} style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
            <Av name={c.name} size={28} color={pc}/>
            <div style={{flex:1}}><div style={{fontWeight:500,fontSize:12}}>{c.name}</div><div style={{fontSize:11,color:C.textS}}>{c.role} · {c.district}</div></div>
            <Tag label="Bounced" color="#854F0B" bg="#FAEEDA"/>
          </div>
        );})}
      </div>}
    </div>
  </>;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const[contacts,setContacts]=useState([]);
  const[sequences,setSequences]=useState([]);
  const[enrollments,setEnrollments]=useState([]);
  const[seqLog,setSeqLog]=useState([]);
  const[loading,setLoading]=useState(true);
  const[loadErr,setLoadErr]=useState("");
  const[page,setPage]=useState("sequences");

  useEffect(()=>{
    setLoading(true);
    Promise.all([
      sbFetch("contacts?select=*&order=created_at.desc&limit=1000"),
      sbFetch("sequences?select=*&order=created_at.desc"),
      sbFetch("enrollments?select=*&order=enrolled_at.desc"),
      sbFetch("sequence_log?select=*&order=sent_at.desc&limit=500"),
    ]).then(([c,s,e,l])=>{
      setContacts(c.map(mapContact));
      setSequences(s);
      setEnrollments(e);
      setSeqLog(l);
      setLoading(false);
    }).catch(e=>{
      setLoadErr("Could not load data: "+e.message);
      setLoading(false);
    });
  },[]);

  const pendingCount = enrollments.filter(e=>{
    const seq=sequences.find(s=>s.id===e.sequence_id);
    if(!seq||e.status!=="active")return false;
    const tmpl=Object.values(SEQUENCE_TEMPLATES).find(t=>t.id===seq.template_id);
    const step=tmpl?.steps[e.current_step];
    return step?.approvalRequired;
  }).length;

  const activeSeqs=sequences.filter(s=>s.status==="active").length;
  const brakedSeqs=sequences.filter(s=>s.status==="braked").length;

  return <div style={{fontFamily:"system-ui,sans-serif",background:C.bg,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",fontSize:13,color:C.text}}>
    <div style={{height:52,background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",padding:"0 16px",gap:12,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:8,width:195,flexShrink:0}}>
        <div style={{width:28,height:28,borderRadius:6,background:C.green,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:12}}>IG</div>
        <div><div style={{fontWeight:700,fontSize:13}}>Inspired Growing</div><div style={{fontSize:10,color:C.textS}}>CRM · Phase 3</div></div>
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
        {loading&&<div style={{fontSize:11,color:C.textS,display:"flex",alignItems:"center",gap:6}}><Spinner/>Loading…</div>}
        {!loading&&<>
          {activeSeqs>0&&<div style={{fontSize:12,color:C.gDark,padding:"3px 10px",background:C.gBg,borderRadius:20,border:`1px solid ${C.gBorder}`}}>● <strong>{activeSeqs}</strong> active</div>}
          {brakedSeqs>0&&<div style={{fontSize:12,color:"#A32D2D",padding:"3px 10px",background:"#FEE2E2",borderRadius:20,border:"1px solid #FECACA"}}>🛑 <strong>{brakedSeqs}</strong> braked</div>}
          {pendingCount>0&&<div style={{fontSize:12,color:"#854F0B",padding:"3px 10px",background:"#FAEEDA",borderRadius:20,border:"1px solid #FDE68A"}}>📬 <strong>{pendingCount}</strong> to review</div>}
          <div style={{fontSize:12,color:C.textS,padding:"3px 10px",background:C.bg,borderRadius:20,border:`1px solid ${C.border}`}}><strong style={{color:C.text}}>{contacts.length}</strong> contacts</div>
        </>}
        <div style={{width:28,height:28,borderRadius:"50%",background:C.blue,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:11,fontWeight:600}}>EW</div>
      </div>
    </div>

    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <div style={{width:195,background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",padding:"10px 8px",gap:2,flexShrink:0}}>
        <div style={SL()}>Automation</div>
        <NavItem icon="🔄" label="Sequences" onClick={()=>setPage("sequences")} active={page==="sequences"}/>
        <NavItem icon="📬" label={`Review Queue${pendingCount>0?" ("+pendingCount+")":""}`} onClick={()=>setPage("review")} active={page==="review"}/>
        <NavItem icon="🚫" label="Unsubscribes" onClick={()=>setPage("unsub")} active={page==="unsub"}/>
        <div style={SL()}>Pipeline</div>
        <NavItem icon="📊" label="Dashboard" onClick={()=>window.location.href='/index.html'} active={false}/>
        <NavItem icon="📋" label="Pipeline" onClick={()=>window.location.href='/index.html'} active={false}/>
        <NavItem icon="⚡" label="Activity Feed" onClick={()=>window.location.href='/index.html'} active={false}/>
        <div style={SL()}>Outreach</div>
        <NavItem icon="👥" label="Contacts" onClick={()=>window.location.href='/contacts.html'} active={false}/>
        <NavItem icon="✉️" label="Compose" onClick={()=>window.location.href='/contacts.html'} active={false}/>
        <NavItem icon="📁" label="Resources" onClick={()=>window.location.href='/contacts.html'} active={false}/>
        <NavItem icon="⚙️" label="Email Templates" onClick={()=>window.location.href='/contacts.html'} active={false}/>
      </div>

      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {loadErr&&<div style={{padding:"8px 16px",background:"#FEE2E2",fontSize:12,color:"#A32D2D",borderBottom:`1px solid #FECACA`,flexShrink:0}}>⚠ {loadErr}</div>}
        {loading?<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:C.textT}}>
          <div style={{width:28,height:28,border:`3px solid ${C.gBorder}`,borderTopColor:C.gDark,borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
          <div style={{fontSize:13}}>Loading from Supabase…</div>
        </div>:<>
          {page==="sequences"&&<SequencesPage contacts={contacts} sequences={sequences} setSequences={setSequences} enrollments={enrollments} setEnrollments={setEnrollments} seqLog={seqLog} setSeqLog={setSeqLog}/>}
          {page==="review"&&<ReviewQueuePage contacts={contacts} enrollments={enrollments} seqLog={seqLog} setSeqLog={setSeqLog} sequences={sequences}/>}
          {page==="unsub"&&<UnsubscribePage contacts={contacts} setContacts={setContacts}/>}
        </>}
      </div>
    </div>

    <div style={{height:4,display:"flex",flexShrink:0}}>
      {[C.lavender,C.lightblue,C.blue,C.green,C.yellow,C.orange,C.coral].map(col=><div key={col} style={{flex:1,background:col}}/>)}
    </div>
    <style>{`@keyframes spin{to{transform:rotate(360deg);}}`}</style>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

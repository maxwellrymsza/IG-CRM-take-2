<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspired Growing CRM — Sequences</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,-apple-system,sans-serif;background:#F5F6F8;color:#111827;font-size:13px;height:100vh;overflow:hidden;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-thumb{background:#E4E7EC;border-radius:3px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  input,select,textarea,button{font-family:inherit;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef} = React;

const C={lavender:"#DFC4DF",lightblue:"#C2E8FB",blue:"#40ACE2",green:"#65C39D",yellow:"#FAEE36",orange:"#F9A139",coral:"#EB5665",gDark:"#2d8f68",gBg:"#edf7f2",gBorder:"#b6dfc9",bBg:"#e8f4fc",bDark:"#1e7db0",bg:"#F5F6F8",surface:"#fff",border:"#E4E7EC",text:"#111827",textS:"#6B7280",textT:"#9CA3AF"};
const PER_C={STEM:["#185FA5","#E6F1FB"],Nutrition:["#0F6E56","#E1F5EE"],Sustainability:["#3B6D11","#EAF3DE"],CTE:["#854F0B","#FAEEDA"],General:["#5F5E5A","#F1EFE8"]};

// ── CHANGE 1: Dynamic CAN-SPAM footer with personalized unsubscribe link ──────
function canSpamFooter(contactId) {
  const unsubUrl = contactId
    ? `https://ig-crm-take-2.pages.dev/unsubscribe.html?id=${contactId}`
    : `https://ig-crm-take-2.pages.dev/unsubscribe.html`;
  return `--\nInspired Growing | 123 Innovation Way, Newark, NJ 07102\nYou are receiving this email because of your role in K-12 education.\nTo unsubscribe: ${unsubUrl}\n© 2026 Inspired Growing. All rights reserved.`;
}

const SEQUENCE_TEMPLATES={
  "Cold Outreach — Standard":{id:"cold_standard",description:"4-touch cold outreach sequence. Day 0 intro, follow-ups at 5, 12, 20.",steps:[
    {day:0,label:"Initial Outreach",type:"hook+pitch",approvalRequired:true},
    {day:5,label:"Follow-Up 1",type:"follow_up",approvalRequired:true},
    {day:12,label:"Follow-Up 2",type:"value_add",approvalRequired:true},
    {day:20,label:"Break-Up Email",type:"breakup",approvalRequired:false},
  ]},
  "Warm Lead — Clicked Link":{id:"warm_clicked",description:"For contacts who clicked a brochure or resource link. Faster cadence.",steps:[
    {day:0,label:"Engagement Follow-Up",type:"clicked_hook",approvalRequired:true},
    {day:3,label:"Demo Offer",type:"demo_offer",approvalRequired:true},
    {day:8,label:"Social Proof",type:"social_proof",approvalRequired:false},
  ]},
  "Replied — No Demo Yet":{id:"replied_nodemo",description:"Contact replied but hasn't booked a demo. Nurture to demo scheduled.",steps:[
    {day:0,label:"Demo Push",type:"demo_push",approvalRequired:true},
    {day:5,label:"Easy Yes",type:"easy_yes",approvalRequired:false},
    {day:10,label:"Last Nudge",type:"last_nudge",approvalRequired:false},
  ]},
};

const NOW=Date.now();
const daysAgo=d=>new Date(NOW-d*86400000).toISOString();

const SEED_CONTACTS=[
  {id:1,name:"Maria Torres",email:"m.torres@clarkstown.edu",role:"Nutrition Director",district:"Clarkstown CSD",persona:"Nutrition",isUnsubscribed:false,bounced:false},
  {id:2,name:"James Okafor",email:"j.okafor@bronxvilleschools.org",role:"STEM Coordinator",district:"Bronxville UFSD",persona:"STEM",isUnsubscribed:false,bounced:false},
  {id:3,name:"Sandra Perez",email:"s.perez@ithacacsd.org",role:"Sustainability Director",district:"Ithaca City SD",persona:"Sustainability",isUnsubscribed:false,bounced:false},
  {id:4,name:"Kevin Williams",email:"k.williams@williamsville.edu",role:"CTE Director",district:"Williamsville CSD",persona:"CTE",isUnsubscribed:false,bounced:false},
  {id:5,name:"Angela Chen",email:"a.chen@newarkpublicschools.org",role:"Nutrition Director",district:"Newark Public Schools",persona:"Nutrition",isUnsubscribed:false,bounced:false},
  {id:6,name:"Robert Kim",email:"r.kim@somersetschools.org",role:"Principal",district:"Somerset Hills SD",persona:"General",isUnsubscribed:true,bounced:false},
  {id:7,name:"Priya Nair",email:"p.nair@montclair.edu",role:"Science Dept Head",district:"Montclair SD",persona:"STEM",isUnsubscribed:false,bounced:false},
  {id:8,name:"David Chen",email:"d.chen@eastsidestem.nyc",role:"STEM Coordinator",district:"NYC DOE",persona:"STEM",isUnsubscribed:false,bounced:false},
  {id:9,name:"Lisa Park",email:"l.park@hobokenschools.org",role:"Wellness Coordinator",district:"Hoboken Public Schools",persona:"Nutrition",isUnsubscribed:false,bounced:false},
  {id:10,name:"Marcus Johnson",email:"m.johnson@clarkstown.edu",role:"Superintendent",district:"Clarkstown CSD",persona:"General",isUnsubscribed:false,bounced:false},
  {id:11,name:"Rachel Green",email:"r.green@madisonschools.nj",role:"Culinary Arts Teacher",district:"Madison Borough SD",persona:"CTE",isUnsubscribed:false,bounced:false},
  {id:12,name:"Tom Walsh",email:"t.walsh@larchmont.edu",role:"Sustainability Admin",district:"Mamaroneck UFSD",persona:"Sustainability",isUnsubscribed:false,bounced:false},
];

const SEED_SEQUENCES=[{
  id:1,name:"Cold Outreach — Standard",templateId:"cold_standard",status:"active",startedAt:daysAgo(6),
  intervalMinutes:7,emergencyBrakeThreshold:50,
  enrolledContactIds:[1,2,3,5,9,10,11,12],
  log:[
    {contactId:1,contactName:"Maria Torres",stepLabel:"Initial Outreach",sentAt:daysAgo(6),status:"sent"},
    {contactId:2,contactName:"James Okafor",stepLabel:"Initial Outreach",sentAt:daysAgo(6),status:"sent"},
    {contactId:3,contactName:"Sandra Perez",stepLabel:"Initial Outreach",sentAt:daysAgo(6),status:"sent"},
    {contactId:5,contactName:"Angela Chen",stepLabel:"Initial Outreach",sentAt:daysAgo(5),status:"sent"},
  ]
}];

// ── CHANGE 2: Seed queue uses dynamic footer with real contact IDs ─────────────
const SEED_QUEUE=[
  {id:1,sequenceName:"Cold Outreach — Standard",contactId:1,contactName:"Maria Torres",contactDistrict:"Clarkstown CSD",contactPersona:"Nutrition",stepLabel:"Follow-Up 1",subject:"Re: aeroponic farm for Clarkstown CSD — checking in",scheduledFor:new Date(NOW+3600000).toISOString(),status:"pending",body:`Hi Maria,\n\nJust following up on my note from last week about Inspired Growing's classroom farm program.\n\nI know Clarkstown CSD has been expanding its farm-to-school initiatives — our system produces around 100 fresh salads a week right from a classroom, with zero food miles and no soil or pesticides.\n\nWould a quick 10-minute call be worth it?\n\nEric Wagner\nInspired Growing\ninspiredgrowing.com\n\n${canSpamFooter(1)}`},
  {id:2,sequenceName:"Cold Outreach — Standard",contactId:2,contactName:"James Okafor",contactDistrict:"Bronxville UFSD",contactPersona:"STEM",stepLabel:"Follow-Up 1",subject:"Re: aeroponic farm for Bronxville UFSD — checking in",scheduledFor:new Date(NOW+3600000*2).toISOString(),status:"pending",body:`Hi James,\n\nFollowing up on my earlier note. Bronxville has been expanding its STEM lab offerings — our aeroponic farm runs 7-day seed-to-harvest cycles and connects directly to NGSS standards.\n\nWorth a look?\n\nEric Wagner\nInspired Growing\ninspiredgrowing.com\n\n${canSpamFooter(2)}`},
  {id:3,sequenceName:"Cold Outreach — Standard",contactId:3,contactName:"Sandra Perez",contactDistrict:"Ithaca City SD",contactPersona:"Sustainability",stepLabel:"Follow-Up 1",subject:"Re: aeroponic farm for Ithaca City SD — checking in",scheduledFor:new Date(NOW+3600000*3).toISOString(),status:"pending",body:`Hi Sandra,\n\nFollowing up — Ithaca City SD has strong sustainability goals for 2026 and Green Ribbon status.\n\nOur system uses 95% less water than soil farming, zero pesticides, and eliminates food transportation entirely.\n\nHappy to jump on a quick call.\n\nEric Wagner\nInspired Growing\ninspiredgrowing.com\n\n${canSpamFooter(3)}`},
];

const ini=n=>n.split(" ").map(x=>x[0]).join("").toUpperCase().slice(0,2);
const fmtTime=iso=>{const d=Math.floor((NOW-new Date(iso).getTime())/86400000);return d===0?"Today":d===1?"Yesterday":`${d}d ago`;};
const fmtDT=iso=>new Date(iso).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});

const B=(v="secondary",s="md")=>{
  const sz=s==="sm"?{padding:"4px 9px",fontSize:11}:s==="xs"?{padding:"2px 7px",fontSize:10}:{padding:"6px 12px",fontSize:12};
  const vs={primary:{background:C.green,color:"white",border:`1px solid ${C.green}`},secondary:{background:"white",color:C.text,border:`1px solid ${C.border}`},danger:{background:"#FEE2E2",color:"#A32D2D",border:"1px solid #FECACA"},warning:{background:"#FEF3C7",color:"#92400E",border:"1px solid #FDE68A"},ghost:{background:"transparent",color:C.textS,border:"1px solid transparent"}};
  return{...sz,...(vs[v]||vs.secondary),borderRadius:6,cursor:"pointer",fontWeight:500};
};
const I=(w="100%")=>({width:w,padding:"7px 10px",border:`1px solid ${C.border}`,borderRadius:6,fontSize:13,outline:"none",color:C.text,background:C.bg,boxSizing:"border-box"});
const SL=()=>({fontSize:10,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.06em",padding:"10px 14px 4px"});

function Tag({label,color,bg,size=10}){return <span style={{fontSize:size,fontWeight:600,padding:"2px 7px",borderRadius:10,background:bg,color,whiteSpace:"nowrap"}}>{label}</span>;}
function Av({name,size=28,color=C.blue}){return <div style={{width:size,height:size,borderRadius:size/4,background:color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:size*0.38,flexShrink:0}}>{ini(name)}</div>;}

function NavItem({icon,label,onClick,active}){
  return (
    <div onClick={onClick}
      style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:6,cursor:"pointer",fontSize:13,color:active?C.gDark:C.text,background:active?C.gBg:"transparent",fontWeight:active?500:400}}
      onMouseEnter={e=>{if(!active)e.currentTarget.style.background=C.bg;}}
      onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent";}}>
      <span style={{fontSize:14,width:18,textAlign:"center"}}>{icon}</span>{label}
    </div>
  );
}

function SequencesPage({contacts,sequences,setSequences}){
  const[newOpen,setNewOpen]=useState(false);
  const[newName,setNewName]=useState("Cold Outreach — Standard");
  const[newInterval,setNewInterval]=useState(7);
  const[newBrake,setNewBrake]=useState(50);

  function createSeq(){
    const tmpl=SEQUENCE_TEMPLATES[newName];
    if(!tmpl)return;
    setSequences(p=>[...p,{id:Date.now(),name:newName,templateId:tmpl.id,status:"paused",startedAt:new Date().toISOString(),intervalMinutes:newInterval,emergencyBrakeThreshold:newBrake,enrolledContactIds:[],log:[]}]);
    setNewOpen(false);
  }

  return <>
    <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center"}}>
      <div><div style={{fontWeight:700,fontSize:16}}>Sequences</div><div style={{fontSize:12,color:C.textS,marginTop:1}}>Automated drip sequences · staggered sending · review queue</div></div>
      <button onClick={()=>setNewOpen(true)} style={{...B("primary","sm"),marginLeft:"auto"}}>+ New Sequence</button>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:"#F0F9FF",border:"1px solid #BAE6FD",borderRadius:10,padding:"12px 16px",display:"flex",gap:10}}>
        <span style={{fontSize:18,flexShrink:0}}>⏱</span>
        <div>
          <div style={{fontWeight:600,fontSize:13,color:"#0369A1",marginBottom:3}}>Slow Drip Mode — Active</div>
          <div style={{fontSize:12,color:"#0284C7",lineHeight:1.6}}>Emails send 1 at a time with a configurable gap (default: every 7 minutes). This mimics human sending behavior and avoids Gmail's automated spam filters. The Emergency Brake automatically pauses any sequence if bounce rate exceeds threshold or an API error is detected.</div>
        </div>
      </div>

      {sequences.map(seq=>{
        const tmpl=Object.values(SEQUENCE_TEMPLATES).find(t=>t.id===seq.templateId)||Object.values(SEQUENCE_TEMPLATES)[0];
        const active=contacts.filter(c=>seq.enrolledContactIds.includes(c.id)&&!c.isUnsubscribed&&!c.bounced);
        const skipped=contacts.filter(c=>seq.enrolledContactIds.includes(c.id)&&(c.isUnsubscribed||c.bounced));
        const sent=seq.log.filter(l=>l.status==="sent").length;
        const sm={active:{color:C.gDark,bg:C.gBg,label:"● Active"},paused:{color:"#854F0B",bg:"#FAEEDA",label:"⏸ Paused"},braked:{color:"#A32D2D",bg:"#FEE2E2",label:"🛑 Emergency Brake"}}[seq.status]||{color:"#854F0B",bg:"#FAEEDA",label:"⏸ Paused"};
        return <div key={seq.id} style={{background:"white",border:`1px solid ${seq.status==="braked"?"#FECACA":C.border}`,borderRadius:10,overflow:"hidden"}}>
          {seq.status==="braked"&&<div style={{background:"#FEE2E2",borderBottom:"1px solid #FECACA",padding:"8px 16px",display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#A32D2D"}}>
            <span>🛑</span><strong>Emergency Brake Triggered</strong> — Review logs before resuming.
            <button onClick={()=>setSequences(p=>p.map(s=>s.id===seq.id?{...s,status:"paused"}:s))} style={{marginLeft:"auto",...B("secondary","sm")}}>Reset</button>
          </div>}
          <div style={{padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:12}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <div style={{fontWeight:700,fontSize:14}}>{seq.name}</div>
                  <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:10,background:sm.bg,color:sm.color}}>{sm.label}</span>
                </div>
                <div style={{fontSize:12,color:C.textS}}>{tmpl?.description}</div>
              </div>
              <div style={{display:"flex",gap:6}}>
                {seq.status!=="braked"&&<button onClick={()=>setSequences(p=>p.map(s=>s.id===seq.id?{...s,status:s.status==="active"?"paused":"active"}:s))} style={B(seq.status==="active"?"warning":"primary","sm")}>{seq.status==="active"?"⏸ Pause":"▶ Resume"}</button>}
                <button onClick={()=>setSequences(p=>p.map(s=>s.id===seq.id?{...s,status:"braked"}:s))} style={B("danger","sm")}>🛑 Brake</button>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
              {[["Enrolled",seq.enrolledContactIds.length,"#185FA5","#E6F1FB"],["Active",active.length,C.gDark,C.gBg],["Sent",sent,"#5B21B6","#EDE9FE"],["Skipped",skipped.length,"#9CA3AF","#F3F4F6"]].map(([l,v,col,bg])=>(
                <div key={l} style={{background:bg,borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                  <div style={{fontSize:18,fontWeight:700,color:col,lineHeight:1}}>{v}</div>
                  <div style={{fontSize:10,color:C.textS,marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:12,padding:"8px 10px",background:C.bg,borderRadius:8,fontSize:12,color:C.textS,marginBottom:12}}>
              <span>⏱ <strong style={{color:C.text}}>{seq.intervalMinutes} min</strong> between sends</span>
              <span>·</span>
              <span>🛑 Brake at <strong style={{color:C.text}}>{seq.emergencyBrakeThreshold}</strong> sends/run</span>
              <span>·</span>
              <span>Started <strong style={{color:C.text}}>{fmtTime(seq.startedAt)}</strong></span>
            </div>
            <div style={{fontSize:11,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Sequence steps</div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:12}}>
              {tmpl?.steps.map((step,i)=>(
                <React.Fragment key={i}>
                  <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",fontSize:11}}>
                    <div style={{fontWeight:600}}>Day {step.day}: {step.label}</div>
                    <div style={{color:C.textS,marginTop:1,display:"flex",gap:4,alignItems:"center"}}>
                      {step.approvalRequired&&<span style={{fontSize:9,fontWeight:600,color:"#854F0B",background:"#FAEEDA",padding:"1px 5px",borderRadius:4}}>APPROVAL</span>}
                      <span style={{fontSize:10}}>{step.type.replace(/_/g," ")}</span>
                    </div>
                  </div>
                  {i<tmpl.steps.length-1&&<span style={{color:C.textT}}>→</span>}
                </React.Fragment>
              ))}
            </div>
            {seq.log.length>0&&<>
              <div style={{fontSize:11,fontWeight:600,color:C.textT,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Recent sends</div>
              {seq.log.slice(0,4).map((l,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:11,color:C.textS,marginBottom:3}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:C.green,flexShrink:0}}/>
                  <strong style={{color:C.text}}>{l.contactName}</strong>
                  <span>{l.stepLabel}</span>
                  <span style={{marginLeft:"auto",color:C.textT}}>{fmtTime(l.sentAt)}</span>
                </div>
              ))}
              {seq.log.length>4&&<div style={{fontSize:11,color:C.textT,paddingLeft:14}}>+{seq.log.length-4} more sends</div>}
            </>}
          </div>
        </div>;
      })}
    </div>

    {newOpen&&<div onClick={()=>setNewOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:12,width:500,boxShadow:"0 20px 60px rgba(0,0,0,0.2)",padding:24}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:16,display:"flex",justifyContent:"space-between"}}>New Sequence<button onClick={()=>setNewOpen(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.textT}}>✕</button></div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
          <div>
            <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",display:"block",marginBottom:4}}>Template</label>
            <select value={newName} onChange={e=>setNewName(e.target.value)} style={I()}>{Object.keys(SEQUENCE_TEMPLATES).map(k=><option key={k} value={k}>{k}</option>)}</select>
            <div style={{fontSize:11,color:C.textS,marginTop:4}}>{SEQUENCE_TEMPLATES[newName]?.description}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>
              <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",display:"block",marginBottom:4}}>Interval (minutes)</label>
              <input type="number" value={newInterval} onChange={e=>setNewInterval(Number(e.target.value))} min={1} max={60} style={I()}/>
              <div style={{fontSize:10,color:C.textT,marginTop:3}}>Recommended: 5–10 min</div>
            </div>
            <div>
              <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",display:"block",marginBottom:4}}>Emergency Brake</label>
              <input type="number" value={newBrake} onChange={e=>setNewBrake(Number(e.target.value))} min={1} max={200} style={I()}/>
              <div style={{fontSize:10,color:C.textT,marginTop:3}}>Max sends before auto-pause</div>
            </div>
          </div>
        </div>
        <div style={{padding:"10px 14px",background:"#FFF7ED",borderRadius:8,border:"1px solid #FED7AA",fontSize:12,color:"#92400E",marginBottom:16}}>
          ⚠ All emails include a <strong>CAN-SPAM compliant footer</strong> with your address and a personalized unsubscribe link.
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
          <button onClick={()=>setNewOpen(false)} style={B("secondary")}>Cancel</button>
          <button onClick={createSeq} style={B("primary")}>Create Sequence</button>
        </div>
      </div>
    </div>}
  </>;
}

function ReviewQueuePage({queue,setQueue}){
  const[selected,setSelected]=useState(null);
  const[approving,setApproving]=useState(false);
  const pending=queue.filter(q=>q.status==="pending");
  const approved=queue.filter(q=>q.status==="approved");
  const rejected=queue.filter(q=>q.status==="rejected");

  function approve(id){
    setApproving(true);
    setTimeout(()=>{setQueue(p=>p.map(q=>q.id===id?{...q,status:"approved"}:q));setApproving(false);setSelected(null);},800);
  }
  function reject(id){setQueue(p=>p.map(q=>q.id===id?{...q,status:"rejected"}:q));setSelected(null);}

  return <>
    <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center"}}>
      <div><div style={{fontWeight:700,fontSize:16}}>Review Queue</div><div style={{fontSize:12,color:C.textS,marginTop:1}}>Approve or reject emails before they send</div></div>
      {pending.length>0&&<span style={{marginLeft:"auto",fontSize:12,fontWeight:600,color:"#854F0B",background:"#FAEEDA",padding:"3px 10px",borderRadius:20,border:"1px solid #FDE68A"}}>{pending.length} awaiting approval</span>}
    </div>
    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <div style={{width:300,borderRight:`1px solid ${C.border}`,overflowY:"auto",flexShrink:0}}>
        {pending.length>0&&<>
          <div style={SL()}>Pending ({pending.length})</div>
          {pending.map(q=>(
            <div key={q.id} onClick={()=>setSelected(q)} style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,cursor:"pointer",background:selected?.id===q.id?C.gBg:"white",borderLeft:selected?.id===q.id?`3px solid ${C.green}`:"3px solid transparent"}}
              onMouseEnter={e=>{if(selected?.id!==q.id)e.currentTarget.style.background=C.bg;}}
              onMouseLeave={e=>{if(selected?.id!==q.id)e.currentTarget.style.background="white";}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                <Av name={q.contactName} size={22} color={PER_C[q.contactPersona]?.[0]||C.blue}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:500,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.contactName}</div>
                  <div style={{fontSize:10,color:C.textS}}>{q.contactDistrict}</div>
                </div>
                <span style={{width:7,height:7,borderRadius:"50%",background:C.orange,flexShrink:0}}/>
              </div>
              <div style={{fontSize:11,color:C.textS,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.subject}</div>
              <div style={{fontSize:10,color:C.textT,marginTop:2}}>Scheduled: {fmtDT(q.scheduledFor)}</div>
            </div>
          ))}
        </>}
        {approved.length>0&&<>
          <div style={SL()}>Approved ({approved.length})</div>
          {approved.map(q=>(
            <div key={q.id} onClick={()=>setSelected(q)} style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,cursor:"pointer",opacity:0.75}}>
              <div style={{fontSize:12,fontWeight:500,color:C.gDark}}>✓ {q.contactName}</div>
              <div style={{fontSize:11,color:C.textS,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.subject}</div>
            </div>
          ))}
        </>}
        {rejected.length>0&&<>
          <div style={SL()}>Rejected ({rejected.length})</div>
          {rejected.map(q=>(
            <div key={q.id} onClick={()=>setSelected(q)} style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,cursor:"pointer",opacity:0.5}}>
              <div style={{fontSize:12,fontWeight:500,color:"#A32D2D"}}>✗ {q.contactName}</div>
              <div style={{fontSize:11,color:C.textS,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.subject}</div>
            </div>
          ))}
        </>}
        {queue.length===0&&<div style={{padding:40,textAlign:"center",color:C.textT,fontSize:12}}>No emails in queue</div>}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:12}}>
        {!selected?(
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:C.textT,gap:10,textAlign:"center"}}>
            <div style={{fontSize:36,opacity:0.3}}>📬</div>
            <div style={{fontWeight:500,color:C.textS}}>Select an email to review</div>
            <div style={{fontSize:12,maxWidth:260,lineHeight:1.6}}>Review and approve each email before it gets sent. You can edit the body before approving.</div>
          </div>
        ):<>
          <div style={{padding:"11px 14px",background:C.gBg,border:`1px solid ${C.gBorder}`,borderRadius:8,display:"flex",alignItems:"center",gap:10}}>
            <Av name={selected.contactName} size={34} color={PER_C[selected.contactPersona]?.[0]||C.blue}/>
            <div>
              <div style={{fontWeight:600,fontSize:13}}>{selected.contactName}</div>
              <div style={{fontSize:11,color:C.textS,marginTop:1}}>{selected.contactDistrict} · {selected.sequenceName} · {selected.stepLabel}</div>
            </div>
            <div style={{marginLeft:"auto"}}>
              {selected.status==="pending"&&<span style={{fontSize:10,fontWeight:600,color:"#854F0B",background:"#FAEEDA",padding:"2px 8px",borderRadius:10}}>Pending</span>}
              {selected.status==="approved"&&<span style={{fontSize:10,fontWeight:600,color:C.gDark,background:C.gBg,padding:"2px 8px",borderRadius:10}}>✓ Approved</span>}
              {selected.status==="rejected"&&<span style={{fontSize:10,fontWeight:600,color:"#A32D2D",background:"#FEE2E2",padding:"2px 8px",borderRadius:10}}>✗ Rejected</span>}
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",letterSpacing:"0.04em"}}>Subject</label>
            <div style={{padding:"7px 10px",border:`1px solid ${C.border}`,borderRadius:6,fontSize:13,background:C.bg}}>{selected.subject}</div>
          </div>
          <div style={{fontSize:12,color:C.textS}}>📅 Scheduled: <strong style={{color:C.text}}>{fmtDT(selected.scheduledFor)}</strong> <span style={{fontSize:10,color:C.textT}}>(staggered)</span></div>
          <div style={{display:"flex",flexDirection:"column",gap:4,flex:1}}>
            <label style={{fontSize:10,fontWeight:600,color:C.textS,textTransform:"uppercase",letterSpacing:"0.04em"}}>Email Body</label>
            <textarea value={selected.body} onChange={e=>setSelected(p=>({...p,body:e.target.value}))} readOnly={selected.status!=="pending"} rows={12} style={{...I(),resize:"vertical",lineHeight:1.7,background:selected.status==="pending"?"white":"#F9FAFB",fontFamily:"Georgia,serif",fontSize:12}}/>
          </div>
          <div style={{padding:"8px 12px",background:"#F0FDF4",borderRadius:8,border:`1px solid ${C.gBorder}`,fontSize:11,color:C.gDark}}>✓ <strong>CAN-SPAM footer auto-appended</strong> — includes physical address and personalized unsubscribe link.</div>
          {selected.status==="pending"&&<div style={{display:"flex",gap:8}}>
            <button onClick={()=>approve(selected.id)} disabled={approving} style={{...B("primary"),flex:1,opacity:approving?0.6:1}}>{approving?"Approving…":"✓ Approve & Queue"}</button>
            <button onClick={()=>reject(selected.id)} style={{...B("danger"),flex:1}}>✗ Reject</button>
          </div>}
        </>}
      </div>
    </div>
  </>;
}

function UnsubscribePage({contacts,setContacts}){
  const unsubs=contacts.filter(c=>c.isUnsubscribed);
  const bounced=contacts.filter(c=>c.bounced);

  return <>
    <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`}}>
      <div style={{fontWeight:700,fontSize:16}}>Unsubscribe & Suppression</div>
      <div style={{fontSize:12,color:C.textS,marginTop:1}}>CAN-SPAM compliance · unsubscribed contacts skipped in all sequences</div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:16}}>
      <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>How the unsubscribe flow works</div>
        <div style={{display:"flex",gap:4,alignItems:"stretch"}}>
          {[{icon:"📧",label:"Email sent",desc:"CAN-SPAM footer auto-appended"},{icon:"🖱",label:"Contact clicks",desc:"Goes to Vercel landing page"},{icon:"🔁",label:"DB sync",desc:"Railway sets is_unsubscribed=TRUE"},{icon:"⏭",label:"Auto-skipped",desc:"Skipped in all future sequences"}].map((s,i)=>(
            <React.Fragment key={i}>
              <div style={{flex:1,padding:"10px 8px",background:C.bg,borderRadius:8,textAlign:"center"}}>
                <div style={{fontSize:20,marginBottom:6}}>{s.icon}</div>
                <div style={{fontSize:11,fontWeight:600,marginBottom:3}}>{s.label}</div>
                <div style={{fontSize:10,color:C.textS,lineHeight:1.4}}>{s.desc}</div>
              </div>
              {i<3&&<div style={{display:"flex",alignItems:"center",padding:"0 4px",color:C.textT,fontSize:14}}>→</div>}
            </React.Fragment>
          ))}
        </div>
      </div>
      <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontWeight:600,fontSize:13}}>Unsubscribed</div>
          <span style={{fontSize:10,fontWeight:600,color:"#A32D2D",background:"#FEE2E2",padding:"1px 7px",borderRadius:10}}>{unsubs.length}</span>
        </div>
        {unsubs.length===0&&<div style={{padding:"16px",fontSize:12,color:C.textT}}>No unsubscribed contacts</div>}
        {unsubs.map(c=>{const[pc]=PER_C[c.persona]||["#6B7280"];return(
          <div key={c.id} style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
            <Av name={c.name} size={28} color={pc}/>
            <div style={{flex:1}}><div style={{fontWeight:500,fontSize:12}}>{c.name}</div><div style={{fontSize:11,color:C.textS}}>{c.role} · {c.district}</div></div>
            <Tag label="Unsubscribed" color="#A32D2D" bg="#FEE2E2"/>
            <button onClick={()=>setContacts(p=>p.map(x=>x.id===c.id?{...x,isUnsubscribed:false}:x))} style={B("secondary","sm")}>Re-subscribe</button>
          </div>
        );})}
      </div>
      <div style={{background:"white",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontWeight:600,fontSize:13}}>Manually suppress a contact</div>
        </div>
        <div style={{padding:"8px 16px"}}>
          {contacts.filter(c=>!c.isUnsubscribed).map(c=>{const[pc]=PER_C[c.persona]||["#6B7280"];return(
            <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
              <Av name={c.name} size={22} color={pc}/>
              <div style={{flex:1,fontSize:12}}>{c.name} <span style={{color:C.textS}}>· {c.district}</span></div>
              <button onClick={()=>setContacts(p=>p.map(x=>x.id===c.id?{...x,isUnsubscribed:true}:x))} style={B("danger","xs")}>Unsub</button>
            </div>
          );})}
        </div>
      </div>
    </div>
  </>;
}

function App(){
  const[contacts,setContacts]=useState(SEED_CONTACTS);
  const[sequences,setSequences]=useState(SEED_SEQUENCES);
  const[queue,setQueue]=useState(SEED_QUEUE);
  const[page,setPage]=useState("sequences");

  const pendingCount=queue.filter(q=>q.status==="pending").length;
  const activeSeqs=sequences.filter(s=>s.status==="active").length;
  const brakedSeqs=sequences.filter(s=>s.status==="braked").length;
  const unsubCount=contacts.filter(c=>c.isUnsubscribed).length;

  return <div style={{fontFamily:"system-ui,sans-serif",background:C.bg,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",fontSize:13,color:C.text}}>

    <div style={{height:52,background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",padding:"0 16px",gap:12,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:8,width:195,flexShrink:0}}>
        <div style={{width:28,height:28,borderRadius:6,background:C.green,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:12}}>IG</div>
        <div><div style={{fontWeight:700,fontSize:13}}>Inspired Growing</div><div style={{fontSize:10,color:C.textS}}>CRM · Phase 3</div></div>
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
        {activeSeqs>0&&<div style={{fontSize:12,color:C.gDark,padding:"3px 10px",background:C.gBg,borderRadius:20,border:`1px solid ${C.gBorder}`}}>● <strong>{activeSeqs}</strong> active</div>}
        {brakedSeqs>0&&<div style={{fontSize:12,color:"#A32D2D",padding:"3px 10px",background:"#FEE2E2",borderRadius:20,border:"1px solid #FECACA"}}>🛑 <strong>{brakedSeqs}</strong> braked</div>}
        {pendingCount>0&&<div style={{fontSize:12,color:"#854F0B",padding:"3px 10px",background:"#FAEEDA",borderRadius:20,border:"1px solid #FDE68A"}}>📬 <strong>{pendingCount}</strong> to review</div>}
        <div style={{width:28,height:28,borderRadius:"50%",background:C.blue,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:11,fontWeight:600}}>EW</div>
      </div>
    </div>

    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <div style={{width:195,background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",padding:"10px 8px",gap:2,flexShrink:0}}>
        <div style={SL()}>Automation</div>
        <NavItem icon="🔄" label="Sequences" onClick={()=>setPage("sequences")} active={page==="sequences"}/>
        <NavItem icon="📬" label={`Review Queue${pendingCount>0?" ("+pendingCount+")":""}`} onClick={()=>setPage("review")} active={page==="review"}/>
        <NavItem icon="🚫" label="Unsubscribes" onClick={()=>setPage("unsub")} active={page==="unsub"}/>
        <div style={SL()}>Pipeline</div>
        <NavItem icon="📊" label="Dashboard" onClick={()=>window.location.href='/'} active={false}/>
        <NavItem icon="📋" label="Pipeline" onClick={()=>window.location.href='/'} active={false}/>
        <NavItem icon="⚡" label="Activity Feed" onClick={()=>window.location.href='/'} active={false}/>
        <div style={SL()}>Outreach</div>
        <NavItem icon="👥" label="Contacts" onClick={()=>window.location.href='/contacts.html'} active={false}/>
        <NavItem icon="✉️" label="Compose" onClick={()=>window.location.href='/contacts.html'} active={false}/>
        <NavItem icon="📁" label="Resources" onClick={()=>window.location.href='/contacts.html'} active={false}/>
        <NavItem icon="⚙️" label="Email Templates" onClick={()=>window.location.href='/contacts.html'} active={false}/>
      </div>

      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {page==="sequences"&&<SequencesPage contacts={contacts} sequences={sequences} setSequences={setSequences}/>}
        {page==="review"&&<ReviewQueuePage queue={queue} setQueue={setQueue}/>}
        {page==="unsub"&&<UnsubscribePage contacts={contacts} setContacts={setContacts}/>}
      </div>
    </div>

    <div style={{height:4,display:"flex",flexShrink:0}}>
      {[C.lavender,C.lightblue,C.blue,C.green,C.yellow,C.orange,C.coral].map(col=><div key={col} style={{flex:1,background:col}}/>)}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

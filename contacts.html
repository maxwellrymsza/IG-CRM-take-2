async function sbFetch(path, opts={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
      ...(opts.headers||{})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

  </div>;
}

  const filtered=contacts.filter(c=>{

    if(fp&&c.persona!==fp)return false;if(fs&&c.stage!==fs)return false;if(fst&&c.state!==fst)return false;return true;
  });

  async function genHook(){
    if(!cc)return;
    setAiSt("loading");setKbSt("loading");setL1("");
    const kbFacts={
      STEM:"• 7-14 day seed-to-harvest cycle for microgreens\n• NGSS-aligned curriculum with 6 structured lessons\n• 12 independent trays for simultaneous experiments\n• 75 sq ft growing canopy\n• 40+ annual grow cycles drive data-driven inquiry\n• Students seed, observe, adjust, and harvest within a single unit",
      Nutrition:"• 100 fresh salads per week from a single system\n• 240–336 servings per harvest\n• Zero pesticides, no food miles\n• Closed-loop reservoir uses 95% less water than conventional growing\n• 'Growers become eaters' — students eat what they grow\n• Grant-aligned: farm-to-school, food deserts, nutritional literacy",
      Sustainability:"• 95% less water than soil farming\n• Closed-loop reservoir — near-zero water waste\n• Zero pesticides, no food transportation\n• NASA-selected aeroponics technology\n• Students see the full local food system in action\n• Green team programs tracking growth data and environmental stewardship",
      CTE:"• Students grow, harvest, and use fresh produce in culinary projects\n• Connects to AgEd and food science career pathways\n• 40+ annual grow cycles — rapid, real production\n• Commercial-grade equipment used in real Ag-Tech careers\n• 'Seed-to-Plate' project-based learning\n• Workforce development grant alignment",
      General:"• 100 salads per week, every week, in as little as 7 days\n• 32 schools currently installed across NY and NJ\n• 75 sq ft footprint, fits standard classrooms\n• Connects to standard 15/20 amp outlets — no special plumbing\n• Founded by AeroFarms co-founder, former science teacher\n• Quote: 'Our students are learning how science, sustainability, and creativity come together' — Newark BOE President",
    };
    setKbSt("done");
    const facts=kbFacts[cc.persona]||kbFacts.General;
    const sys=`You write one-sentence personalized cold email openers for Inspired Growing, an EdTech company selling aeroponic classroom farm systems to K-12 schools.\n\nWrite ONE sentence (max 30 words) opening a cold email to ${cc.name}, ${cc.role} at ${cc.school} in the ${cc.district} district (${cc.state}).\n\nReference something specific and plausible about ${cc.district} — a known initiative, grant, strategic plan, sustainability goal, or community fact that shows you did your homework on their district specifically.\n\nTone: warm, collegial. Do NOT mention Inspired Growing or the product. Just the hook about them.\n\nKEY FACTS FROM OUR KNOWLEDGE BASE:\n${facts}\n\nRESPOND WITH ONLY THE ONE SENTENCE. Nothing else.`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:100,system:sys,messages:[{role:"user",content:"Write the opening sentence."}]})});
      const d=await r.json();const t=(d.content?.[0]?.text||"").trim();

  const preview=[l1,l2,l3,`\n${sig}`,`\n${canSpamFooter(cc)}`].filter(Boolean).join("\n\n");

      const enc=btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
      const r=await fetch("https://gmail.googleapis.com/gmail/v1/users/me/drafts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:{raw:enc}})});

                  </div>
                  <div style={{border:`1px solid #BAE6FD`,borderRadius:8,overflow:"hidden"}}>
                    <div style={{padding:"9px 12px",background:"#F0F9FF",borderBottom:`1px solid #BAE6FD`,display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:"#378ADD",color:"white",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>1</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,fontSize:12,color:"#0369A1"}}>District hook <span style={{fontWeight:400,color:"#0284C7"}}>— AI-generated + Knowledge Base facts</span></div>
                        {kbSt==="loading"&&<div style={{fontSize:10,color:"#0284C7",marginTop:2}}>📁 Reading your Drive docs for {cc.persona} persona…</div>}
                        {kbSt==="done"&&<div style={{fontSize:10,color:C.gDark,marginTop:2}}>✓ KB loaded · facts from your Drive docs used in generation</div>}
                      </div>
                      <button onClick={genHook} disabled={aiSt==="loading"} style={{...B("secondary","sm")}}>{aiSt==="loading"?"Generating…":l1?"↻ Regenerate":"✨ Generate Hook"}</button>
                    </div>
                    <div style={{padding:10,background:"white"}}>
                      {aiSt==="loading"&&<div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:C.gDark,padding:"4px 2px"}}><div style={{width:12,height:12,border:`2px solid ${C.gBorder}`,borderTopColor:C.gDark,borderRadius:"50%",animation:"spin 0.7s linear infinite",flexShrink:0}}/>Writing district opener for {cc.district}…</div>}
                      {aiSt==="error"&&<div style={{fontSize:12,color:"#A32D2D",padding:"4px 2px"}}>⚠ Error. Check API and retry.</div>}
                      {(aiSt==="done"||l1)?<textarea value={l1} onChange={e=>setL1(e.target.value)} rows={2} style={{...I(),resize:"vertical",lineHeight:1.7,background:"white"}}/>
                      :<div style={{fontSize:12,color:C.textT,padding:"4px 2px",fontStyle:"italic"}}>Click "Generate Hook" — AI writes a district-specific opener.</div>}
                    </div>
                  </div>
                  <div style={{border:`1px solid ${C.gBorder}`,borderRadius:8,overflow:"hidden"}}>
                    <div style={{padding:"9px 12px",background:"#F0FDF4",borderBottom:`1px solid ${C.gBorder}`,display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:C.green,color:"white",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>2</div>
                      <div><div style={{fontWeight:600,fontSize:12,color:C.gDark}}>Persona pitch <span style={{fontWeight:400,color:"#15803D"}}>— your template for {TMPL[cc.persona]?.label||"General"} contacts</span></div></div>
                      <button onClick={()=>{setStab(cc.persona);setPage("settings");}} style={{marginLeft:"auto",...B("ghost","sm"),color:C.gDark}}>Edit ↗</button>
                    </div>
                    <div style={{padding:10,background:"white"}}><textarea value={l2} onChange={e=>setL2(e.target.value)} rows={3} style={{...I(),resize:"vertical",lineHeight:1.7,background:"white"}}/></div>
                  </div>
                  <div style={{border:`1px solid #FED7AA`,borderRadius:8,overflow:"hidden"}}>
                    <div style={{padding:"9px 12px",background:"#FFF7ED",borderBottom:`1px solid #FED7AA`,display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:C.orange,color:"white",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>3</div>
                      <div><div style={{fontWeight:600,fontSize:12,color:"#92400E"}}>Universal close <span style={{fontWeight:400,color:"#B45309"}}>— same across all emails</span></div></div>
                      <button onClick={()=>{setStab("close");setPage("settings");}} style={{marginLeft:"auto",...B("ghost","sm"),color:"#92400E"}}>Edit ↗</button>
                    </div>
                    <div style={{padding:10,background:"white"}}><textarea value={l3} onChange={e=>setL3(e.target.value)} rows={2} style={{...I(),resize:"vertical",lineHeight:1.7,background:"white"}}/></div>
                  </div>
                  {cc&&<SuggestedAttachments cc={cc} onViewAll={()=>setPage("resources")}/>}
                  {(l1||l2||l3)&&<div style={{border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
                    <div style={{padding:"8px 12px",background:C.bg,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <span style={{fontWeight:600,fontSize:11,color:C.textS,textTransform:"uppercase",letterSpacing:"0.05em"}}>Full email preview</span>
                      <button onClick={()=>navigator.clipboard&&navigator.clipboard.writeText(preview)} style={B("ghost","sm")}>Copy</button>
                    </div>
                    <div style={{padding:"14px 16px",fontSize:13,lineHeight:1.9,color:C.text,whiteSpace:"pre-wrap",background:"white",fontFamily:"Georgia,serif"}}>{preview}</div>
                  </div>}
                  {gmSt==="loading"&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:C.bBg,borderRadius:8,fontSize:12,color:C.bDark}}><div style={{width:12,height:12,border:"2px solid #B5D4F4",borderTopColor:C.bDark,borderRadius:"50%",animation:"spin 0.7s linear infinite",flexShrink:0}}/>{gmMsg}</div>}
                  {gmSt==="success"&&<div style={{padding:"8px 12px",background:C.gBg,borderRadius:8,fontSize:12,color:C.gDark}}>{gmMsg}</div>}
                  {gmSt==="error"&&<div style={{padding:"8px 12px",background:"#FAEEDA",borderRadius:8,fontSize:12,color:"#854F0B"}}>{gmMsg}</div>}
                  <div style={{display:"flex",gap:8,paddingBottom:8}}>
                    <button onClick={pushGmail} disabled={!subj||!l1} style={{...B("blue"),opacity:(!subj||!l1)?0.4:1}}>📧 Push to Gmail Draft</button>
                    <button onClick={genHook} style={B("secondary")}>↻ New Hook</button>
                  </div>
                </>}
              </div>
            </div>
          </>}

          {page==="resources"&&<ResourcesPage/>}

          {page==="settings"&&<>
            <div style={{padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center"}}>
              <div><div style={{fontWeight:700,fontSize:16}}>Email Templates</div><div style={{fontSize:12,color:C.textS,marginTop:1}}>Edit persona pitches and the universal close</div></div>
              <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
                {saved&&<span style={{fontSize:12,color:C.gDark,fontWeight:500}}>✓ Saved</span>}
                <button onClick={()=>{setSaved(true);setTimeout(()=>setSaved(false),2000);}} style={B("primary")}>Save Changes</button>
              </div>
            </div>
            <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:C.surface,padding:"0 20px",gap:2,overflowX:"auto"}}>
              {[...Object.keys(TMPL).map(k=>({id:k,label:TMPL[k].label})),{id:"close",label:"Close & Signature"}].map(t=>(
                <div key={t.id} onClick={()=>setStab(t.id)} style={{padding:"10px 14px",fontSize:13,cursor:"pointer",borderBottom:stab===t.id?`2px solid ${C.green}`:"2px solid transparent",color:stab===t.id?C.gDark:C.textS,fontWeight:stab===t.id?500:400,marginBottom:-1,whiteSpace:"nowrap"}}>{t.label}</div>
              ))}
            </div>
            <div style={{flex:1,overflowY:"auto",padding:24}}>
              {stab!=="close"&&templates[stab]&&<div style={{maxWidth:680}}>
                <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>
                  <label style={{...LBL(),fontSize:11}}>Persona pitch — {templates[stab].label}</label>
                  <textarea value={templates[stab].roleBlurb} onChange={e=>setTemplates(p=>({...p,[stab]:{...p[stab],roleBlurb:e.target.value}}))} rows={5} style={{...I(),resize:"vertical",lineHeight:1.7,background:"white"}}/>
                </div>
              </div>}
              {stab==="close"&&<div style={{maxWidth:680}}>
                <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>
                  <label style={{...LBL(),fontSize:11}}>Universal close</label>
                  <textarea value={closeText} onChange={e=>setCloseText(e.target.value)} rows={3} style={{...I(),resize:"vertical",lineHeight:1.7,background:"white"}}/>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>
                  <label style={{...LBL(),fontSize:11}}>Signature</label>
                  <textarea value={sig} onChange={e=>setSig(e.target.value)} rows={3} style={{...I(),resize:"vertical",lineHeight:1.7,background:"white"}}/>
                </div>
              </div>}
            </div>
          </>}

        </div>
      </div>

      {/* COLOR BAR */}
      <div style={{height:4,display:"flex",flexShrink:0}}>
        {[C.lavender,C.lightblue,C.blue,C.green,C.yellow,C.orange,C.coral].map(col=><div key={col} style={{flex:1,background:col}}/>)}
      </div>

      {/* DETAIL MODAL */}
      {detail&&<div onClick={()=>setDetail(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:12,width:480,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)",padding:24}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:20}}>
            <Av name={detail.name} size={44} color={C.blue}/>
            <div><div style={{fontWeight:700,fontSize:17}}>{detail.name}</div><div style={{fontSize:12,color:C.textS,marginTop:2}}>{detail.role} · {detail.district}</div></div>
            <button onClick={()=>setDetail(null)} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.textT}}>✕</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
            {[["Email",detail.email],["Organization",detail.school],["District",detail.district],["State",detail.state],["Lead Source",detail.lead_source],["Project Type",detail.project_type]].map(([l,v])=>(
              <div key={l}><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:C.textT,marginBottom:3}}>{l}</div><div style={{fontSize:13,wordBreak:"break-all"}}>{v||"—"}</div></div>
            ))}
            <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:C.textT,marginBottom:3}}>Persona</div>{(()=>{const[pc,pb]=PER_C[detail.persona]||["#6B7280","#F1EFE8"];return<Tag label={TMPL[detail.persona]?.label||detail.persona} color={pc} bg={pb}/>;})()}</div>
            <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:C.textT,marginBottom:3}}>Stage</div><Tag label={detail.stage} color={STAGE_C[detail.stage]||"#6B7280"} bg={STAGE_BG[detail.stage]||"#F3F4F6"}/></div>
          </div>
          {detail.alt_contact&&<div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:C.textT,marginBottom:3}}>Alt Contact</div><div style={{fontSize:13,color:C.textS}}>{detail.alt_contact}</div></div>}
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",color:C.textT,marginBottom:6}}>Notes</div>
          <div style={{fontSize:13,color:C.textS,lineHeight:1.6,marginBottom:20,minHeight:32}}>{detail.notes||"No notes yet."}</div>
          {!deleteConfirm?<>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setDetail(null);selectCC(detail);setPage("compose");}} style={B("primary")}>✉ Compose Email</button>
              <button onClick={()=>setDetail(null)} style={B("secondary")}>Close</button>
              <button onClick={()=>setDeleteConfirm(true)} style={{...B("secondary"),marginLeft:"auto",color:"#A32D2D",borderColor:"#FECACA"}}>🗑 Delete</button>
            </div>
          </>:<>
            <div style={{padding:"12px 14px",background:"#FEE2E2",borderRadius:8,border:"1px solid #FECACA",marginBottom:12}}>
              <div style={{fontWeight:600,fontSize:13,color:"#A32D2D",marginBottom:4}}>Delete {detail.name}?</div>
              <div style={{fontSize:12,color:"#C45252"}}>This will permanently remove them from Supabase and cannot be undone.</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>deleteContact(detail)} style={{...B("secondary"),background:"#A32D2D",color:"white",border:"1px solid #A32D2D",flex:1}}>Yes, Delete</button>
              <button onClick={()=>setDeleteConfirm(false)} style={{...B("secondary"),flex:1}}>Cancel</button>
            </div>
          </>}
        </div>
      </div>}

      {/* ADD MODAL */}
      {addOpen&&<div onClick={()=>setAddOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:12,width:460,boxShadow:"0 20px 60px rgba(0,0,0,0.2)",padding:24}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
            <div style={{fontWeight:700,fontSize:16}}>Add Contact</div>
            <button onClick={()=>setAddOpen(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.textT}}>✕</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            {[["fname","First Name","Jane"],["lname","Last Name","Smith"]].map(([k,l,ph])=>(
              <div key={k} style={{display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>{l}</label><input value={addF[k]} onChange={e=>setAddF(f=>({...f,[k]:e.target.value}))} placeholder={ph} style={I()}/></div>
            ))}
            <div style={{gridColumn:"1/-1",display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>Email</label><input value={addF.email} onChange={e=>setAddF(f=>({...f,email:e.target.value}))} placeholder="j.smith@district.edu" style={I()}/></div>
            {[["role","Role","Nutrition Director"],["school","Organization","Lincoln HS"],["district","District","Clarkstown CSD"]].map(([k,l,ph])=>(
              <div key={k} style={{display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>{l}</label><input value={addF[k]} onChange={e=>setAddF(f=>({...f,[k]:e.target.value}))} placeholder={ph} style={I()}/></div>
            ))}
            <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>State</label>
              <select value={addF.state} onChange={e=>setAddF(f=>({...f,state:e.target.value}))} style={S()}>
                {["NY","NJ","CT","PA","MA","Other"].map(s=><option key={s} value={s}>{s}</option>)}
              </select></div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={LBL()}>Persona</label>
              <select value={addF.persona} onChange={e=>setAddF(f=>({...f,persona:e.target.value}))} style={S()}>
                {Object.keys(TMPL).map(k=><option key={k} value={k}>{TMPL[k].label}</option>)}
              </select></div>
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
            <button onClick={()=>setAddOpen(false)} style={B("secondary")}>Cancel</button>
            <button onClick={saveContact} style={B("primary")}>Add Contact</button>
          </div>
        </div>
      </div>}

      <style>{`@keyframes spin{to{transform:rotate(360deg);}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
